<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>越前打刃物 VR</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0705;
    color: #e8d5b0;
    font-family: 'Hiragino Mincho ProN', 'Yu Mincho', serif;
    overflow: hidden;
    height: 100vh;

    position: relative;

  canvas { display: block; }
  #ui-overlay {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    z-index: 10;
  }
  #top-bar {
    position: fixed;
    top: 0; left: 0; right: 0;
    display: flex;

    align-items: center;

    background: linear-gradient(180deg, rgba(0,0,0,0.7) 0%, transparent 100%);

    z-index: 20;
  }

    font-size: 18px;

    color: #e8c87a;
    text-shadow: 0 0 20px rgba(232,200,122,0.5);
  }
  #btn-group {
    display: flex;
    gap: 8px;
  }
  .ui-btn {
    padding: 8px 16px;
    border: 1px solid rgba(232,200,122,0.4);
    background: rgba(0,0,0,0.6);
    color: #e8c87a;
    font-family: inherit;
    font-size: 13px;
    cursor: pointer;
    border-radius: 4px;

    letter-spacing: 0.05em;

    border-color: rgba(232,200,122,0.8);
    box-shadow: 0 0 12px rgba(232,200,122,0.3);
  }
  .ui-btn:disabled {
    opacity: 0.3;
    cursor: not-allowed;
  }
  #status-bar {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 20px;
    align-items: center;
    background: rgba(0,0,0,0.7);
    border: 1px solid rgba(232,200,122,0.2);
    border-radius: 8px;
    padding: 10px 24px;
    font-size: 14px;
    color: #e8c87a;
    pointer-events: none;

    letter-spacing: 0.1em;

<div id="canvas-container">
  <div id="ui-overlay"></div>
</div>

  <div id="btn-group">

      <button class="ui-btn" id="btn-ar" disabled>AR開始</button>

  </div>
</div>
<div id="status-bar">
  <span id="state-label">INTRO</span>
  <span class="sep">|</span>
  <span id="phase-info">Nキー：次へ進む</span>
  <span class="sep">|</span>
  <span id="score-display">Score: -</span>
</div>
<div id="mouse-hint" id="mouse-hint">マウスクリック：打撃 | N：次フェーズ | P：リトライ | WASD：左手移動 | X：左手X</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.162.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.162.0/examples/jsm/"
  }
}
</script>
<script type="module">
import * as THREE from 'three';
import { XRControllerModelFactory } from 'three/addons/webxr/XRControllerModelFactory.js';

/* ================================================================
   CONSTANTS & CONFIG
================================================================ */
const CONFIG = {
  FORGING: {
    TOTAL_HITS: 30,
    VELOCITY_THRESHOLD: 0.8,
    FORGE_HEAT_RATE: 25,       // per second in furnace
    COOL_RATE: 2,              // per second in air（ゆっくり冷える）
    HOT_THRESHOLD: 60,
    MISS_THRESHOLD: 30,
    SPARK_COUNT_PERFECT: 80,
    SPARK_COUNT_GOOD: 40,
    SPARK_COUNT_MISS: 5,
  },
  SHAPING: {
    MAX_HITS: 100,
    ZONE_COUNT: 5,
    HIT_POWER_SCALE: 0.08,
    SMALL_PENALTY: 0.3,
    VELOCITY_THRESHOLD: 0.5,
  },
  SHARPENING: {
    TOTAL_STROKES: 30,
    STROKE_THRESHOLD: 0.04,
    IDEAL_ANGLE: 15,
    ANGLE_TOLERANCE: 5,
  },
};

/* ================================================================
   STATE MACHINE
================================================================ */
const State = {
  INTRO: 'INTRO',
  FORGING: 'FORGING',
  SHAPING: 'SHAPING',
  SHARPENING: 'SHARPENING',
  RESULT: 'RESULT',
};
let currentState = State.INTRO;

let bladeState = { shapeDistortion: 0, symmetryError: 0, sharpness: 0 };

/* ================================================================
   THREE.JS CORE
================================================================ */
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0a0705);
scene.fog = new THREE.FogExp2(0x0a0705, 0.04);

const camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.01, 100);
camera.position.set(0, 1.6, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.xr.enabled = true;
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 0.9;
document.getElementById('canvas-container').prepend(renderer.domElement);

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

/* ================================================================
   AUDIO ENGINE
================================================================ */
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

function createNoise(duration = 0.1, freq = 200, type = 'sawtooth', gain = 0.3) {
  const osc = audioCtx.createOscillator();
  const gainNode = audioCtx.createGain();
  const filter = audioCtx.createBiquadFilter();
  filter.type = 'bandpass';
  filter.frequency.value = freq;
  filter.Q.value = 2;
  osc.type = type;
  osc.frequency.value = freq;
  osc.connect(filter);
  filter.connect(gainNode);
  gainNode.connect(audioCtx.destination);
  gainNode.gain.setValueAtTime(gain, audioCtx.currentTime);
  gainNode.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
  osc.start(audioCtx.currentTime);
  osc.stop(audioCtx.currentTime + duration);
}

function playHammerPerfect() {
  createNoise(0.3, 800, 'square', 0.4);
  createNoise(0.15, 200, 'sawtooth', 0.5);
}
function playHammerGood() {
  createNoise(0.2, 500, 'square', 0.3);
  createNoise(0.1, 150, 'sawtooth', 0.3);
}
function playHammerMiss() {
  createNoise(0.1, 100, 'sine', 0.2);
}
function playTransition() {
  [200, 300, 400, 600].forEach((f, i) => {
    setTimeout(() => createNoise(0.2, f, 'sine', 0.25), i * 60);
  });
}
function playSharpen(angle) {
  const pitch = 600 + (angle / 30) * 800;
  createNoise(0.05, pitch, 'sawtooth', 0.15);
}
function playComplete() {
  [300, 500, 700, 1000].forEach((f, i) => {
    setTimeout(() => createNoise(0.3, f, 'sine', 0.3), i * 100);
  });
}
function resumeAudio() {
  if (audioCtx.state === 'suspended') audioCtx.resume();
}
document.addEventListener('click', resumeAudio, { once: true });
document.addEventListener('keydown', resumeAudio, { once: true });

/* ================================================================
   LIGHTING
================================================================ */
scene.add(new THREE.AmbientLight(0x201510, 1.2));
const sunLight = new THREE.DirectionalLight(0xfff0d0, 1.5);
sunLight.position.set(2, 5, 3);
sunLight.castShadow = true;
sunLight.shadow.mapSize.set(1024, 1024);
sunLight.shadow.camera.near = 0.1;
sunLight.shadow.camera.far = 20;
scene.add(sunLight);

const forgeLight = new THREE.PointLight(0xff4400, 0, 3);
forgeLight.position.set(-1.2, 1.0, -1.5);
scene.add(forgeLight);
const emberLight = new THREE.PointLight(0xff6600, 0, 2);
emberLight.position.set(-1.2, 0.9, -1.5);
scene.add(emberLight);

/* ================================================================
   XR RIG & CONTROLLERS
================================================================ */
const xrRig = new THREE.Group();
scene.add(xrRig);

const ctrlModelFactory = new XRControllerModelFactory();
const grip0 = renderer.xr.getControllerGrip(0);
const grip1 = renderer.xr.getControllerGrip(1);
grip0.add(ctrlModelFactory.createControllerModel(grip0));
grip1.add(ctrlModelFactory.createControllerModel(grip1));

const ctrl0 = renderer.xr.getController(0);
const ctrl1 = renderer.xr.getController(1);

renderer.xr.addEventListener('sessionstart', () => {
  [ctrl0, ctrl1, grip0, grip1].forEach(obj => {
    if (obj.parent !== xrRig) {
      if (obj.parent) obj.parent.remove(obj);
      xrRig.add(obj);
    }
  });
});

let rightController = null;
let leftController  = null;

function onControllerConnected(event) {
  const ctrl = event.target;
  const hand = event.data.handedness;
  if (hand === 'right') rightController = ctrl;
  else if (hand === 'left') leftController = ctrl;
}
function onControllerDisconnected(event) {
  const ctrl = event.target;
  if (ctrl === rightController) rightController = null;
  if (ctrl === leftController)  leftController  = null;
}
ctrl0.addEventListener('connected', onControllerConnected);
ctrl0.addEventListener('disconnected', onControllerDisconnected);
ctrl1.addEventListener('connected', onControllerConnected);
ctrl1.addEventListener('disconnected', onControllerDisconnected);

// selectstart = トリガー押下イベント（gamepad polling の補完）
// VRではgamepadのpollingが遅れる場合があるため、イベントベースでも補足
ctrl0.addEventListener('selectstart', () => {
  // INTRO/RESULTでトリガーを引いたら次フェーズへ（A代わり）
  if (currentState === State.INTRO || currentState === State.RESULT) {
    if (!wasAPressed) { nextState(); wasAPressed = true; }
  }
});
ctrl1.addEventListener('selectstart', () => {
  if (currentState === State.INTRO || currentState === State.RESULT) {
    if (!wasAPressed) { nextState(); wasAPressed = true; }
  }
});
ctrl0.addEventListener('selectend', () => { wasAPressed = false; });
ctrl1.addEventListener('selectend', () => { wasAPressed = false; });

// Controller velocity tracking
const prevRightPos = new THREE.Vector3();
const currRightPos = new THREE.Vector3();
let rightVelocity = 0;

// Laser pointers
function addLaser(ctrl) {
  const geo = new THREE.BufferGeometry().setFromPoints([
    new THREE.Vector3(0,0,0), new THREE.Vector3(0,0,-1)
  ]);
  const mat = new THREE.LineBasicMaterial({ color: 0xffcc00, transparent: true, opacity: 0.4 });
  const line = new THREE.Line(geo, mat);
  line.scale.z = 1.5;
  ctrl.add(line);
}
addLaser(ctrl0);
addLaser(ctrl1);

/* ================================================================
   SPARK SYSTEM (InstancedMesh)
================================================================ */
const SPARK_MAX = 80;
const sparkGeo = new THREE.SphereGeometry(0.01, 4, 4);
const sparkMat = new THREE.MeshBasicMaterial({ color: 0xffaa00 });
const sparkMesh = new THREE.InstancedMesh(sparkGeo, sparkMat, SPARK_MAX);
sparkMesh.instanceMatrix.setUsage(THREE.DynamicDrawUsage);
sparkMesh.count = 0;
scene.add(sparkMesh);

const sparks = [];
const sparkDummy = new THREE.Object3D();

function spawnSparks(origin, count) {
  const toSpawn = Math.min(count, SPARK_MAX - sparks.length);
  for (let i = 0; i < toSpawn; i++) {
    sparks.push({
      pos: origin.clone().add(new THREE.Vector3((Math.random()-0.5)*0.1, Math.random()*0.1, (Math.random()-0.5)*0.1)),
      vel: new THREE.Vector3((Math.random()-0.5)*3, Math.random()*4+1, (Math.random()-0.5)*3),
      life: 0.4 + Math.random()*0.4,
      maxLife: 0.4 + Math.random()*0.4,
    });
  }
}

function updateSparks(delta) {
  for (let i = sparks.length - 1; i >= 0; i--) {
    const s = sparks[i];
    s.life -= delta;
    s.vel.y -= 9.8 * delta;
    s.pos.addScaledVector(s.vel, delta);
    if (s.life <= 0) { sparks.splice(i, 1); continue; }
    sparkDummy.position.copy(s.pos);
    const t = s.life / s.maxLife;
    sparkDummy.scale.setScalar(t * 0.8);
    sparkDummy.updateMatrix();
    sparkMesh.setMatrixAt(i, sparkDummy.matrix);
    const c = new THREE.Color().setHSL(0.08 + (1-t)*0.05, 1, 0.4+t*0.3);
    sparkMesh.setColorAt(i, c);
  }
  sparkMesh.count = sparks.length;
  sparkMesh.instanceMatrix.needsUpdate = true;
  if (sparkMesh.instanceColor) sparkMesh.instanceColor.needsUpdate = true;
}

/* ================================================================
   SCENE OBJECTS
================================================================ */

// Groups per phase
const groupForging   = new THREE.Group();
const groupShaping   = new THREE.Group();
const groupSharpening = new THREE.Group();
scene.add(groupForging);
scene.add(groupShaping);
scene.add(groupSharpening);

// --- FLOOR ---
const floorGeo = new THREE.PlaneGeometry(20, 20);
const floorMat = new THREE.MeshStandardMaterial({ color: 0x1a120a, roughness: 0.95, metalness: 0.0 });
const floor = new THREE.Mesh(floorGeo, floorMat);
floor.rotation.x = -Math.PI / 2;
floor.receiveShadow = true;
scene.add(floor);

// --- WORKBENCH (shared reference point, placed in front of player) ---
const workbenchPos = new THREE.Vector3(0, 0.85, -1.1);

function makeWorkbench(parent) {
  const mat = new THREE.MeshStandardMaterial({ color: 0x3a2510, roughness: 0.9 });
  const top = new THREE.Mesh(new THREE.BoxGeometry(0.9, 0.06, 0.5), mat);
  top.position.set(0, 0, 0);
  top.castShadow = true;
  top.receiveShadow = true;
  const leg = new THREE.Mesh(new THREE.BoxGeometry(0.06, 0.85, 0.06), mat);
  const legs = new THREE.Group();
  [[-0.4,-0.425,-0.2],[0.4,-0.425,-0.2],[-0.4,-0.425,0.2],[0.4,-0.425,0.2]].forEach(([x,y,z]) => {
    const l = leg.clone(); l.position.set(x,y,z); l.castShadow=true; legs.add(l);
  });
  const bench = new THREE.Group();
  bench.add(top); bench.add(legs);
  bench.position.copy(workbenchPos);
  parent.add(bench);
  return bench;
}

// ============ FORGING OBJECTS ============
const forgingBench = makeWorkbench(groupForging);

// Furnace
const furnaceMat = new THREE.MeshStandardMaterial({ color: 0x2a1505, roughness: 0.9, metalness: 0.2 });
const furnace = new THREE.Group();
const furnaceBody = new THREE.Mesh(new THREE.BoxGeometry(0.6, 0.7, 0.5), furnaceMat);
furnaceBody.castShadow = true;
furnace.add(furnaceBody);
const furnaceHoleMat = new THREE.MeshStandardMaterial({ color: 0xff2200, emissive: 0xff2200, emissiveIntensity: 0, roughness: 1 });
const furnaceHole = new THREE.Mesh(new THREE.BoxGeometry(0.22, 0.22, 0.12), furnaceHoleMat);
furnaceHole.position.set(0, 0, 0.22);
furnace.add(furnaceHole);
furnace.position.set(-1.1, 0.9, -1.2);
groupForging.add(furnace);

// Iron piece — 最初から作業台の上に配置
const ironMat = new THREE.MeshStandardMaterial({ color: 0x555555, roughness: 0.8, metalness: 0.7 });
const ironMesh = new THREE.Mesh(new THREE.BoxGeometry(0.25, 0.06, 0.06), ironMat);
ironMesh.castShadow = true;
// workbenchPos.y(0.85) + 天板厚み半分(0.03) + 鉄厚み半分(0.03) = 0.91
ironMesh.position.set(0, 0.91, -1.1);
groupForging.add(ironMesh);

// 温度表示スプライト（鉄の真上に追従）
const tempCanvas = document.createElement('canvas');
tempCanvas.width = 128; tempCanvas.height = 64;
const tempCtx = tempCanvas.getContext('2d');
const tempTex = new THREE.CanvasTexture(tempCanvas);
const tempSprite = new THREE.Sprite(
  new THREE.SpriteMaterial({ map: tempTex, transparent: true, depthTest: false })
);
tempSprite.scale.set(0.28, 0.14, 1);
tempSprite.position.set(0, 0.20, 0); // ironMeshからの相対位置
ironMesh.add(tempSprite);

function updateTempSprite(temp) {
  tempCtx.clearRect(0, 0, 128, 64);
  tempCtx.fillStyle = 'rgba(0,0,0,0.70)';
  tempCtx.beginPath();
  tempCtx.roundRect(4, 6, 120, 52, 10);
  tempCtx.fill();
  const hue = temp < 30 ? 200 : temp < 60 ? 30 : 10;
  tempCtx.fillStyle = `hsl(${hue},100%,72%)`;
  tempCtx.font = 'bold 30px monospace';
  tempCtx.textAlign = 'center';
  tempCtx.textBaseline = 'middle';
  tempCtx.fillText(`${Math.round(temp)}\u00b0`, 64, 33);
  tempTex.needsUpdate = true;
}

// Hammer (right hand visual)
// VRコントローラー座標系：
//   +Y = グリップ上方向、-Z = コントローラー先端方向
// ハンマーは「柄を握る」イメージ：
//   柄をY軸方向、ヘッドを-Y（下）に配置
// groupは scene に置き、VR時は rightController の子にする
const hammerGroup = new THREE.Group();
const hammerHandle = new THREE.Mesh(
  new THREE.CylinderGeometry(0.013, 0.016, 0.30, 8),
  new THREE.MeshStandardMaterial({ color: 0x5a3515, roughness: 0.85 })
);
// 柄をY軸方向（コントローラーのグリップ軸）に沿わせる
// ハンドルの中心をコントローラー原点に合わせる
hammerHandle.position.set(0, 0, 0);
const hammerHead = new THREE.Mesh(
  new THREE.BoxGeometry(0.09, 0.065, 0.065),
  new THREE.MeshStandardMaterial({ color: 0x606060, roughness: 0.5, metalness: 0.85 })
);
// ヘッドを柄の下端（-Y）に付ける
hammerHead.position.set(0, -0.18, 0);
hammerGroup.add(hammerHandle);
hammerGroup.add(hammerHead);
// コントローラーに子として追加したとき、手の平の中心から下にヘッドが来るよう微調整
// localPositionはVR追加時にリセットするので初期値は0
hammerGroup.position.set(0, 0, 0);

// Left hand tong visual
const tongGroup = new THREE.Group();
const tongMat = new THREE.MeshStandardMaterial({ color: 0x555555, roughness: 0.7, metalness: 0.6 });
const tongArm = new THREE.Mesh(new THREE.BoxGeometry(0.015, 0.015, 0.3), tongMat);
tongArm.position.set(0, 0, -0.15);
tongGroup.add(tongArm);
tongGroup.position.set(0, -0.03, -0.1);

// ============ SHAPING OBJECTS ============
const shapingBench = makeWorkbench(groupShaping);

// Blade model (knife-like shape via custom geometry)
function createBladeGeometry() {
  const shape = new THREE.Shape();
  shape.moveTo(0, 0);
  shape.lineTo(0.5, 0.02);
  shape.lineTo(0.45, 0.08);
  shape.lineTo(0.0, 0.09);
  shape.lineTo(-0.05, 0.04);
  shape.lineTo(0, 0);
  const extrudeSettings = { depth: 0.012, bevelEnabled: true, bevelThickness: 0.003, bevelSize: 0.003, bevelSegments: 2 };
  return new THREE.ExtrudeGeometry(shape, extrudeSettings);
}
const bladeGeo = createBladeGeometry();
const bladeMat = new THREE.MeshStandardMaterial({ color: 0x888888, roughness: 0.4, metalness: 0.9 });
const bladeMesh = new THREE.Mesh(bladeGeo, bladeMat);
bladeMesh.castShadow = true;
bladeMesh.position.set(-0.2, workbenchPos.y + 0.06, -1.1);
bladeMesh.rotation.y = Math.PI / 6;
groupShaping.add(bladeMesh);

// Zone indicators (overlay meshes on blade)
const ZONE_COUNT = CONFIG.SHAPING.ZONE_COUNT;
const zoneIndicators = [];
const zones = [];
for (let i = 0; i < ZONE_COUNT; i++) {
  const t = i / (ZONE_COUNT - 1);
  const zoneIndMat = new THREE.MeshBasicMaterial({ color: 0x0066ff, transparent: true, opacity: 0.35, depthTest: false });
  const zoneInd = new THREE.Mesh(new THREE.BoxGeometry(0.09, 0.04, 0.025), zoneIndMat);
  const bladeX = -0.22 + t * 0.46;
  zoneInd.position.set(bladeX, workbenchPos.y + 0.065, -1.1);
  groupShaping.add(zoneInd);
  zoneIndicators.push(zoneInd);
  zones.push({ distortion: 5 + Math.random() * 15, worldX: bladeX });
}

// Shaping hammer (same visual, different group)
const shapingHammerGroup = hammerGroup.clone();

// ============ SHARPENING OBJECTS ============
const sharpenBench = makeWorkbench(groupSharpening);

// Whetstone
const stoneMat = new THREE.MeshStandardMaterial({ color: 0x8a8070, roughness: 0.95 });
const stoneMesh = new THREE.Mesh(new THREE.BoxGeometry(0.35, 0.06, 0.12), stoneMat);
stoneMesh.position.set(0, workbenchPos.y + 0.06, -1.1);
stoneMesh.receiveShadow = true;
groupSharpening.add(stoneMesh);

// Blade for sharpening (same shape)
const sharpenBladeMesh = bladeMesh.clone();
sharpenBladeMesh.position.set(-0.1, workbenchPos.y + 0.09, -1.1);
sharpenBladeMesh.rotation.y = 0;
groupSharpening.add(sharpenBladeMesh);

// ============ RESULT BLADE DISPLAY ============
const resultBladeGroup = new THREE.Group();
const resultBlade = bladeMesh.clone();
resultBlade.position.set(0, 1.5, -1.5);
resultBlade.scale.set(2, 2, 2);
resultBladeGroup.add(resultBlade);
scene.add(resultBladeGroup);
resultBladeGroup.visible = false;

/* ================================================================
   VR CANVAS TEXT PANEL
================================================================ */
function makeTextCanvas(text, w, h, bg, fg, fontSize) {
  const c = document.createElement('canvas');
  c.width = w; c.height = h;
  const ctx = c.getContext('2d');
  ctx.fillStyle = bg;
  ctx.fillRect(0, 0, w, h);
  ctx.fillStyle = fg;
  ctx.font = `${fontSize}px 'Hiragino Mincho ProN', serif`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  // Multi-line support
  const lines = text.split('\n');
  const lineH = fontSize * 1.4;
  const startY = h / 2 - ((lines.length - 1) * lineH) / 2;
  lines.forEach((line, i) => {
    ctx.fillText(line, w / 2, startY + i * lineH);
  });
  return c;
}

function buildResultCanvas(score, bladeStateSnap, scores) {
  const W = 600, H = 700;
  const c = document.createElement('canvas');
  c.width = W; c.height = H;
  const ctx = c.getContext('2d');
  // Background
  const grad = ctx.createLinearGradient(0, 0, 0, H);
  grad.addColorStop(0, '#12090a');
  grad.addColorStop(1, '#1a1005');
  ctx.fillStyle = grad;
  ctx.roundRect(0, 0, W, H, 20);
  ctx.fill();
  ctx.strokeStyle = '#e8c87a';
  ctx.lineWidth = 2;
  ctx.roundRect(2, 2, W-4, H-4, 18);
  ctx.stroke();

  // Title
  ctx.fillStyle = '#e8c87a';
  ctx.font = 'bold 32px serif';
  ctx.textAlign = 'center';
  ctx.fillText('完成 ─ 越前打刃物', W/2, 48);

  // Score big
  const rank = score >= 90 ? '名人' : score >= 70 ? '職人' : '見習い';
  ctx.font = 'bold 72px serif';
  ctx.fillStyle = score >= 90 ? '#ffe066' : score >= 70 ? '#a0c8ff' : '#ff8866';
  ctx.fillText(Math.round(score), W/2, 130);
  ctx.font = '24px serif';
  ctx.fillStyle = '#c8a060';
  ctx.fillText('点', W/2 + 45, 118);
  ctx.font = '28px serif';
  ctx.fillStyle = '#e8c87a';
  ctx.fillText(`【 ${rank} 】`, W/2, 172);

  // Divider
  ctx.strokeStyle = 'rgba(232,200,122,0.3)';
  ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(30, 195); ctx.lineTo(W-30, 195); ctx.stroke();

  // Detail
  const details = [
    ['鍛造 (歪み)', Math.round(100 - bladeStateSnap.shapeDistortion), 0.4],
    ['成形 (対称性)', Math.round(100 - bladeStateSnap.symmetryError), 0.3],
    ['研ぎ (鋭さ)', Math.round(bladeStateSnap.sharpness), 0.3],
  ];
  ctx.font = '20px serif';
  ctx.textAlign = 'left';
  details.forEach(([label, val, weight], i) => {
    const y = 230 + i * 52;
    ctx.fillStyle = '#c8a060';
    ctx.fillText(label, 50, y);
    // Bar
    ctx.fillStyle = 'rgba(255,255,255,0.08)';
    ctx.fillRect(220, y - 16, 280, 20);
    const barW = (val / 100) * 280;
    const barColor = val > 70 ? '#66cc88' : val > 40 ? '#e8c87a' : '#cc6644';
    ctx.fillStyle = barColor;
    ctx.fillRect(220, y - 16, barW, 20);
    ctx.fillStyle = '#ffffff';
    ctx.textAlign = 'right';
    ctx.fillText(`${val}点 × ${weight}`, W - 50, y);
    ctx.textAlign = 'left';
  });

  // Divider
  ctx.strokeStyle = 'rgba(232,200,122,0.3)';
  ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(30, 390); ctx.lineTo(W-30, 390); ctx.stroke();

  // Ranking
  ctx.fillStyle = '#e8c87a';
  ctx.font = 'bold 22px serif';
  ctx.textAlign = 'center';
  ctx.fillText('─ ランキング ─', W/2, 420);

  ctx.font = '19px monospace';
  scores.slice(0, 5).forEach((s, i) => {
    const y = 458 + i * 46;
    const isNew = i === 0 && Math.abs(s.score - score) < 0.5;
    ctx.fillStyle = isNew ? '#ffe066' : (i === 0 ? '#e8c87a' : 'rgba(200,170,100,0.7)');
    const medal = ['🥇', '🥈', '🥉', '  4', '  5'][i] || String(i+1);
    ctx.textAlign = 'left';
    ctx.fillText(`${medal}  ${Math.round(s.score)}点`, 60, y);
    ctx.textAlign = 'right';
    ctx.fillStyle = 'rgba(200,170,100,0.5)';
    ctx.fillText(s.date, W - 50, y);
  });

  ctx.fillStyle = 'rgba(232,200,122,0.4)';
  ctx.font = '16px serif';
  ctx.textAlign = 'center';
  ctx.fillText('Aボタン / Nキーで再プレイ', W/2, H - 30);
  return c;
}

function showResultPanel(score, bladeStateSnap, scores) {
  if (resultPanelMesh) resultPanel.remove(resultPanelMesh);
  const c = buildResultCanvas(score, bladeStateSnap, scores);
  const tex = new THREE.CanvasTexture(c);
  const mat = new THREE.MeshBasicMaterial({ map: tex, transparent: true, depthTest: false });
  resultPanelMesh = new THREE.Mesh(new THREE.PlaneGeometry(1.5, 1.75), mat);
  resultPanelMesh.position.set(0, 1.55, -1.6);
  resultPanel.add(resultPanelMesh);
  resultPanel.visible = true;
}

/* ================================================================
   SCORE PERSISTENCE
================================================================ */
function loadScores() {
  try { return JSON.parse(localStorage.getItem('echizen_scores') || '[]'); }
  catch { return []; }
}
function saveScore(score) {
  const scores = loadScores();
  const now = new Date();
  const date = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')} ${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
  scores.push({ score, date });
  scores.sort((a, b) => b.score - a.score);
  const top = scores.slice(0, 5);
  localStorage.setItem('echizen_scores', JSON.stringify(top));
  return top;
}

/* ================================================================

================================================================ */
const tempVec = new THREE.Vector3();
function getRightHandPos() {
  if (isVRActive() && rightController) {
    rightController.getWorldPosition(tempVec);
    return tempVec;
  }
  return fakeRH;
}
function getLeftHandPos() {
  if (isVRActive() && leftController) {
    leftController.getWorldPosition(tempVec);
    return tempVec;
  }
  return fakeLH;
}
function getRightTrigger() {
  if (isVRActive()) {
    const gp = getRightGamepad();
    if (gp) return gp.buttons[0]?.pressed ?? false;
    return false;
  }
  return mouseHeld;
}
function getLeftTriggerOrGrip() {
  if (isVRActive()) {
    const gp = getLeftGamepad();
    if (gp) return (gp.buttons[0]?.pressed ?? false) || (gp.buttons[1]?.pressed ?? false);
    return false;
  }
  return keyState['ShiftLeft'] || keyState['ShiftRight'];
}
// --- 安全なgamepad取得ヘルパー ---
// rightController/leftControllerはconnectedイベント後に確定するが、
// XRセッション開始直後はnullのことがある。
// そのためctrl0/ctrl1のgamepadも直接参照し、handednessで右/左を判定する。
function getRightGamepad() {
  // 優先: rightControllerが確定していればそちらを使う
  if (rightController?.gamepad) return rightController.gamepad;
  // フォールバック: ctrl0/ctrl1のどちらかがrightならそちらを使う
  for (const c of [ctrl0, ctrl1]) {
    if (c?.gamepad && c.gamepad.hand === 'right') return c.gamepad;
  }
  // さらにフォールバック: XR入力ソースを直接走査
  if (isVRActive()) {
    const session = renderer.xr.getSession();
    if (session) {
      for (const src of session.inputSources) {
        if (src.handedness === 'right' && src.gamepad) return src.gamepad;
      }
    }
  }
  return null;
}
function getLeftGamepad() {
  if (leftController?.gamepad) return leftController.gamepad;
  for (const c of [ctrl0, ctrl1]) {
    if (c?.gamepad && c.gamepad.hand === 'left') return c.gamepad;
  }
  if (isVRActive()) {
    const session = renderer.xr.getSession();
    if (session) {
      for (const src of session.inputSources) {
        if (src.handedness === 'left' && src.gamepad) return src.gamepad;
      }
    }
  }
  return null;
}

function getAButton() {
  if (isVRActive()) {
    const gp = getRightGamepad();
    if (gp) return gp.buttons[4]?.pressed ?? false;
    return false;
  }
  return keyState['KeyN'] ?? false;
}
function getBButton() {
  if (isVRActive()) {
    const gp = getRightGamepad();
    if (gp) return gp.buttons[5]?.pressed ?? false;
    return false;
  }
  return keyState['KeyP'] ?? false;
}
function getXButton() {
  if (isVRActive()) {
    const gp = getLeftGamepad();
    if (gp) return gp.buttons[4]?.pressed ?? false;
    return false;
  }
  return keyState['KeyX'] ?? false;
}
function getBothGrips() {
  if (isVRActive()) {
    const lg = getLeftGamepad()?.buttons[1]?.pressed ?? false;
    const rg = getRightGamepad()?.buttons[1]?.pressed ?? false;
    return lg || rg;
  }
  return keyState['Space'] ?? false;
}

/* ================================================================
   PHASE TRANSITIONS
================================================================ */
function resetForging() {
  ironTemperature = 0;
  ironOnWorkbench = false;
  ironInFurnace   = false;
  ironHeld        = false;
  forgingHitCount = 0;
  shapeDistortion = 0;
  forgingComplete = false;
  ironMesh.position.set(0, 0.91, -1.1); // 作業台の上
  ironMesh.material.color.set(0x555555);
  updateTempSprite(0);
}
function resetShaping() {
  shapingHitCount = 0;
  bladeHeld       = false;
  bladeFlipped    = false;
  bladeFlipAnim   = 0;
  shapingComplete = false;
  zones.forEach(z => { z.distortion = 5 + Math.random() * 15; });
  bladeMesh.position.set(-0.2, workbenchPos.y + 0.06, -1.1);
  bladeMesh.rotation.y = 0;
}
function resetSharpening() {
  strokeCount     = 0;
  lastStrokeDir   = 0;
  sharpenComplete = false;
  totalSharpness  = 0;
  strokeScores    = 0;
  prevSharpenZ    = -1.1;
  sharpenStreak   = 0;
}

function setVisibility() {
  groupForging.visible   = currentState === State.FORGING;
  groupShaping.visible   = currentState === State.SHAPING;
  groupSharpening.visible = currentState === State.SHARPENING;
  resultBladeGroup.visible = currentState === State.RESULT;
  resultPanel.visible    = currentState === State.RESULT;
}

function nextState() {
  playTransition();
  const prev = currentState;
  if (currentState === State.INTRO)      currentState = State.FORGING;
  else if (currentState === State.FORGING)   currentState = State.SHAPING;
  else if (currentState === State.SHAPING)   currentState = State.SHARPENING;
  else if (currentState === State.SHARPENING) currentState = State.RESULT;
  else if (currentState === State.RESULT)    currentState = State.INTRO;

  setVisibility();
  onEnterState(currentState, prev);
}

function retryState() {
  playTransition();
  if (currentState === State.FORGING)    resetForging();
  else if (currentState === State.SHAPING)   resetShaping();
  else if (currentState === State.SHARPENING) resetSharpening();
}

function onEnterState(state, prev) {
  if (state === State.INTRO) {
    bladeState = { shapeDistortion: 0, symmetryError: 0, sharpness: 0 };
    resetForging(); resetShaping(); resetSharpening();
    updateInfoPanel('越前打刃物\nEchizen Blades\n\nAボタン / Nキーで開始');
    updateStatusBar('INTRO', 'Nキー：開始', null);
  } else if (state === State.FORGING) {
    resetForging();
    updateInfoPanel('フェーズ①：鍛造\nForging\n\n炉で鉄を熱し、作業台で叩け\n（左手で掴む・右手でハンマー）');
    updateStatusBar('鍛造', '打撃 0/30 | 温度: 0', 0);
  } else if (state === State.SHAPING) {
    resetShaping();
    bladeState.shapeDistortion = shapeDistortion;
    updateInfoPanel('フェーズ②：成形\nShaping\n\n赤いエリアを叩いて歪みを修正せよ\n（Xボタンで反転）');
    updateStatusBar('成形', '打撃 0/100 | Aで終了', 0);
  } else if (state === State.SHARPENING) {
    resetSharpening();
    bladeState.symmetryError = zones.reduce((s,z)=>s+z.distortion,0)/zones.length;
    updateInfoPanel('フェーズ③：研ぎ\nSharpening\n\n砥石の上で刃物を前後に動かせ\n音で角度を確認しよう');
    updateStatusBar('研ぎ', 'ストローク 0/30', 0);
  } else if (state === State.RESULT) {
    const efficiency = Math.max(0.5, 1 - bladeState.symmetryError * 0.01);
    bladeState.sharpness = Math.max(0, Math.min(100, totalSharpness * efficiency));
    const finalScore = Math.max(0, Math.min(100,
      (100 - bladeState.shapeDistortion) * 0.4 +
      (100 - bladeState.symmetryError)   * 0.3 +
      bladeState.sharpness               * 0.3
    ));
    const scores = saveScore(finalScore);
    showResultPanel(finalScore, bladeState, scores);
    // Animate result blade
    resultBlade.material = bladeMesh.material.clone();
    const quality = finalScore / 100;
    resultBlade.material.color.setHSL(0.15 + quality * 0.15, 0.3 + quality * 0.5, 0.4 + quality * 0.3);
    resultBlade.material.metalness = 0.5 + quality * 0.5;
    updateStatusBar('結果', `スコア: ${Math.round(finalScore)}`, finalScore);
  }
}

/* ================================================================
   GLOBAL INPUT HANDLER
================================================================ */
function handleGlobalInput() {
  const aPressed = getAButton();
  const bPressed = getBButton();

  if (aPressed && !wasAPressed) {
    // INTRO / RESULT は常に遷移OK
    // FORGING / SHAPING / SHARPENING は各フェーズ完了 or 強制スキップ
    // → 仕様：Aボタンで常に次へ進める（フェーズ中でも任意終了可）
    nextState();
  }
  wasAPressed = aPressed;

  if (bPressed && !wasBPressed) retryState();
  wasBPressed = bPressed;
}

/* ================================================================
   UPDATE FORGING
================================================================ */
let prevRightTrigger = false;
let forgingHitCooldown = 0;

function updateForging(delta) {
  // Fake WASD for left hand movement
  if (!isVRActive()) {
    if (keyState['KeyA']) fakeLH.x -= delta * 0.8;
    if (keyState['KeyD']) fakeLH.x += delta * 0.8;
    if (keyState['KeyW']) fakeLH.z -= delta * 0.8;
    if (keyState['KeyS']) fakeLH.z += delta * 0.8;
    fakeLH.x = THREE.MathUtils.clamp(fakeLH.x, -2, 2);
    fakeLH.z = THREE.MathUtils.clamp(fakeLH.z, -2.5, 0.5);
  }

  const lhPos = getLeftHandPos();
  const rhPos = getRightHandPos();
  const leftTrig = getLeftTriggerOrGrip();

  // Update iron BB
  ironBB.setFromCenterAndSize(ironMesh.position, new THREE.Vector3(0.28, 0.09, 0.09));

  // Detect furnace / workbench overlap
  const ironInFurnaceNow   = furnaceBB.containsPoint(ironMesh.position);
  const ironOnWorkbenchNow = workbenchBB.containsPoint(ironMesh.position);
  ironInFurnace   = ironInFurnaceNow;
  ironOnWorkbench = ironOnWorkbenchNow;

  // Grab logic: 左手が鉄に近くてトリガー/グリップを引いたら掴む
  const lhToIron = lhPos.distanceTo(ironMesh.position);
  if (leftTrig && lhToIron < 0.35 && !ironHeld) ironHeld = true;
  if (!leftTrig) ironHeld = false;

  // 鉄を左手に追従させる
  if (ironHeld) {
    ironMesh.position.set(lhPos.x, Math.max(lhPos.y - 0.04, 0.5), lhPos.z);
  }

  // ---- ハンマーをコントローラーに追従させる（当たり判定より前に更新）----
  if (isVRActive()) {
    let targetGrip = null;
    if (rightController === ctrl0) targetGrip = grip0;
    else if (rightController === ctrl1) targetGrip = grip1;
    const attachTo = targetGrip ?? rightController;
    if (attachTo && hammerGroup.parent !== attachTo) {
      if (hammerGroup.parent) hammerGroup.parent.remove(hammerGroup);
      attachTo.add(hammerGroup);
    }
    // ローカル位置・回転を毎フレーム固定（一度だけだと他の処理で上書きされる場合があるため）
    // コントローラー座標系：-Z = 前方、Y = 上
    // 柄をZ軸（前後）方向に立てる → rotation.x = 0（Y軸が柄方向）
    // ヘッドが「前方下」に来るよう: rotation.x = PI/2 にして柄をZ軸方向に
    hammerGroup.position.set(0, 0, -0.05);   // コントローラー先端から少し前
    hammerGroup.rotation.set(Math.PI / 2, 0, 0); // 柄がZ軸方向（前後）、ヘッドが-Z先端
  } else {
    if (hammerGroup.parent !== scene) {
      if (hammerGroup.parent) hammerGroup.parent.remove(hammerGroup);
      scene.add(hammerGroup);
    }
    hammerGroup.position.copy(rhPos);
    hammerGroup.rotation.set(Math.PI / 2, 0, 0);
  }

  // ---- ハンマーヘッドのワールド座標を取得して当たり判定 ----
  // hammerHeadはhammerGroupの子で position.set(0, -0.18, 0)
  // rotation.x = PI/2 適用後のワールド座標を取得
  const hammerHeadWorld = new THREE.Vector3();
  hammerHead.getWorldPosition(hammerHeadWorld);

  // Temperature update
  if (ironInFurnace) {
    ironTemperature = Math.min(100, ironTemperature + CONFIG.FORGING.FORGE_HEAT_RATE * delta);
    forgeLight.intensity = 1.5 + Math.sin(Date.now()*0.01)*0.3;
    emberLight.intensity = 0.8;
    furnaceHoleMat.emissiveIntensity = 0.5 + ironTemperature * 0.01;
  } else {
    ironTemperature = Math.max(0, ironTemperature - CONFIG.FORGING.COOL_RATE * delta);
    forgeLight.intensity = THREE.MathUtils.lerp(forgeLight.intensity, 0.4, delta*2);
    emberLight.intensity = THREE.MathUtils.lerp(emberLight.intensity, 0.2, delta*2);
    furnaceHoleMat.emissiveIntensity = 0.3;
  }

  // Update iron color
  ironMesh.material.color.copy(tempToColor(ironTemperature));
  ironMesh.material.emissive = ironTemperature > 50
    ? new THREE.Color().setHSL(0.04, 1, (ironTemperature - 50) * 0.006)
    : new THREE.Color(0x000000);
  ironMesh.material.emissiveIntensity = ironTemperature > 50 ? 1 : 0;

  // 温度スプライト更新（毎フレーム）
  updateTempSprite(ironTemperature);

  // Velocity
  prevRightPos.copy(currRightPos);
  currRightPos.copy(rhPos);
  rightVelocity = prevRightPos.distanceTo(currRightPos) / Math.max(delta, 0.001);

  forgingHitCooldown = Math.max(0, forgingHitCooldown - delta);

  // Hit detection — ハンマーヘッドが鉄のBBに当たっているか
  const rightTrig = getRightTrigger();
  const hammerHitsIron = ironBB.containsPoint(hammerHeadWorld) ||
                         hammerHeadWorld.distanceTo(ironMesh.position) < 0.14;

  if (rightTrig && !prevRightTrigger && forgingHitCooldown <= 0 && forgingHitCount < CONFIG.FORGING.TOTAL_HITS) {
    forgingHitCooldown = 0.25;
    forgingHitCount++;

    const isTiming  = ironOnWorkbench;
    const isVelocity = rightVelocity > CONFIG.FORGING.VELOCITY_THRESHOLD || !isVRActive();
    const isHit     = hammerHitsIron;
    const hotEnough = ironTemperature >= CONFIG.FORGING.MISS_THRESHOLD;

    let result = 'Miss';
    if (!hotEnough) {
      result = 'Miss';
    } else if (isTiming && isVelocity && isHit) {
      result = 'Perfect';
    } else if (isTiming && (isVelocity || isHit)) {
      result = 'Good';
    }

    // Update distortion
    if (result === 'Miss')         shapeDistortion = Math.min(100, shapeDistortion + 2);
    else if (result === 'Good')    shapeDistortion = Math.min(100, shapeDistortion + 1);
    else if (result === 'Perfect') shapeDistortion = Math.max(0,   shapeDistortion - 0.5);

    // Sparks — ヘッド位置から発生
    const sparkOrigin = hammerHeadWorld.clone().add(new THREE.Vector3(0, 0.02, 0));
    const sparkCount = result === 'Perfect' ? CONFIG.FORGING.SPARK_COUNT_PERFECT :
                       result === 'Good'    ? CONFIG.FORGING.SPARK_COUNT_GOOD :
                                              CONFIG.FORGING.SPARK_COUNT_MISS;
    spawnSparks(sparkOrigin, sparkCount);

    // Sound
    if (result === 'Perfect') playHammerPerfect();
    else if (result === 'Good') playHammerGood();
    else playHammerMiss();

    // VR haptics
    if (isVRActive() && rightController?.gamepad?.hapticActuators?.[0]) {
      rightController.gamepad.hapticActuators[0].pulse(result === 'Perfect' ? 0.8 : 0.3, 80);
    }

    updateInfoPanel(`打撃 ${forgingHitCount}/${CONFIG.FORGING.TOTAL_HITS}\n${result}\n温度: ${Math.round(ironTemperature)}°\n歪み: ${Math.round(shapeDistortion)}`);
    updateStatusBar('鍛造', `打撃 ${forgingHitCount}/${CONFIG.FORGING.TOTAL_HITS} | 温度: ${Math.round(ironTemperature)}°`, 100 - shapeDistortion);

    if (forgingHitCount >= CONFIG.FORGING.TOTAL_HITS) {
      forgingComplete = true;
      updateInfoPanel(`鍛造完了！\nAボタン / Nキーで次へ\n歪み: ${Math.round(shapeDistortion)}`);
      playComplete();
    }
  }
  prevRightTrigger = rightTrig;
}

/* ================================================================
   UPDATE SHAPING
================================================================ */
let shapingHitCooldown = 0;
let prevShapingTrigger = false;
let prevXButton = false;
const bladeWorldPos = new THREE.Vector3();

function updateShaping(delta) {
  if (!isVRActive()) {
    if (keyState['KeyA']) fakeLH.x -= delta * 0.8;
    if (keyState['KeyD']) fakeLH.x += delta * 0.8;
    if (keyState['KeyW']) fakeLH.z -= delta * 0.8;
    if (keyState['KeyS']) fakeLH.z += delta * 0.8;
    fakeLH.x = THREE.MathUtils.clamp(fakeLH.x, -2, 2);
    fakeLH.z = THREE.MathUtils.clamp(fakeLH.z, -2.5, 0.5);
  }

  const lhPos = getLeftHandPos();
  const rhPos = getRightHandPos();
  const leftTrig = getLeftTriggerOrGrip();
  const xBtn = getXButton();

  // Grab blade
  const lhToBlade = lhPos.distanceTo(bladeMesh.position.clone().add(new THREE.Vector3(0,0.05,0)));
  if (leftTrig && lhToBlade < 0.4) bladeHeld = true;
  if (!leftTrig) bladeHeld = false;
  if (bladeHeld) {
    bladeMesh.position.set(lhPos.x, lhPos.y - 0.04, lhPos.z);
  }

  // Flip animation
  if (xBtn && !wasXPressed) {
    bladeFlipped = !bladeFlipped;
    bladeFlipAnim = 1.0;
  }
  wasXPressed = xBtn;
  if (bladeFlipAnim > 0) {
    bladeFlipAnim = Math.max(0, bladeFlipAnim - delta * 4);
    bladeMesh.rotation.z = Math.PI * (bladeFlipped ? 1 : 0) + Math.sin(bladeFlipAnim * Math.PI) * 0.3;
  } else {
    bladeMesh.rotation.z = bladeFlipped ? Math.PI : 0;
  }

  // Update zone indicator positions to follow blade
  bladeMesh.getWorldPosition(bladeWorldPos);
  zoneIndicators.forEach((zi, i) => {
    const t = i / (ZONE_COUNT - 1);
    zi.position.set(
      bladeMesh.position.x - 0.22 + t * 0.46,
      bladeMesh.position.y + 0.02,
      bladeMesh.position.z
    );
  });

  // Zone colors based on distortion
  zones.forEach((z, i) => {
    const d = THREE.MathUtils.clamp(z.distortion / 30, 0, 1);
    const col = new THREE.Color().setHSL(0.6 * (1 - d), 0.9, 0.4);
    zoneIndicators[i].material.color.copy(col);
    zoneIndicators[i].material.opacity = 0.3 + d * 0.4;
  });

  // Hammer velocity
  prevRightPos.copy(currRightPos);
  currRightPos.copy(rhPos);
  rightVelocity = prevRightPos.distanceTo(currRightPos) / Math.max(delta, 0.001);
  shapingHitCooldown = Math.max(0, shapingHitCooldown - delta);

  // Hammer visual
  if (!isVRActive()) {
    shapingHammerGroup.position.copy(rhPos);
  }

  const shapingTrig = getRightTrigger();
  if (shapingTrig && !prevShapingTrigger && shapingHitCooldown <= 0 && shapingHitCount < CONFIG.SHAPING.MAX_HITS) {
    shapingHitCooldown = 0.18;
    shapingHitCount++;

    // Find nearest zone
    let nearestIdx = 0;
    let nearestDist = Infinity;
    zoneIndicators.forEach((zi, i) => {
      const d = rhPos.distanceTo(zi.position);
      if (d < nearestDist) { nearestDist = d; nearestIdx = i; }
    });

    const power = THREE.MathUtils.clamp(
      (rightVelocity || 1.2) * CONFIG.SHAPING.HIT_POWER_SCALE,
      CONFIG.SHAPING.HIT_POWER_SCALE * 0.5,
      CONFIG.SHAPING.HIT_POWER_SCALE * 3
    );

    if (nearestDist < 0.25) {
      // Correct zone hit
      zones[nearestIdx].distortion = Math.max(0, zones[nearestIdx].distortion - power * 10);
      // Penalize others slightly
      zones.forEach((z, i) => {
        if (i !== nearestIdx) z.distortion = Math.min(40, z.distortion + CONFIG.SHAPING.SMALL_PENALTY);
      });

      const result = zones[nearestIdx].distortion < 5 ? 'Perfect' : 'Good';
      if (result === 'Perfect') playHammerPerfect();
      else playHammerGood();
      spawnSparks(rhPos.clone(), result === 'Perfect' ? 30 : 15);
    } else {
      playHammerMiss();
      // Wrong zone: penalize all a bit
      zones.forEach(z => { z.distortion = Math.min(40, z.distortion + 0.5); });
    }

    // VR haptics
    if (isVRActive() && rightController?.gamepad?.hapticActuators?.[0]) {
      rightController.gamepad.hapticActuators[0].pulse(0.4, 60);
    }

    const avgDistortion = zones.reduce((s, z) => s + z.distortion, 0) / zones.length;
    updateInfoPanel(`打撃 ${shapingHitCount}/${CONFIG.SHAPING.MAX_HITS}\n平均歪み: ${Math.round(avgDistortion)}\nXボタン：反転 | Aで終了`);
    updateStatusBar('成形', `打撃 ${shapingHitCount}/${CONFIG.SHAPING.MAX_HITS} | 歪み: ${Math.round(avgDistortion)}`, 100 - avgDistortion);
  }
  prevShapingTrigger = shapingTrig;

  if (shapingHitCount >= CONFIG.SHAPING.MAX_HITS) {
    shapingComplete = true;
    const avg = zones.reduce((s,z)=>s+z.distortion,0)/zones.length;
    updateInfoPanel(`成形完了！\nAボタン / Nキーで次へ\n対称性誤差: ${Math.round(avg)}`);
    playComplete();
  }
}

/* ================================================================
   UPDATE SHARPENING
================================================================ */
function updateSharpening(delta) {
  const bothGrips = getBothGrips();

  // Get both hand positions (or mouse for non-VR)
  const lhPos = getLeftHandPos();
  const rhPos = getRightHandPos();

  if (!isVRActive()) {
    // Spacebar simulates gripping; mouse movement = strokes
    if (keyState['Space'] || mouseHeld) {
      const currZ = fakeRH.z;
      const dz = currZ - prevSharpenZ;
      const dir = Math.sign(dz);
      if (dir !== 0 && dir !== lastStrokeDir && Math.abs(dz) > CONFIG.SHARPENING.STROKE_THRESHOLD) {
        lastStrokeDir = dir;
        strokeCount++;
        const angle = 10 + Math.random() * 20; // simulate angle
        const angleErr = Math.abs(angle - CONFIG.SHARPENING.IDEAL_ANGLE);
        const angleScore = Math.max(0, 100 - angleErr * 10);
        strokeScores += angleScore;
        totalSharpness = strokeScores / Math.max(1, strokeCount);
        playSharpen(angle);
        updateInfoPanel(`ストローク ${strokeCount}/${CONFIG.SHARPENING.TOTAL_STROKES}\n角度: ${Math.round(angle)}°\nスコア: ${Math.round(angleScore)}`);
        updateStatusBar('研ぎ', `ストローク ${strokeCount}/${CONFIG.SHARPENING.TOTAL_STROKES} | ${Math.round(totalSharpness)}点`, totalSharpness);
        if (isVRActive() && rightController?.gamepad?.hapticActuators?.[0]) {
          rightController.gamepad.hapticActuators[0].pulse(angleScore > 70 ? 0.5 : 0.2, 50);
        }
      }
      prevSharpenZ = currZ;
    }
  } else {
    // VR: use midpoint of both hands
    if (bothGrips && leftController && rightController) {
      leftController.getWorldPosition(tempVec);
      const lp = tempVec.clone();
      rightController.getWorldPosition(tempVec);
      const rp = tempVec.clone();
      const mid = lp.clone().add(rp).multiplyScalar(0.5);

      // Project onto stone forward axis
      const stoneWorldFwd = stoneFwd.clone();
      const projZ = mid.z;
      const dz = projZ - prevSharpenZ;
      const dir = Math.sign(dz);

      if (Math.abs(dz) > CONFIG.SHARPENING.STROKE_THRESHOLD && dir !== 0 && dir !== lastStrokeDir) {
        lastStrokeDir = dir;
        strokeCount++;

        // Estimate blade tilt angle from hand height difference
        const heightDiff = rp.y - lp.y;
        const dist       = rp.distanceTo(lp);
        const angleDeg   = dist > 0.01 ? Math.abs(Math.asin(heightDiff / dist)) * (180 / Math.PI) : 15;
        const angleErr   = Math.abs(angleDeg - CONFIG.SHARPENING.IDEAL_ANGLE);
        const score      = Math.max(0, Math.min(100, 100 - angleErr * CONFIG.SHARPENING.ANGLE_TOLERANCE));
        strokeScores    += score;
        totalSharpness   = strokeScores / Math.max(1, strokeCount);

        playSharpen(angleDeg);
        if (rightController?.gamepad?.hapticActuators?.[0]) {
          rightController.gamepad.hapticActuators[0].pulse(score > 70 ? 0.6 : 0.2, 60);
        }
        updateInfoPanel(`ストローク ${strokeCount}/${CONFIG.SHARPENING.TOTAL_STROKES}\n角度: ${Math.round(angleDeg)}°\nスコア: ${Math.round(score)}`);
        updateStatusBar('研ぎ', `ストローク ${strokeCount}/${CONFIG.SHARPENING.TOTAL_STROKES} | ${Math.round(totalSharpness)}点`, totalSharpness);
      }
      prevSharpenZ = mid.z;
    }
  }

  if (strokeCount >= CONFIG.SHARPENING.TOTAL_STROKES && !sharpenComplete) {
    sharpenComplete = true;
    updateInfoPanel(`研ぎ完了！\nAボタン / Nキーで結果へ\n鋭さ: ${Math.round(totalSharpness)}点`);
    playComplete();
  }

  // Animate sharpening blade on stone
  if (!sharpenComplete) {
    const t = Date.now() * 0.001;
    sharpenBladeMesh.position.z = -1.1 + Math.sin(t * 3) * 0.04;
  }
}

/* ================================================================
   UPDATE RESULT
================================================================ */
function updateResult(delta) {
  // Rotate result blade
  if (resultBlade) {
    resultBlade.rotation.y += delta * 0.8;
  }
  // Billboard result panel toward camera
  if (resultPanelMesh) {
    const cam = renderer.xr.isPresenting ? renderer.xr.getCamera() : camera;
    resultPanelMesh.quaternion.copy(cam.quaternion);
  }
}

/* ================================================================
   UPDATE INTRO
================================================================ */
function updateIntro(delta) {
  // Billboard info panel
  if (infoPanelMesh) {
    const cam = renderer.xr.isPresenting ? renderer.xr.getCamera() : camera;
    infoPanelMesh.quaternion.copy(cam.quaternion);
  }
}

/* ================================================================
   INTRO VISUALS
================================================================ */
// Ambient particles
const particleCount = 120;
const particleGeo = new THREE.BufferGeometry();
const particlePos = new Float32Array(particleCount * 3);
for (let i = 0; i < particleCount; i++) {
  particlePos[i*3]   = (Math.random()-0.5)*8;
  particlePos[i*3+1] = Math.random()*3;
  particlePos[i*3+2] = (Math.random()-0.5)*8;
}
particleGeo.setAttribute('position', new THREE.BufferAttribute(particlePos, 3));
const particleMat = new THREE.PointsMaterial({ color: 0xff6600, size: 0.025, transparent: true, opacity: 0.4 });
const particles = new THREE.Points(particleGeo, particleMat);
scene.add(particles);

/* ================================================================
   XR BUTTON SETUP
================================================================ */
async function setupXRButtons() {
  const btnVR = document.getElementById('btn-vr');
  const btnAR = document.getElementById('btn-ar');
  const btnExitXR = document.getElementById('btn-exit-xr');

  if (navigator.xr) {
    const vrSupported = await navigator.xr.isSessionSupported('immersive-vr').catch(() => false);
    const arSupported = await navigator.xr.isSessionSupported('immersive-ar').catch(() => false);

    if (vrSupported) {
      btnVR.disabled = false;
      btnVR.addEventListener('click', async () => {
        resumeAudio();
        if (renderer.xr.isPresenting) return;
        const session = await navigator.xr.requestSession('immersive-vr', {
          requiredFeatures: ['local-floor'],
          optionalFeatures: ['bounded-floor', 'hand-tracking'],
        });
        renderer.xr.setSession(session);
        btnVR.style.display = 'none';
        btnAR.style.display = 'none';
        btnExitXR.style.display = 'inline-block';
      });
    }
    if (arSupported) {
      btnAR.disabled = false;
      btnAR.addEventListener('click', async () => {
        resumeAudio();
        if (renderer.xr.isPresenting) return;
        const session = await navigator.xr.requestSession('immersive-ar', {
          requiredFeatures: ['local-floor', 'hit-test'],
        });
        renderer.xr.setSession(session);
        scene.background = null;
        btnVR.style.display = 'none';
        btnAR.style.display = 'none';
        btnExitXR.style.display = 'inline-block';
      });
    }
  }

  renderer.xr.addEventListener('sessionend', () => {
    btnVR.style.display = 'inline-block';
    btnAR.style.display = 'inline-block';
    btnExitXR.style.display = 'none';
    scene.background = new THREE.Color(0x0a0705);
  });

  btnExitXR.addEventListener('click', () => {
    if (renderer.xr.isPresenting) renderer.xr.getSession()?.end();
  });
}
setupXRButtons();

/* ================================================================
   RESET BUTTON
================================================================ */
document.getElementById('btn-reset').addEventListener('click', () => {
  if (confirm('スコアデータをリセットしますか？\nReset all scores?')) {
    localStorage.removeItem('echizen_scores');
    alert('リセット完了');
  }
});

/* ================================================================
   INITIAL STATE
================================================================ */
currentState = State.INTRO;
setVisibility();
onEnterState(State.INTRO, null);

/* ================================================================
   ANIMATION LOOP
================================================================ */
let lastTime = 0;

renderer.setAnimationLoop((t) => {
  if (lastTime === 0) lastTime = t;
  const delta = Math.min((t - lastTime) / 1000, 0.033);
  lastTime = t;

  // Animate ambient particles
  const ppos = particles.geometry.attributes.position.array;
  for (let i = 0; i < particleCount; i++) {
    ppos[i*3+1] += delta * (0.1 + Math.random()*0.05);
    if (ppos[i*3+1] > 3.5) { ppos[i*3+1] = 0; }
  }
  particles.geometry.attributes.position.needsUpdate = true;

  // Billboard info panel to camera
  if (infoPanelMesh) {
    const cam = renderer.xr.isPresenting ? renderer.xr.getCamera() : camera;
    infoPanelMesh.quaternion.copy(cam.quaternion);
  }

  // Update sparks
  updateSparks(delta);

  // Global input
  handleGlobalInput();

  // Phase-specific
  switch(currentState) {
    case State.INTRO:       updateIntro(delta);       break;
    case State.FORGING:     updateForging(delta);     break;
    case State.SHAPING:     updateShaping(delta);     break;
    case State.SHARPENING:  updateSharpening(delta);  break;
    case State.RESULT:      updateResult(delta);      break;
  }

  renderer.render(scene, camera);
});

/* ================================================================
   KEYBOARD CAMERA CONTROL (non-VR)
================================================================ */
window.addEventListener('keydown', (e) => {
  if (isVRActive()) return;
  const speed = 0.15;
  switch(e.code) {
    case 'ArrowUp':    camera.position.z -= speed; break;
    case 'ArrowDown':  camera.position.z += speed; break;
    case 'ArrowLeft':  camera.position.x -= speed; break;
    case 'ArrowRight': camera.position.x += speed; break;
  }
});
