<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>越前打刃物 | Echizen Hamono VR</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #111; color: #fff; font-family: sans-serif; overflow: hidden; }
  #canvas-container { width: 100vw; height: 100vh; }
  #hud {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    pointer-events: none; z-index: 10;
  }
  #browser-ui {
    position: fixed; bottom: 16px; left: 50%; transform: translateX(-50%);
    display: flex; gap: 8px; z-index: 20; pointer-events: all;
  }
  .ui-btn {
    background: rgba(30,30,30,0.85); color: #ddd; border: 1px solid #555;
    padding: 8px 16px; border-radius: 6px; cursor: pointer; font-size: 13px;
    backdrop-filter: blur(4px); transition: background 0.2s;
  }
  .ui-btn:hover { background: rgba(60,60,60,0.9); }
  .ui-btn.danger { border-color: #c44; color: #f88; }
  .ui-btn.danger:hover { background: rgba(80,20,20,0.9); }
  #vr-mode-btn { border-color: #48a; color: #8df; }
  #ar-mode-btn { border-color: #4a8; color: #8fd; }
  #nonvr-hint {
    position: fixed; top: 16px; left: 50%; transform: translateX(-50%);
    background: rgba(20,20,20,0.8); color: #aaa; font-size: 12px;
    padding: 6px 14px; border-radius: 20px; border: 1px solid #333;
    pointer-events: none; z-index: 20; text-align: center; line-height: 1.6;
  }
  #phase-indicator {
    position: fixed; top: 16px; right: 16px;
    background: rgba(20,20,20,0.7); color: #ccc; font-size: 12px;
    padding: 6px 12px; border-radius: 16px; border: 1px solid #444;
    z-index: 20; pointer-events: none;
  }
</style>
</head>
<body>
<div id="canvas-container"></div>
<div id="phase-indicator" id="phase-indicator">INTRO</div>
<div id="nonvr-hint">
  Non-VR Mode | Mouse: ハンマー操作 / Click: 打撃 | WASD: 左手移動 | N: Aボタン | P: Bボタン | X: 左手X | Arrow: 視点
</div>
<div id="browser-ui">
  <button class="ui-btn" id="vr-mode-btn">▶ Enter VR</button>
  <button class="ui-btn" id="ar-mode-btn">◈ Enter AR</button>
  <button class="ui-btn danger" id="reset-btn">🗑 スコアリセット</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// ============================================================
// 越前打刃物 VR App
// Three.js r128 + WebXR
// ============================================================

// ─── CONSTANTS ───────────────────────────────────────────────
const PARAMS = {
  FORGING: {
    TOTAL_HITS: 30,
    TEMP_HEAT_RATE: 25,      // per second in furnace
    TEMP_COOL_RATE: 8,       // per second in air
    TEMP_MIN_FORGE: 40,      // minimum temp to forge
    VELOCITY_THRESHOLD: 1.2,
    SPARK_COUNT: 80,
    DISTORTION_MISS: 2,
    DISTORTION_GOOD: 1,
    DISTORTION_PERFECT: -0.5,
  },
  SHAPING: {
    MAX_HITS: 100,
    ZONE_COUNT: 6,
    SMALL_PENALTY: 0.3,
    POWER_MIN: 1,
    POWER_MAX: 6,
    POWER_SCALE: 3,
  },
  SHARPENING: {
    TOTAL_STROKES: 30,
    STROKE_DIST_THRESHOLD: 0.05,
    ANGLE_ERROR_SCALE: 10,
  },
};

// ─── STATE MACHINE ───────────────────────────────────────────
const State = {
  INTRO: 'INTRO', FORGING: 'FORGING', SHAPING: 'SHAPING',
  SHARPENING: 'SHARPENING', RESULT: 'RESULT',
};
let currentState = State.INTRO;

// ─── BLADE DATA ──────────────────────────────────────────────
let bladeState = { shapeDistortion: 0, symmetryError: 0, sharpness: 0 };

// ─── THREE.JS SETUP ──────────────────────────────────────────
const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.xr.enabled = true;
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
document.getElementById('canvas-container').appendChild(renderer.domElement);

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0a0a14);
scene.fog = new THREE.Fog(0x0a0a14, 8, 20);

const camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.01, 50);
camera.position.set(0, 1.6, 0);

// XR Rig
const xrRig = new THREE.Group();
xrRig.position.set(0, 0, 0);
scene.add(xrRig);
xrRig.add(camera);

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// ─── LIGHTING ────────────────────────────────────────────────
const ambientLight = new THREE.AmbientLight(0x1a1a2e, 1.5);
scene.add(ambientLight);
const dirLight = new THREE.DirectionalLight(0xffeedd, 1.2);
dirLight.position.set(2, 4, 2);
dirLight.castShadow = true;
scene.add(dirLight);
// Forge glow light (dynamic)
const forgeLight = new THREE.PointLight(0xff4400, 0, 3);
forgeLight.position.set(-1.5, 0.8, -1.5);
scene.add(forgeLight);

// ─── WEB AUDIO ───────────────────────────────────────────────
let audioCtx = null;
function ensureAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
}
function playTone(freq, type, duration, gain = 0.3, decay = true) {
  ensureAudio();
  const osc = audioCtx.createOscillator();
  const gainNode = audioCtx.createGain();
  osc.connect(gainNode); gainNode.connect(audioCtx.destination);
  osc.type = type; osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
  gainNode.gain.setValueAtTime(gain, audioCtx.currentTime);
  if (decay) gainNode.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
  osc.start(); osc.stop(audioCtx.currentTime + duration);
}
function playHammer(quality) {
  // quality: 'perfect', 'good', 'miss'
  ensureAudio();
  const buf = audioCtx.createBuffer(1, audioCtx.sampleRate * 0.15, audioCtx.sampleRate);
  const d = buf.getChannelData(0);
  for (let i = 0; i < d.length; i++) {
    const t = i / audioCtx.sampleRate;
    const env = Math.exp(-t * (quality === 'perfect' ? 12 : quality === 'good' ? 20 : 40));
    d[i] = (Math.random() * 2 - 1) * env * (quality === 'miss' ? 0.3 : 1);
  }
  const src = audioCtx.createBufferSource();
  const gainNode = audioCtx.createGain();
  gainNode.gain.value = quality === 'perfect' ? 0.6 : quality === 'good' ? 0.4 : 0.15;
  src.buffer = buf; src.connect(gainNode); gainNode.connect(audioCtx.destination);
  src.start();
  if (quality === 'perfect') playTone(180, 'sine', 0.3, 0.2);
  if (quality === 'good') playTone(120, 'sine', 0.2, 0.1);
}
function playSharpen(angleScore) {
  ensureAudio();
  const freq = 400 + (angleScore / 100) * 600;
  playTone(freq, 'sawtooth', 0.08, 0.12, true);
}
function playTransition() {
  ensureAudio();
  [440, 550, 660].forEach((f, i) => {
    setTimeout(() => playTone(f, 'sine', 0.3, 0.2), i * 100);
  });
}
function playVibrate(ctrl, duration = 50, intensity = 0.5) {
  if (ctrl?.gamepad?.hapticActuators?.[0]) {
    ctrl.gamepad.hapticActuators[0].pulse(intensity, duration);
  }
}

// ─── CONTROLLER SETUP ────────────────────────────────────────
let rightController = null, leftController = null;

// Try to use XRControllerModelFactory if available (CDN not loaded, use fallback)
const ctrl0 = renderer.xr.getController(0);
const ctrl1 = renderer.xr.getController(1);
const grip0 = renderer.xr.getControllerGrip(0);
const grip1 = renderer.xr.getControllerGrip(1);

function makeRayLine(color = 0x88aaff) {
  const mat = new THREE.LineBasicMaterial({ color, transparent: true, opacity: 0.5 });
  const geo = new THREE.BufferGeometry().setFromPoints([
    new THREE.Vector3(0, 0, 0), new THREE.Vector3(0, 0, -1)
  ]);
  return new THREE.Line(geo, mat);
}
const ray0 = makeRayLine(); ctrl0.add(ray0);
const ray1 = makeRayLine(0xffaa88); ctrl1.add(ray1);

renderer.xr.addEventListener('sessionstart', () => {
  [ctrl0, ctrl1, grip0, grip1].forEach(obj => {
    if (obj.parent !== xrRig) {
      if (obj.parent) obj.parent.remove(obj);
      xrRig.add(obj);
    }
  });
});

function onCtrlConnected(e) {
  const ctrl = e.target, hand = e.data.handedness;
  if (hand === 'right') rightController = ctrl;
  else if (hand === 'left') leftController = ctrl;
}
function onCtrlDisconnected(e) {
  if (e.target === rightController) rightController = null;
  if (e.target === leftController) leftController = null;
}
[ctrl0, ctrl1].forEach(c => {
  c.addEventListener('connected', onCtrlConnected);
  c.addEventListener('disconnected', onCtrlDisconnected);
});
scene.add(ctrl0, ctrl1, grip0, grip1);

// Controller visual (simple capsule)
function makeCtrlMesh(color) {
  const g = new THREE.CylinderGeometry(0.02, 0.01, 0.12, 8);
  const m = new THREE.MeshStandardMaterial({ color, roughness: 0.5, metalness: 0.3 });
  const mesh = new THREE.Mesh(g, m);
  mesh.rotation.x = Math.PI / 2;
  return mesh;
}
ctrl0.add(makeCtrlMesh(0x336699));
ctrl1.add(makeCtrlMesh(0x996633));

// ─── SPARK SYSTEM (InstancedMesh) ────────────────────────────
const SPARK_MAX = 80;
const sparkGeo = new THREE.SphereGeometry(0.008, 4, 4);
const sparkMat = new THREE.MeshBasicMaterial({ color: 0xffaa22 });
const sparkMesh = new THREE.InstancedMesh(sparkGeo, sparkMat, SPARK_MAX);
sparkMesh.frustumCulled = false;
scene.add(sparkMesh);

const sparks = Array.from({ length: SPARK_MAX }, () => ({
  active: false, pos: new THREE.Vector3(), vel: new THREE.Vector3(),
  life: 0, maxLife: 0,
}));
const _sparkMatrix = new THREE.Matrix4();
const _sparkColor = new THREE.Color();

function emitSparks(origin, count, intensity) {
  let emitted = 0;
  for (let i = 0; i < SPARK_MAX && emitted < count; i++) {
    if (!sparks[i].active) {
      const s = sparks[i];
      s.active = true;
      s.pos.copy(origin);
      s.vel.set(
        (Math.random() - 0.5) * intensity * 2,
        Math.random() * intensity * 2,
        (Math.random() - 0.5) * intensity * 2
      );
      s.life = 0;
      s.maxLife = 0.3 + Math.random() * 0.4;
      emitted++;
    }
  }
}

function updateSparks(delta) {
  for (let i = 0; i < SPARK_MAX; i++) {
    const s = sparks[i];
    if (!s.active) {
      _sparkMatrix.makeScale(0, 0, 0);
      sparkMesh.setMatrixAt(i, _sparkMatrix);
      continue;
    }
    s.life += delta;
    if (s.life >= s.maxLife) { s.active = false; continue; }
    s.vel.y -= 3 * delta; // gravity
    s.pos.addScaledVector(s.vel, delta);
    const scale = (1 - s.life / s.maxLife) * 0.8;
    _sparkMatrix.makeTranslation(s.pos.x, s.pos.y, s.pos.z);
    _sparkMatrix.scale(new THREE.Vector3(scale, scale, scale));
    sparkMesh.setMatrixAt(i, _sparkMatrix);
    const heat = 1 - s.life / s.maxLife;
    _sparkColor.setHSL(0.08 * heat, 1, 0.5 + heat * 0.3);
    sparkMesh.setColorAt(i, _sparkColor);
  }
  sparkMesh.instanceMatrix.needsUpdate = true;
  if (sparkMesh.instanceColor) sparkMesh.instanceColor.needsUpdate = true;
}

// ─── SCENE OBJECTS (shared) ──────────────────────────────────
// Groups for each phase
const forgingGroup = new THREE.Group();
const shapingGroup = new THREE.Group();
const sharpeningGroup = new THREE.Group();
const introGroup = new THREE.Group();
const resultGroup = new THREE.Group();
scene.add(forgingGroup, shapingGroup, sharpeningGroup, introGroup, resultGroup);

// Helper: create text sprite
function makeTextSprite(text, opts = {}) {
  const { size = 64, color = '#fff', bg = 'rgba(0,0,0,0.7)', width = 256, height = 64 } = opts;
  const canvas = document.createElement('canvas');
  canvas.width = width; canvas.height = height;
  const ctx = canvas.getContext('2d');
  ctx.fillStyle = bg; ctx.fillRect(0, 0, width, height);
  ctx.fillStyle = color;
  ctx.font = `${size}px sans-serif`;
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText(text, width / 2, height / 2);
  const tex = new THREE.CanvasTexture(canvas);
  const mat = new THREE.SpriteMaterial({ map: tex, transparent: true });
  const sprite = new THREE.Sprite(mat);
  sprite.scale.set(width / 256, height / 256, 1);
  return sprite;
}

// ─── INTRO SCENE ─────────────────────────────────────────────
function buildIntro() {
  introGroup.clear();
  // Title panel
  const panelGeo = new THREE.PlaneGeometry(2, 1.2);
  const canvas = document.createElement('canvas');
  canvas.width = 512; canvas.height = 307;
  const ctx = canvas.getContext('2d');
  ctx.fillStyle = '#0a0a1e';
  ctx.fillRect(0, 0, 512, 307);
  ctx.fillStyle = '#c8a040';
  ctx.font = 'bold 48px sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText('越前打刃物', 256, 90);
  ctx.fillStyle = '#8899cc';
  ctx.font = '22px sans-serif';
  ctx.fillText('Echizen Hamono VR', 256, 145);
  ctx.fillStyle = '#667';
  ctx.font = '16px sans-serif';
  ctx.fillText('鍛造 → 成形 → 研ぎ', 256, 190);
  ctx.fillStyle = '#4a8';
  ctx.font = '18px sans-serif';
  ctx.fillText('【A ボタン / N キー】でスタート', 256, 250);
  const tex = new THREE.CanvasTexture(canvas);
  const mat = new THREE.MeshBasicMaterial({ map: tex, side: THREE.DoubleSide });
  const panel = new THREE.Mesh(panelGeo, mat);
  panel.position.set(0, 1.5, -2);
  introGroup.add(panel);

  // Decorative knife display
  const bladeGeo = new THREE.BoxGeometry(0.06, 0.01, 0.35);
  const bladeMat = new THREE.MeshStandardMaterial({ color: 0xaabbcc, metalness: 0.9, roughness: 0.2 });
  const blade = new THREE.Mesh(bladeGeo, bladeMat);
  blade.position.set(0, 1.0, -1.8);
  introGroup.add(blade);
  // Spin animation tag
  blade.userData.spin = true;

  // Floor
  const floorGeo = new THREE.PlaneGeometry(10, 10);
  const floorMat = new THREE.MeshStandardMaterial({ color: 0x111118, roughness: 0.9 });
  const floor = new THREE.Mesh(floorGeo, floorMat);
  floor.rotation.x = -Math.PI / 2;
  floor.receiveShadow = true;
  introGroup.add(floor);
}

// ─── FORGING SCENE ───────────────────────────────────────────
let forgingData = {
  hitCount: 0, shapeDistortion: 0, temperature: 0,
  ironOnWorkbench: false, ironInFurnace: false,
  ironPos: new THREE.Vector3(-1.5, 0.95, -1.5),
  hammerPos: new THREE.Vector3(0.3, 1.0, -0.5),
  prevHammerPos: new THREE.Vector3(),
  hammerSpeed: 0, triggerWasPressed: false,
  lastHitTime: 0,
};
let forgingObjects = {};

function buildForging() {
  forgingGroup.clear();
  forgingObjects = {};
  const fd = forgingData;
  fd.hitCount = 0; fd.shapeDistortion = 0; fd.temperature = 0;
  fd.ironOnWorkbench = false; fd.ironInFurnace = true;
  fd.ironPos.set(-1.5, 0.95, -1.5);

  // Floor
  const floor = new THREE.Mesh(
    new THREE.PlaneGeometry(6, 6),
    new THREE.MeshStandardMaterial({ color: 0x1a1008, roughness: 0.95 })
  );
  floor.rotation.x = -Math.PI / 2; floor.receiveShadow = true;
  forgingGroup.add(floor);

  // Furnace (left back)
  const furnaceBase = new THREE.Mesh(
    new THREE.BoxGeometry(0.8, 0.6, 0.8),
    new THREE.MeshStandardMaterial({ color: 0x332211, roughness: 0.9 })
  );
  furnaceBase.position.set(-1.5, 0.3, -1.5);
  furnaceBase.castShadow = true;
  forgingGroup.add(furnaceBase);
  // Furnace opening glow
  const glowMat = new THREE.MeshBasicMaterial({ color: 0xff4400 });
  const glowMesh = new THREE.Mesh(new THREE.PlaneGeometry(0.4, 0.3), glowMat);
  glowMesh.position.set(-1.5, 0.6, -1.12);
  forgingGroup.add(glowMesh);
  forgingObjects.furnaceGlow = glowMesh;
  // Furnace AABB
  forgingObjects.furnaceBox = new THREE.Box3(
    new THREE.Vector3(-1.9, 0.5, -1.9), new THREE.Vector3(-1.1, 1.2, -1.1)
  );

  // Workbench (center-right)
  const wbMesh = new THREE.Mesh(
    new THREE.BoxGeometry(0.9, 0.1, 0.5),
    new THREE.MeshStandardMaterial({ color: 0x3a2810, roughness: 0.8 })
  );
  wbMesh.position.set(0, 0.85, -1.2);
  wbMesh.castShadow = true; wbMesh.receiveShadow = true;
  forgingGroup.add(wbMesh);
  // Anvil on workbench
  const anvil = new THREE.Mesh(
    new THREE.BoxGeometry(0.5, 0.12, 0.28),
    new THREE.MeshStandardMaterial({ color: 0x333344, roughness: 0.5, metalness: 0.5 })
  );
  anvil.position.set(0, 0.96, -1.2);
  forgingGroup.add(anvil);
  forgingObjects.workbenchBox = new THREE.Box3(
    new THREE.Vector3(-0.3, 0.85, -1.5), new THREE.Vector3(0.3, 1.15, -0.9)
  );

  // Iron billet
  const ironMesh = new THREE.Mesh(
    new THREE.BoxGeometry(0.08, 0.04, 0.2),
    new THREE.MeshStandardMaterial({ color: 0x444444, roughness: 0.6, metalness: 0.4 })
  );
  ironMesh.position.copy(fd.ironPos);
  forgingGroup.add(ironMesh);
  forgingObjects.ironMesh = ironMesh;
  forgingObjects.ironBox = new THREE.Box3();

  // Hammer (attached to right controller / mouse)
  const hammerGroup = new THREE.Group();
  const hammerHead = new THREE.Mesh(
    new THREE.BoxGeometry(0.06, 0.06, 0.1),
    new THREE.MeshStandardMaterial({ color: 0x555566, roughness: 0.4, metalness: 0.7 })
  );
  const hammerHandle = new THREE.Mesh(
    new THREE.CylinderGeometry(0.01, 0.01, 0.3, 8),
    new THREE.MeshStandardMaterial({ color: 0x5a3a18, roughness: 0.9 })
  );
  hammerHandle.position.y = -0.18;
  hammerGroup.add(hammerHead, hammerHandle);
  forgingGroup.add(hammerGroup);
  forgingObjects.hammerGroup = hammerGroup;
  forgingObjects.hammerBox = new THREE.Box3();

  // HUD: progress bar + temperature display
  const hudCanvas = document.createElement('canvas');
  hudCanvas.width = 256; hudCanvas.height = 128;
  const hudCtx = hudCanvas.getContext('2d');
  const hudTex = new THREE.CanvasTexture(hudCanvas);
  const hudMesh = new THREE.Mesh(
    new THREE.PlaneGeometry(0.8, 0.4),
    new THREE.MeshBasicMaterial({ map: hudTex, transparent: true, side: THREE.DoubleSide })
  );
  hudMesh.position.set(0.8, 1.5, -1.5);
  forgingGroup.add(hudMesh);
  forgingObjects.hudMesh = hudMesh;
  forgingObjects.hudCanvas = hudCanvas;
  forgingObjects.hudCtx = hudCtx;
  forgingObjects.hudTex = hudTex;
}

function drawForgingHUD() {
  const fd = forgingData;
  const ctx = forgingObjects.hudCtx;
  const canvas = forgingObjects.hudCanvas;
  if (!ctx) return;
  ctx.clearRect(0, 0, 256, 128);
  ctx.fillStyle = 'rgba(10,10,20,0.85)';
  ctx.fillRect(0, 0, 256, 128);

  // Temperature bar
  const tempColor = fd.temperature < 40 ? '#445' :
    fd.temperature < 60 ? '#aa4400' :
    fd.temperature < 80 ? '#ff6600' : '#ffcc00';
  ctx.fillStyle = '#334'; ctx.fillRect(10, 10, 236, 20);
  ctx.fillStyle = tempColor;
  ctx.fillRect(10, 10, 236 * (fd.temperature / 100), 20);
  ctx.fillStyle = '#fff'; ctx.font = '14px sans-serif';
  ctx.textAlign = 'left';
  ctx.fillText(`🌡 ${Math.round(fd.temperature)}°`, 14, 24);

  // Hit counter
  ctx.fillStyle = '#aac'; ctx.font = '16px sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText(`打撃: ${fd.hitCount} / ${PARAMS.FORGING.TOTAL_HITS}`, 128, 60);

  // Distortion
  const distColor = fd.shapeDistortion < 30 ? '#4c8' : fd.shapeDistortion < 60 ? '#fa4' : '#f44';
  ctx.fillStyle = '#334'; ctx.fillRect(10, 75, 236, 16);
  ctx.fillStyle = distColor;
  ctx.fillRect(10, 75, 236 * (fd.shapeDistortion / 100), 16);
  ctx.fillStyle = '#aaa'; ctx.font = '12px sans-serif'; ctx.textAlign = 'left';
  ctx.fillText(`歪み: ${Math.round(fd.shapeDistortion)}%`, 14, 87);

  ctx.fillStyle = '#667'; ctx.font = '11px sans-serif'; ctx.textAlign = 'center';
  ctx.fillText('A:次へ  B:やり直し', 128, 112);
  forgingObjects.hudTex.needsUpdate = true;
}

function updateForging(delta) {
  const fd = forgingData;

  // Iron material temperature color
  if (forgingObjects.ironMesh) {
    const t = fd.temperature / 100;
    const col = new THREE.Color();
    col.setHSL(0.06 * (1 - t), 0.9, 0.15 + t * 0.5);
    forgingObjects.ironMesh.material.color.copy(col);
    forgingObjects.ironMesh.material.emissive = new THREE.Color(1, t * 0.5, 0).multiplyScalar(t * 0.8);
  }

  // Forge light intensity
  forgeLight.intensity = fd.ironInFurnace ? 2 + Math.sin(Date.now() * 0.005) * 0.5 : 0.3;

  // Temperature update
  if (fd.ironInFurnace) {
    fd.temperature = Math.min(100, fd.temperature + PARAMS.FORGING.TEMP_HEAT_RATE * delta);
  } else {
    fd.temperature = Math.max(0, fd.temperature - PARAMS.FORGING.TEMP_COOL_RATE * delta);
  }

  // Iron AABB
  if (forgingObjects.ironMesh) {
    forgingObjects.ironBox.setFromObject(forgingObjects.ironMesh);
  }

  // Get right-hand hammer position
  let hammerWorldPos = forgingData.hammerPos.clone();
  if (rightController) {
    rightController.getWorldPosition(hammerWorldPos);
  }
  // Hammer velocity
  const hammerDelta = hammerWorldPos.clone().sub(forgingData.prevHammerPos);
  fd.hammerSpeed = hammerDelta.length() / delta;
  forgingData.prevHammerPos.copy(hammerWorldPos);
  if (forgingObjects.hammerGroup) {
    forgingObjects.hammerGroup.position.copy(hammerWorldPos);
  }
  forgingObjects.hammerBox.setFromObject(forgingObjects.hammerGroup);

  // Trigger press detection
  const trigPressed = rightController?.gamepad?.buttons[0]?.pressed || mouseState.clicked;
  if (trigPressed && !fd.triggerWasPressed && fd.hitCount < PARAMS.FORGING.TOTAL_HITS) {
    fd.hitCount++;
    const isTiming = fd.ironOnWorkbench;
    const isVelocity = fd.hammerSpeed > PARAMS.FORGING.VELOCITY_THRESHOLD;
    const isHit = forgingObjects.hammerBox.intersectsBox(forgingObjects.ironBox);

    let result;
    if (isTiming && isVelocity && isHit) result = 'perfect';
    else if (isTiming && (isVelocity || isHit)) result = 'good';
    else result = 'miss';

    // Distortion
    if (result === 'miss') fd.shapeDistortion = Math.min(100, fd.shapeDistortion + PARAMS.FORGING.DISTORTION_MISS);
    else if (result === 'good') fd.shapeDistortion = Math.min(100, fd.shapeDistortion + PARAMS.FORGING.DISTORTION_GOOD);
    else fd.shapeDistortion = Math.max(0, fd.shapeDistortion + PARAMS.FORGING.DISTORTION_PERFECT);

    // Sparks
    if (isTiming) {
      const cnt = result === 'perfect' ? 20 : result === 'good' ? 10 : 2;
      const inten = result === 'perfect' ? 1.5 : result === 'good' ? 0.8 : 0.2;
      emitSparks(forgingObjects.ironMesh.position, cnt, inten);
    }
    playHammer(result);
    if (result !== 'miss') playVibrate(rightController, 60, result === 'perfect' ? 0.8 : 0.4);

    // Temp penalty on low-temp hit
    if (fd.temperature < PARAMS.FORGING.TEMP_MIN_FORGE && fd.ironOnWorkbench) {
      fd.shapeDistortion = Math.min(100, fd.shapeDistortion + 1.5);
    }
  }
  fd.triggerWasPressed = trigPressed;
  mouseState.clicked = false;

  // Left trigger/grip: grab iron
  const leftTrig = leftController?.gamepad?.buttons[0]?.pressed ||
                   leftController?.gamepad?.buttons[1]?.pressed || keyState['z'];
  // Simple zone-based placement
  if (leftTrig) {
    // Iron follows a virtual point between controllers / keyboard
    let leftPos = new THREE.Vector3(-0.3, 1.0, -0.8);
    if (leftController) leftController.getWorldPosition(leftPos);
    forgingObjects.ironMesh?.position.copy(leftPos);
    fd.ironPos.copy(leftPos);

    // Check placement
    fd.ironInFurnace = forgingObjects.furnaceBox.containsPoint(leftPos);
    fd.ironOnWorkbench = forgingObjects.workbenchBox.containsPoint(leftPos);
  }

  drawForgingHUD();
}

// ─── SHAPING SCENE ───────────────────────────────────────────
let shapingData = {
  hitCount: 0,
  zones: [],
  symmetryError: 0,
  hammerPos: new THREE.Vector3(0.3, 1.0, -0.5),
  prevHammerPos: new THREE.Vector3(),
  hammerSpeed: 0,
  triggerWasPressed: false,
  isFlipped: false, xBtnWasPressed: false,
  bladeMesh: null,
};
let shapingObjects = {};

function buildShaping() {
  shapingGroup.clear();
  shapingObjects = {};
  const sd = shapingData;
  sd.hitCount = 0; sd.isFlipped = false; sd.symmetryError = 0;

  // Floor
  const floor = new THREE.Mesh(
    new THREE.PlaneGeometry(6, 6),
    new THREE.MeshStandardMaterial({ color: 0x1a1008, roughness: 0.95 })
  );
  floor.rotation.x = -Math.PI / 2;
  shapingGroup.add(floor);

  // Workbench
  const wb = new THREE.Mesh(
    new THREE.BoxGeometry(1.2, 0.1, 0.6),
    new THREE.MeshStandardMaterial({ color: 0x3a2810, roughness: 0.8 })
  );
  wb.position.set(0, 0.85, -1.2);
  shapingGroup.add(wb);

  // Blade model: knife-like shape using merged boxes
  const bladeGroup = new THREE.Group();
  bladeGroup.position.set(0, 0.96, -1.2);

  // Zone count
  const zoneCount = PARAMS.SHAPING.ZONE_COUNT;
  sd.zones = [];
  const zoneWidth = 0.5 / zoneCount;

  for (let i = 0; i < zoneCount; i++) {
    const thickness = 0.014 - i * 0.001; // taper
    const height = 0.045 - Math.abs(i - zoneCount / 2) * 0.003;
    const geo = new THREE.BoxGeometry(zoneWidth, height, thickness);
    const mat = new THREE.MeshStandardMaterial({ color: 0x88aacc, roughness: 0.3, metalness: 0.8 });
    const mesh = new THREE.Mesh(geo, mat);
    mesh.position.x = (i - zoneCount / 2 + 0.5) * zoneWidth;
    bladeGroup.add(mesh);
    const box3 = new THREE.Box3();
    sd.zones.push({ mesh, mat, distortion: Math.random() * 15 + 5, box3 });
  }

  // Handle
  const handleGeo = new THREE.BoxGeometry(0.14, 0.025, 0.025);
  const handleMat = new THREE.MeshStandardMaterial({ color: 0x3a1a08, roughness: 0.9 });
  const handle = new THREE.Mesh(handleGeo, handleMat);
  handle.position.x = -(0.25 + 0.07);
  bladeGroup.add(handle);

  shapingGroup.add(bladeGroup);
  shapingObjects.bladeGroup = bladeGroup;

  // Hammer
  const hammerGroup = new THREE.Group();
  hammerGroup.add(new THREE.Mesh(
    new THREE.BoxGeometry(0.06, 0.06, 0.1),
    new THREE.MeshStandardMaterial({ color: 0x555566, roughness: 0.4, metalness: 0.7 })
  ));
  shapingGroup.add(hammerGroup);
  shapingObjects.hammerGroup = hammerGroup;
  shapingObjects.hammerBox = new THREE.Box3();

  // HUD
  const hudCanvas = document.createElement('canvas');
  hudCanvas.width = 256; hudCanvas.height = 128;
  const hudTex = new THREE.CanvasTexture(hudCanvas);
  const hudMesh = new THREE.Mesh(
    new THREE.PlaneGeometry(0.8, 0.4),
    new THREE.MeshBasicMaterial({ map: hudTex, transparent: true, side: THREE.DoubleSide })
  );
  hudMesh.position.set(0.8, 1.5, -1.5);
  shapingGroup.add(hudMesh);
  shapingObjects.hudMesh = hudMesh;
  shapingObjects.hudCanvas = hudCanvas;
  shapingObjects.hudCtx = hudCanvas.getContext('2d');
  shapingObjects.hudTex = hudTex;
}

function drawShapingHUD() {
  const sd = shapingData;
  const ctx = shapingObjects.hudCtx;
  if (!ctx) return;
  const canvas = shapingObjects.hudCanvas;
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  ctx.fillStyle = 'rgba(10,10,20,0.85)';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  ctx.fillStyle = '#aac'; ctx.font = '16px sans-serif'; ctx.textAlign = 'center';
  ctx.fillText(`打撃: ${sd.hitCount} / ${PARAMS.SHAPING.MAX_HITS}`, 128, 35);
  ctx.fillStyle = '#667'; ctx.font = '12px sans-serif';
  ctx.fillText(`対称誤差: ${Math.round(sd.symmetryError)}%`, 128, 60);
  ctx.fillStyle = '#4a8'; ctx.font = '11px sans-serif';
  ctx.fillText('赤=要修正 / 青=良好', 128, 85);
  ctx.fillStyle = '#667'; ctx.font = '11px sans-serif';
  ctx.fillText('A:次へ  B:やり直し  X:反転', 128, 108);
  shapingObjects.hudTex.needsUpdate = true;
}

function updateShaping(delta) {
  const sd = shapingData;

  // Update zone colors
  for (const z of sd.zones) {
    const t = Math.min(z.distortion / 100, 1);
    z.mat.color.setRGB(0.1 + t * 0.7, 0.3 + (1 - t) * 0.4, 0.6 + (1 - t) * 0.3);
    z.mat.emissive.setRGB(t * 0.3, 0, 0);
    z.box3.setFromObject(z.mesh);
  }

  // Flip with X button
  const xPressed = leftController?.gamepad?.buttons[4]?.pressed || keyState['x'];
  if (xPressed && !sd.xBtnWasPressed && shapingObjects.bladeGroup) {
    sd.isFlipped = !sd.isFlipped;
    const targetRot = sd.isFlipped ? Math.PI : 0;
    shapingObjects.bladeGroup.rotation.z = targetRot;
    playTone(600, 'sine', 0.2, 0.15);
  }
  sd.xBtnWasPressed = xPressed;

  // Hammer position
  let hammerWorldPos = sd.hammerPos.clone();
  if (rightController) rightController.getWorldPosition(hammerWorldPos);
  const hammerDelta = hammerWorldPos.clone().sub(sd.prevHammerPos);
  sd.hammerSpeed = hammerDelta.length() / delta;
  sd.prevHammerPos.copy(hammerWorldPos);
  if (shapingObjects.hammerGroup) shapingObjects.hammerGroup.position.copy(hammerWorldPos);
  shapingObjects.hammerBox.setFromObject(shapingObjects.hammerGroup);

  // Trigger
  const trigPressed = rightController?.gamepad?.buttons[0]?.pressed || mouseState.clicked;
  if (trigPressed && !sd.triggerWasPressed && sd.hitCount < PARAMS.SHAPING.MAX_HITS) {
    sd.hitCount++;
    // Find hit zone
    let hitZone = null;
    for (const z of sd.zones) {
      if (shapingObjects.hammerBox.intersectsBox(z.box3)) { hitZone = z; break; }
    }
    const power = THREE.MathUtils.clamp(
      sd.hammerSpeed * PARAMS.SHAPING.POWER_SCALE,
      PARAMS.SHAPING.POWER_MIN,
      PARAMS.SHAPING.POWER_MAX
    );
    if (hitZone) {
      hitZone.distortion = Math.max(0, hitZone.distortion - power);
      for (const z of sd.zones) {
        if (z !== hitZone) {
          z.distortion = Math.min(100, z.distortion + PARAMS.SHAPING.SMALL_PENALTY);
        }
      }
      emitSparks(shapingObjects.hammerGroup.position, 8, 0.8);
      playHammer('good');
    } else {
      // Missed blade entirely
      for (const z of sd.zones) z.distortion = Math.min(100, z.distortion + 0.5);
      playHammer('miss');
    }
    // Symmetry
    const distortions = sd.zones.map(z => z.distortion);
    sd.symmetryError = distortions.reduce((a, b) => a + b, 0) / distortions.length;
  }
  sd.triggerWasPressed = trigPressed;
  mouseState.clicked = false;

  drawShapingHUD();
}

// ─── SHARPENING SCENE ────────────────────────────────────────
let sharpeningData = {
  strokeCount: 0,
  lastDir: 0,
  travelSinceDir: 0,
  prevMidPos: new THREE.Vector3(),
  angleScore: 100,
  sharpness: 0,
  hudCanvas: null,
};
let sharpeningObjects = {};

function buildSharpening() {
  sharpeningGroup.clear();
  sharpeningObjects = {};
  const sd = sharpeningData;
  sd.strokeCount = 0; sd.lastDir = 0; sd.travelSinceDir = 0; sd.angleScore = 100;

  // Floor
  sharpeningGroup.add(new THREE.Mesh(
    new THREE.PlaneGeometry(6, 6),
    new THREE.MeshStandardMaterial({ color: 0x1a1008, roughness: 0.95 })
  ));
  sharpeningGroup.children[0].rotation.x = -Math.PI / 2;

  // Whetstone on table
  const tableGeo = new THREE.BoxGeometry(1.0, 0.1, 0.6);
  const table = new THREE.Mesh(tableGeo, new THREE.MeshStandardMaterial({ color: 0x3a2810, roughness: 0.8 }));
  table.position.set(0, 0.85, -1.2);
  sharpeningGroup.add(table);

  const stoneGeo = new THREE.BoxGeometry(0.4, 0.05, 0.12);
  const stone = new THREE.Mesh(stoneGeo, new THREE.MeshStandardMaterial({ color: 0x7a7a6a, roughness: 0.95 }));
  stone.position.set(0, 0.93, -1.2);
  sharpeningGroup.add(stone);
  sharpeningObjects.stone = stone;
  sharpeningObjects.stoneNormal = new THREE.Vector3(0, 1, 0);

  // Blade held by both hands
  const bladeGroup = new THREE.Group();
  const bladeGeo = new THREE.BoxGeometry(0.06, 0.01, 0.3);
  const bladeMat = new THREE.MeshStandardMaterial({ color: 0xaabbcc, metalness: 0.9, roughness: 0.1 });
  const bladeMesh = new THREE.Mesh(bladeGeo, bladeMat);
  bladeGroup.add(bladeMesh);
  bladeGroup.position.set(0, 1.0, -0.8);
  sharpeningGroup.add(bladeGroup);
  sharpeningObjects.bladeGroup = bladeGroup;

  // HUD
  const hudCanvas = document.createElement('canvas');
  hudCanvas.width = 256; hudCanvas.height = 128;
  sd.hudCanvas = hudCanvas;
  const hudTex = new THREE.CanvasTexture(hudCanvas);
  const hudMesh = new THREE.Mesh(
    new THREE.PlaneGeometry(0.8, 0.4),
    new THREE.MeshBasicMaterial({ map: hudTex, transparent: true, side: THREE.DoubleSide })
  );
  hudMesh.position.set(0.8, 1.5, -1.5);
  sharpeningGroup.add(hudMesh);
  sharpeningObjects.hudMesh = hudMesh;
  sharpeningObjects.hudTex = hudTex;
  sharpeningObjects.hudCtx = hudCanvas.getContext('2d');
}

function drawSharpeningHUD() {
  const sd = sharpeningData;
  const ctx = sharpeningObjects.hudCtx;
  if (!ctx) return;
  ctx.clearRect(0, 0, 256, 128);
  ctx.fillStyle = 'rgba(10,10,20,0.85)'; ctx.fillRect(0, 0, 256, 128);
  ctx.fillStyle = '#aac'; ctx.font = '16px sans-serif'; ctx.textAlign = 'center';
  ctx.fillText(`ストローク: ${sd.strokeCount} / ${PARAMS.SHARPENING.TOTAL_STROKES}`, 128, 35);
  const aq = sd.angleScore;
  const col = aq > 75 ? '#4d8' : aq > 40 ? '#fa4' : '#f44';
  ctx.fillStyle = col; ctx.font = '14px sans-serif';
  ctx.fillText(`角度スコア: ${Math.round(aq)}`, 128, 62);
  ctx.fillStyle = '#334'; ctx.fillRect(20, 75, 216, 14);
  ctx.fillStyle = col; ctx.fillRect(20, 75, 216 * (sd.angleScore / 100), 14);
  ctx.fillStyle = '#667'; ctx.font = '11px sans-serif';
  ctx.fillText('A:次へ  B:やり直し', 128, 112);
  sharpeningObjects.hudTex.needsUpdate = true;
}

const _stoneForward = new THREE.Vector3(1, 0, 0);
const _tmpVec = new THREE.Vector3();

function updateSharpening(delta) {
  const sd = sharpeningData;

  // Midpoint of both hands
  let midPos = new THREE.Vector3(0, 0.95, -1.2);
  if (rightController && leftController) {
    const rp = new THREE.Vector3(), lp = new THREE.Vector3();
    rightController.getWorldPosition(rp);
    leftController.getWorldPosition(lp);
    midPos.lerpVectors(lp, rp, 0.5);
  } else if (rightController) {
    rightController.getWorldPosition(midPos);
  }

  // Blade follows mid
  if (sharpeningObjects.bladeGroup) {
    sharpeningObjects.bladeGroup.position.copy(midPos);
  }

  // Stroke detection
  _tmpVec.copy(midPos).sub(sd.prevMidPos);
  const dist = _tmpVec.length();
  const dot = _tmpVec.dot(_stoneForward);
  const dir = dot >= 0 ? 1 : -1;

  if (dist > 0.001) {
    sd.travelSinceDir += dist;
    if (dir !== sd.lastDir && sd.travelSinceDir > PARAMS.SHARPENING.STROKE_DIST_THRESHOLD) {
      sd.strokeCount++;
      sd.travelSinceDir = 0;

      // Angle: compare blade tilt vs stone normal
      const bladeNormal = new THREE.Vector3(0, 1, 0);
      if (sharpeningObjects.bladeGroup) {
        bladeNormal.applyQuaternion(sharpeningObjects.bladeGroup.quaternion);
      }
      const stoneNorm = sharpeningObjects.stoneNormal;
      const dot2 = THREE.MathUtils.clamp(bladeNormal.dot(stoneNorm), -1, 1);
      const angleError = Math.abs(Math.acos(dot2) * THREE.MathUtils.RAD2DEG - 15); // ideal 15deg
      sd.angleScore = THREE.MathUtils.clamp(100 - angleError * PARAMS.SHARPENING.ANGLE_ERROR_SCALE, 0, 100);

      playSharpen(sd.angleScore);
      const isGood = sd.angleScore > 50;
      playVibrate(rightController, 30, isGood ? 0.3 : 0.7);
      if (isGood) emitSparks(midPos, 3, 0.3);
    }
    sd.lastDir = dir;
  }
  sd.prevMidPos.copy(midPos);

  drawSharpeningHUD();
}

// ─── RESULT SCENE ────────────────────────────────────────────
let resultData = { finalScore: 0, isNewBest: false };
let resultObjects = {};

function computeFinalScore() {
  const s = bladeState;
  return Math.round(
    (100 - s.shapeDistortion) * 0.4 +
    (100 - s.symmetryError) * 0.3 +
    s.sharpness * 0.3
  );
}

function getRank(score) {
  if (score >= 85) return { ja: '名人', en: 'Master', color: '#ffd700' };
  if (score >= 65) return { ja: '職人', en: 'Craftsman', color: '#c0c0c0' };
  return { ja: '見習い', en: 'Apprentice', color: '#cd7f32' };
}

function saveScore(score) {
  let scores = [];
  try { scores = JSON.parse(localStorage.getItem('echizenScores') || '[]'); } catch {}
  const now = new Date();
  const dateStr = now.toISOString().slice(0, 16).replace('T', ' ');
  scores.push({ score, date: dateStr });
  scores.sort((a, b) => b.score - a.score);
  scores = scores.slice(0, 5);
  localStorage.setItem('echizenScores', JSON.stringify(scores));
  return scores;
}

function buildResult() {
  resultGroup.clear();
  resultObjects = {};

  const score = computeFinalScore();
  resultData.finalScore = score;
  const scores = saveScore(score);
  resultData.isNewBest = scores[0].score === score && scores.filter(s => s.score === score).length === 1;

  const rank = getRank(score);

  // Billboard canvas panel
  const canvas = document.createElement('canvas');
  canvas.width = 512; canvas.height = 640;
  const ctx = canvas.getContext('2d');

  // Background
  ctx.fillStyle = '#0a0a1e';
  ctx.fillRect(0, 0, 512, 640);
  ctx.strokeStyle = '#334';
  ctx.lineWidth = 2;
  ctx.strokeRect(4, 4, 504, 632);

  // Title
  ctx.fillStyle = '#8899cc';
  ctx.font = 'bold 22px sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText('── 結果 ──', 256, 40);

  // Rank
  ctx.fillStyle = rank.color;
  ctx.font = 'bold 32px sans-serif';
  ctx.fillText(`${rank.ja}  ${rank.en}`, 256, 85);

  // Score
  if (resultData.isNewBest) {
    ctx.fillStyle = '#ffcc00';
    ctx.font = 'bold 14px sans-serif';
    ctx.fillText('★ NEW BEST ★', 256, 115);
  }
  ctx.fillStyle = '#ffffff';
  ctx.font = `bold 56px sans-serif`;
  ctx.fillText(`${score}点`, 256, 170);

  // Details
  ctx.strokeStyle = '#334'; ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(40, 190); ctx.lineTo(472, 190); ctx.stroke();
  ctx.textAlign = 'left'; ctx.font = '15px sans-serif';
  const details = [
    { label: '🔨 鍛造 (Forging)', value: Math.round((100 - bladeState.shapeDistortion) * 0.4), color: '#ff8844' },
    { label: '⚒ 成形 (Shaping)', value: Math.round((100 - bladeState.symmetryError) * 0.3), color: '#44aaff' },
    { label: '🪨 研ぎ (Sharpening)', value: Math.round(bladeState.sharpness * 0.3), color: '#44ffaa' },
  ];
  let dy = 210;
  for (const d of details) {
    ctx.fillStyle = d.color; ctx.fillText(d.label, 50, dy);
    ctx.fillStyle = '#fff'; ctx.textAlign = 'right';
    ctx.fillText(`${d.value}pt`, 460, dy);
    ctx.textAlign = 'left';
    dy += 28;
  }
  ctx.strokeStyle = '#334'; ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(40, dy + 4); ctx.lineTo(472, dy + 4); ctx.stroke();
  dy += 24;

  // Ranking
  ctx.fillStyle = '#8899cc'; ctx.font = 'bold 17px sans-serif'; ctx.textAlign = 'center';
  ctx.fillText('─ ランキング TOP 5 ─', 256, dy);
  dy += 26;
  ctx.font = '14px sans-serif';
  for (let i = 0; i < scores.length; i++) {
    const s = scores[i];
    const isMe = i === 0 && resultData.isNewBest;
    ctx.fillStyle = isMe ? '#ffd700' : (i === 0 ? '#fff' : '#889');
    ctx.textAlign = 'left';
    ctx.fillText(`${i + 1}位`, 50, dy);
    ctx.textAlign = 'center';
    ctx.fillText(`${s.score}点`, 200, dy);
    ctx.textAlign = 'right';
    ctx.font = '11px sans-serif';
    ctx.fillText(s.date, 462, dy);
    ctx.font = '14px sans-serif';
    dy += 26;
  }

  // Replay hint
  ctx.fillStyle = '#4a8'; ctx.font = '14px sans-serif'; ctx.textAlign = 'center';
  ctx.fillText('【A ボタン / N キー】でもう一度', 256, 610);

  const tex = new THREE.CanvasTexture(canvas);
  const panel = new THREE.Mesh(
    new THREE.PlaneGeometry(1.6, 2.0),
    new THREE.MeshBasicMaterial({ map: tex, side: THREE.DoubleSide })
  );
  panel.position.set(0, 1.6, -2.0);
  resultGroup.add(panel);
  resultObjects.panel = panel;

  // Spinning blade display (score-based)
  const bladeScale = score >= 85 ? 1.4 : score >= 65 ? 1.0 : 0.7;
  const bladeGroup = new THREE.Group();
  const bladeCol = score >= 85 ? 0xffffaa : score >= 65 ? 0xaaccff : 0x887766;
  const bGeo = new THREE.BoxGeometry(0.06 * bladeScale, 0.008 * bladeScale, 0.32 * bladeScale);
  const bMat = new THREE.MeshStandardMaterial({ color: bladeCol, metalness: 0.9, roughness: 0.1 });
  bladeGroup.add(new THREE.Mesh(bGeo, bMat));
  bladeGroup.position.set(1.1, 1.6, -2.0);
  resultGroup.add(bladeGroup);
  resultObjects.bladeGroup = bladeGroup;
}

function updateResult(delta) {
  // Billboard: face camera
  if (resultObjects.panel) {
    const camPos = new THREE.Vector3();
    camera.getWorldPosition(camPos);
    resultObjects.panel.lookAt(camPos);
  }
  // Spin blade
  if (resultObjects.bladeGroup) {
    resultObjects.bladeGroup.rotation.y += delta * 1.2;
  }
}

// ─── STATE TRANSITIONS ───────────────────────────────────────
function setAllGroupsVisible(visible) {
  [forgingGroup, shapingGroup, sharpeningGroup, introGroup, resultGroup].forEach(g => {
    g.visible = false;
  });
}

function enterState(newState) {
  setAllGroupsVisible(false);
  currentState = newState;
  document.getElementById('phase-indicator').textContent = newState;

  switch (newState) {
    case State.INTRO:
      introGroup.visible = true;
      buildIntro();
      break;
    case State.FORGING:
      forgingGroup.visible = true;
      buildForging();
      forgeLight.intensity = 2;
      playTransition();
      break;
    case State.SHAPING:
      shapingGroup.visible = true;
      bladeState.shapeDistortion = forgingData.shapeDistortion;
      buildShaping();
      playTransition();
      break;
    case State.SHARPENING:
      sharpeningGroup.visible = true;
      bladeState.symmetryError = shapingData.symmetryError;
      buildSharpening();
      playTransition();
      break;
    case State.RESULT:
      resultGroup.visible = true;
      // compute sharpness
      const sData = sharpeningData;
      const efficiency = THREE.MathUtils.clamp(1 - bladeState.symmetryError * 0.01, 0.5, 1);
      bladeState.sharpness = THREE.MathUtils.clamp(sData.angleScore * efficiency, 0, 100);
      buildResult();
      playTransition();
      break;
  }
}

function nextState() {
  ensureAudio();
  const order = [State.INTRO, State.FORGING, State.SHAPING, State.SHARPENING, State.RESULT];
  const idx = order.indexOf(currentState);
  if (idx < order.length - 1) enterState(order[idx + 1]);
  else enterState(State.INTRO); // RESULT → INTRO
}

function restartCurrentState() {
  ensureAudio();
  enterState(currentState);
}

// ─── INPUT HANDLING ──────────────────────────────────────────
let wasAPressed = false, wasBPressed = false;
const mouseState = { x: 0, y: 0, clicked: false };
const keyState = {};

// Non-VR mouse control
document.addEventListener('mousemove', (e) => {
  mouseState.x = (e.clientX / window.innerWidth) * 2 - 1;
  mouseState.y = -(e.clientY / window.innerHeight) * 2 + 1;
  // Move hammer in non-VR mode
  forgingData.hammerPos.set(mouseState.x * 0.6, 1.1 + mouseState.y * 0.4, -0.8);
  shapingData.hammerPos.set(mouseState.x * 0.6, 1.1 + mouseState.y * 0.4, -0.8);
});
document.addEventListener('click', () => { ensureAudio(); mouseState.clicked = true; });
document.addEventListener('keydown', (e) => {
  keyState[e.key.toLowerCase()] = true;
  if (e.key.toLowerCase() === 'n') { ensureAudio(); nextState(); }
  if (e.key.toLowerCase() === 'p') { ensureAudio(); restartCurrentState(); }
});
document.addEventListener('keyup', (e) => { keyState[e.key.toLowerCase()] = false; });

// Arrow key camera rotation (non-VR)
const camEuler = new THREE.Euler(0, 0, 0, 'YXZ');
function handleNonVRInput(delta) {
  if (renderer.xr.isPresenting) return;
  const spd = 1.0 * delta;
  if (keyState['arrowleft']) camEuler.y += spd;
  if (keyState['arrowright']) camEuler.y -= spd;
  if (keyState['arrowup']) camEuler.x = Math.min(0.5, camEuler.x + spd);
  if (keyState['arrowdown']) camEuler.x = Math.max(-0.5, camEuler.x - spd);
  camera.quaternion.setFromEuler(camEuler);
}

function handleGlobalInput() {
  const aPressed = rightController?.gamepad?.buttons[4]?.pressed || keyState['n'];
  const bPressed = rightController?.gamepad?.buttons[5]?.pressed || keyState['p'];

  if (aPressed && !wasAPressed) nextState();
  wasAPressed = aPressed;

  if (bPressed && !wasBPressed) restartCurrentState();
  wasBPressed = bPressed;
}

// ─── AUTO-STATE TRANSITIONS ──────────────────────────────────
function updateStateAuto() {
  if (currentState === State.FORGING && forgingData.hitCount >= PARAMS.FORGING.TOTAL_HITS) {
    if (!forgingData._autoAdvanced) { forgingData._autoAdvanced = true; }
    // Prompt player to press A (don't auto-advance, spec says A button)
  }
  if (currentState === State.SHARPENING && sharpeningData.strokeCount >= PARAMS.SHARPENING.TOTAL_STROKES) {
    // Auto-advance to result after strokes done
    if (!sharpeningData._autoAdvanced) {
      sharpeningData._autoAdvanced = true;
      setTimeout(() => enterState(State.RESULT), 800);
    }
  }
}

// ─── VR / AR BUTTONS ─────────────────────────────────────────
let currentSession = null;

async function startXR(mode) {
  ensureAudio();
  if (!navigator.xr) { alert('WebXR not supported'); return; }
  const supported = await navigator.xr.isSessionSupported(mode).catch(() => false);
  if (!supported) { alert(`${mode} not supported on this device`); return; }
  if (currentSession) { await currentSession.end(); currentSession = null; return; }
  const opts = mode === 'immersive-ar'
    ? { requiredFeatures: ['hit-test'], optionalFeatures: ['dom-overlay'], domOverlay: { root: document.getElementById('browser-ui') } }
    : { optionalFeatures: ['local-floor', 'bounded-floor'] };
  const session = await navigator.xr.requestSession(mode, opts);
  renderer.xr.setSession(session);
  currentSession = session;
  session.addEventListener('end', () => { currentSession = null; });
  document.getElementById('vr-mode-btn').textContent = mode === 'immersive-vr' ? '✕ Exit VR' : '▶ Enter VR';
  document.getElementById('ar-mode-btn').textContent = mode === 'immersive-ar' ? '✕ Exit AR' : '◈ Enter AR';
}

document.getElementById('vr-mode-btn').onclick = () => startXR('immersive-vr');
document.getElementById('ar-mode-btn').onclick = () => startXR('immersive-ar');
document.getElementById('reset-btn').onclick = () => {
  if (confirm('スコアをリセットしますか？\nReset all scores?')) {
    localStorage.removeItem('echizenScores');
    alert('リセットしました');
  }
};

// ─── MAIN LOOP ───────────────────────────────────────────────
let lastTime = 0;

renderer.setAnimationLoop((t) => {
  if (!lastTime) lastTime = t;
  const delta = Math.min((t - lastTime) / 1000, 0.033);
  lastTime = t;

  handleNonVRInput(delta);
  handleGlobalInput();

  // Phase update
  switch (currentState) {
    case State.INTRO:
      // Spin display blade
      introGroup.traverse(obj => { if (obj.userData.spin) obj.rotation.y += delta * 0.8; });
      break;
    case State.FORGING:    updateForging(delta); break;
    case State.SHAPING:    updateShaping(delta); break;
    case State.SHARPENING: updateSharpening(delta); break;
    case State.RESULT:     updateResult(delta); break;
  }

  updateSparks(delta);
  updateStateAuto();
  renderer.render(scene, camera);
});

// ─── INIT ────────────────────────────────────────────────────
enterState(State.INTRO);

// Check WebXR availability
navigator.xr?.isSessionSupported('immersive-vr').then(ok => {
  if (!ok) {
    document.getElementById('vr-mode-btn').style.opacity = '0.4';
    document.getElementById('vr-mode-btn').title = 'VR not supported';
  }
});
navigator.xr?.isSessionSupported('immersive-ar').then(ok => {
  if (!ok) {
    document.getElementById('ar-mode-btn').style.opacity = '0.4';
    document.getElementById('ar-mode-btn').title = 'AR not supported';
  }
});
</script>
</body>
