<script type="module">
import * as THREE from 'three';

// ════════════════════════════════════════════════════════════
//  CONSTANTS & CONFIG
// ════════════════════════════════════════════════════════════
const CFG = {
  FORGING: {
    totalHits: 30,
    heatRate: 200,        // °/sec in furnace
    coolRate: 40,         // °/sec ambient
    minHitTemp: 500,      // below = forced Miss
    velocityThreshold: 0.8,
    sparks: { perfect: 60, good: 30, miss: 5 },
  },
  SHAPING: {
    maxHits: 100,
    zoneCount: 5,
    power: { min: 0.5, max: 8 },
    penalty: 0.25,
    velScale: 4,
  },
  SHARPENING: {
    totalStrokes: 30,
    strokeThreshold: 0.04,
    angleOptimal: 15,  // degrees
    angleWeight: 8,
  },
};

// ════════════════════════════════════════════════════════════
//  STATE MACHINE
// ════════════════════════════════════════════════════════════
const State = {
  INTRO:'INTRO', FORGING:'FORGING', SHAPING:'SHAPING',
  SHARPENING:'SHARPENING', RESULT:'RESULT',
};
let currentState = State.INTRO;
let transitioning = false;

// Shared blade quality data across phases
const bladeState = { shapeDistortion:0, symmetryError:0, sharpness:0 };

// ════════════════════════════════════════════════════════════
//  RENDERER + SCENE
// ════════════════════════════════════════════════════════════
const canvas = document.getElementById('c');
const renderer = new THREE.WebGLRenderer({ canvas, antialias:true });
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.setSize(innerWidth, innerHeight);
renderer.xr.enabled = true;

renderer.shadowMap.type = THREE.PCFSoftShadowMap;

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x100502);
scene.fog = new THREE.FogExp2(0x100502, 0.1);

const camera = new THREE.PerspectiveCamera(70, innerWidth/innerHeight, 0.01, 50);
camera.position.set(0, 1.6, 0);

// ── Lighting ──
const ambientLight = new THREE.AmbientLight(0x331100, 1.0);
scene.add(ambientLight);

sunLight.shadow.mapSize.set(1024,1024);

// ════════════════════════════════════════════════════════════
//  WEB AUDIO
// ════════════════════════════════════════════════════════════
let audioCtx = null;

function ensureAudio() {
  if(!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if(audioCtx.state === 'suspended') audioCtx.resume();
}

// Distortion curve for metallic hit sound
function makeDistCurve(amount) {
  const n = 256, c = new Float32Array(n);
  for(let i=0;i<n;i++){const x=i*2/n-1; c[i]=x*(Math.PI+amount)/(Math.PI+amount*Math.abs(x));}
  return c;
}

function playHit(quality) { // 0=miss 1=good 2=perfect
  ensureAudio();
  const t = audioCtx.currentTime;
  const osc = audioCtx.createOscillator();
  const shaper = audioCtx.createWaveShaper();
  const gain = audioCtx.createGain();
  shaper.curve = makeDistCurve(200);
  osc.connect(shaper); shaper.connect(gain); gain.connect(audioCtx.destination);
  osc.frequency.value = [100, 220, 380][quality];
  osc.type = 'sawtooth';
  const vol = [0.06, 0.2, 0.45][quality];
  gain.gain.setValueAtTime(vol, t);
  gain.gain.exponentialRampToValueAtTime(0.0001, t + [0.15, 0.25, 0.4][quality]);
  osc.start(t); osc.stop(t + 0.5);
}

function playSharpening(angle) {
  ensureAudio();
  const t = audioCtx.currentTime;
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.connect(gain); gain.connect(audioCtx.destination);
  const err = Math.abs(angle - CFG.SHARPENING.angleOptimal);
  osc.frequency.value = 900 + (1 - Math.min(err/30,1)) * 600; // higher pitch = better angle
  osc.type = 'sawtooth';
  gain.gain.setValueAtTime(0.12, t);
  gain.gain.exponentialRampToValueAtTime(0.0001, t + 0.18);
  osc.start(t); osc.stop(t + 0.2);
}

function playTransition() {
  ensureAudio();
  const t = audioCtx.currentTime;
  [440, 554, 659, 880].forEach((f, i) => {
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.connect(gain); gain.connect(audioCtx.destination);
    osc.frequency.value = f; osc.type = 'sine';
    gain.gain.setValueAtTime(0, t + i*0.1);
    gain.gain.linearRampToValueAtTime(0.3, t + i*0.1 + 0.06);
    gain.gain.exponentialRampToValueAtTime(0.0001, t + i*0.1 + 0.6);
    osc.start(t + i*0.1); osc.stop(t + i*0.1 + 0.7);
  });
}

function playHeatCrackle() {
  ensureAudio();
  const t = audioCtx.currentTime;
  const buf = audioCtx.createBuffer(1, audioCtx.sampleRate*0.4, audioCtx.sampleRate);
  const d = buf.getChannelData(0);
  for(let i=0;i<d.length;i++) d[i] = (Math.random()*2-1)*0.15;
  const src = audioCtx.createBufferSource();
  const filter = audioCtx.createBiquadFilter();
  const gain = audioCtx.createGain();
  filter.type = 'highpass'; filter.frequency.value = 1000;
  src.buffer = buf;
  src.connect(filter); filter.connect(gain); gain.connect(audioCtx.destination);
  gain.gain.setValueAtTime(0.08, t);
  gain.gain.exponentialRampToValueAtTime(0.0001, t + 0.4);
  src.start(t);
}

function playResult(score) {
  ensureAudio();
  const t = audioCtx.currentTime;
  const scale = score>70 ? [523,659,784,1047] : score>40 ? [440,523,659] : [330,392,494];
  scale.forEach((f, i) => {
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.connect(gain); gain.connect(audioCtx.destination);
    osc.frequency.value = f; osc.type = 'sine';
    const start = t + i*0.18;
    gain.gain.setValueAtTime(0, start);
    gain.gain.linearRampToValueAtTime(0.35, start+0.06);
    gain.gain.exponentialRampToValueAtTime(0.0001, start+1.2);
    osc.start(start); osc.stop(start+1.3);
  });
}

// ════════════════════════════════════════════════════════════
//  SPARK SYSTEM  (InstancedMesh, max 80, gravity physics)
// ════════════════════════════════════════════════════════════
const SPARK_MAX = 80;
const sparkGeo  = new THREE.SphereGeometry(0.007, 4, 4);
const sparkMat  = new THREE.MeshBasicMaterial({ color:0xffaa00 });
const sparkMesh = new THREE.InstancedMesh(sparkGeo, sparkMat, SPARK_MAX);
sparkMesh.count = 0;
sparkMesh.frustumCulled = false;
scene.add(sparkMesh);
// Pre-init instanceColor to avoid first-frame issues
sparkMesh.instanceColor = new THREE.InstancedBufferAttribute(
  new Float32Array(SPARK_MAX * 3), 3
);

const sparks = Array.from({length:SPARK_MAX}, () => ({
  active:false, life:0, maxLife:0,
  pos: new THREE.Vector3(),
  vel: new THREE.Vector3(),
}));
const _sm = new THREE.Matrix4();
const _sc = new THREE.Color();

function emitSparks(origin, count) {
  let n = 0;
  for(let i=0; i<SPARK_MAX && n<count; i++) {
    if(!sparks[i].active) {
      const s = sparks[i];
      s.active = true;
      s.pos.copy(origin);
      s.vel.set(
        (Math.random()-0.5)*3.5,
        Math.random()*3.5 + 0.5,
        (Math.random()-0.5)*3.5
      );
      s.maxLife = 0.35 + Math.random()*0.45;
      s.life = s.maxLife;
      n++;
    }
  }
}

function updateSparks(delta) {
  let cnt = 0;
  for(let i=0; i<SPARK_MAX; i++) {
    const s = sparks[i];
    if(!s.active) continue;
    s.life -= delta;
    if(s.life <= 0) { s.active = false; continue; }
    s.vel.y -= 9.8 * delta;
    s.pos.addScaledVector(s.vel, delta);
    const t = s.life / s.maxLife;
    const scale = t * 0.9 + 0.1;
    _sm.makeScale(scale, scale, scale).setPosition(s.pos);
    sparkMesh.setMatrixAt(cnt, _sm);
    _sc.setHSL(0.08 - (1-t)*0.06, 1.0, 0.45 + t*0.35);
    sparkMesh.setColorAt(cnt, _sc);
    cnt++;
  }
  sparkMesh.count = cnt;
  sparkMesh.instanceMatrix.needsUpdate = true;
  sparkMesh.instanceColor.needsUpdate = true;
}

// ════════════════════════════════════════════════════════════
//  CONTROLLERS
// ════════════════════════════════════════════════════════════
const ctrl0 = renderer.xr.getController(0);
const ctrl1 = renderer.xr.getController(1);

    new THREE.LineBasicMaterial({ color:0xffffff, transparent:true, opacity:0.25 })
  );
  g.add(laser);
  return g;
}
ctrl0.add(makeCtrlVisual(false));
ctrl1.add(makeCtrlVisual(true));
xrRig.add(ctrl0);
xrRig.add(ctrl1);

let rightController = null;
let leftController  = null;

function onCtrlConnected(e) {
  const hand = e.data.handedness;
  if(hand === 'right') rightController = e.target;
  else if(hand === 'left') leftController = e.target;
}
function onCtrlDisconnected(e) {
  if(e.target === rightController) rightController = null;
  if(e.target === leftController)  leftController  = null;
}
ctrl0.addEventListener('connected', onCtrlConnected);
ctrl0.addEventListener('disconnected', onCtrlDisconnected);
ctrl1.addEventListener('connected', onCtrlConnected);
ctrl1.addEventListener('disconnected', onCtrlDisconnected);

renderer.xr.addEventListener('sessionstart', () => {
  [ctrl0,ctrl1].forEach(c => {
    if(c.parent !== xrRig){ if(c.parent) c.parent.remove(c); xrRig.add(c); }
  });
});

// Controller velocity tracking (world units/sec estimate)
const _rPrevPos = new THREE.Vector3();
const _lPrevPos = new THREE.Vector3();
let rVel = 0, lVel = 0;

// ════════════════════════════════════════════════════════════
//  PHASE OBJECT GROUPS  (toggled by state)
// ════════════════════════════════════════════════════════════
const G = {
  intro:      new THREE.Group(),
  forging:    new THREE.Group(),
  shaping:    new THREE.Group(),

//  BUILD: FORGE SCENE
// ════════════════════════════════════════════════════════════
// Furnace
const furnaceGroup = new THREE.Group();
furnaceGroup.add(new THREE.Mesh(

const wb1 = makeWorkbench(); wb1.position.set(0, 0.58, -1.6); G.forging.add(wb1);

// Temperature label in world space (canvas sprite)
const tempCanvasEl = document.createElement('canvas');
tempCanvasEl.width = 128; tempCanvasEl.height = 48;
const tempCtx = tempCanvasEl.getContext('2d');

// ════════════════════════════════════════════════════════════
//  BUILD: SHAPING SCENE
// ════════════════════════════════════════════════════════════
const ZONE_N = CFG.SHAPING.zoneCount;

// Blade base (knife-like silhouette using custom BufferGeometry)
function createBladeGeo() {
  const geo = new THREE.BufferGeometry();
  // Simple blade: rectangular spine + tapered edge, 5mm thick
  const L = 0.32, W = 0.055, H = 0.012;
  // Using BoxGeometry-like vertices but with edge taper
  const verts = [];
  const segments = 10;
  for(let i=0; i<=segments; i++) {
    const t = i/segments;
    const z = -L/2 + t*L;
    const w = W * (1 - t*0.25); // slightly narrower at tip
    verts.push(-w/2, H/2, z,   w/2, H/2, z);   // top
    verts.push(-w/4, -H/2, z,  w/4, -H/2, z);  // edge (tapered inward)
  }
  const indices = [];
  for(let i=0;i<segments;i++) {
    const b = i*4;
    // top face
    indices.push(b,b+4,b+5, b,b+5,b+1);
    // bottom/edge face
    indices.push(b+2,b+6,b+7, b+2,b+7,b+3);
    // left side
    indices.push(b,b+2,b+6, b,b+6,b+4);
    // right side
    indices.push(b+1,b+5,b+7, b+1,b+7,b+3);
  }
  geo.setAttribute('position', new THREE.Float32BufferAttribute(verts, 3));
  geo.setIndex(indices);
  geo.computeVertexNormals();
  return geo;
}

const bladeMeshShaping = new THREE.Mesh(
  createBladeGeo(),
  new THREE.MeshLambertMaterial({ color:0x8899bb, metalness:0.6 })
);
bladeMeshShaping.position.set(0, 0.645, -1.6);
bladeMeshShaping.castShadow = true;
G.shaping.add(bladeMeshShaping);

// Zone overlay meshes + data
const zoneData = [];
for(let i=0; i<ZONE_N; i++) {
  const mat = new THREE.MeshBasicMaterial({
    color:0x0044ff, transparent:true, opacity:0.45, depthWrite:false
  });
  const mesh = new THREE.Mesh(
    new THREE.BoxGeometry(0.08, 0.025, 0.058),
    mat
  );
  const zz = -0.135 + i*(0.32/(ZONE_N-1))*0.97;
  mesh.position.set(0, 0.655, -1.6 + zz);
  G.shaping.add(mesh);
  zoneData.push({ distortion:20, mesh, mat, zz });
}

function updateZoneColors() {
  zoneData.forEach(z => {
    const t = Math.min(z.distortion/50, 1); // 0=good(blue), 1=bad(red)
    z.mat.color.setRGB(t, 0.1*(1-t), 1-t);
    z.mat.opacity = 0.25 + t*0.5;
  });
}

function computeSymmetryError() {
  const avg = zoneData.reduce((s,z) => s+z.distortion, 0) / ZONE_N;
  return Math.min(100, avg);
}

function makePanelMesh(w, h, canvasW, canvasH) {
  const el = document.createElement('canvas');
  el.width = canvasW; el.height = canvasH;
  const tex = new THREE.CanvasTexture(el);
  const mesh = new THREE.Mesh(
    new THREE.PlaneGeometry(w, h),
    new THREE.MeshBasicMaterial({ map:tex, transparent:true, depthWrite:false })
  );
  return { mesh, canvas:el, ctx:el.getContext('2d'), tex };
}

// Intro panel

G.intro.add(introP.mesh);

// ── Canvas helpers ──
function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x+r,y); ctx.lineTo(x+w-r,y);
  ctx.quadraticCurveTo(x+w,y,x+w,y+r); ctx.lineTo(x+w,y+h-r);
  ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h); ctx.lineTo(x+r,y+h);
  ctx.quadraticCurveTo(x,y+h,x,y+h-r); ctx.lineTo(x,y+r);
  ctx.quadraticCurveTo(x,y,x+r,y); ctx.closePath();
}

function drawResultPanel(score) {
  const { ctx, canvas:cv, tex } = resultP;
  const W=cv.width, H=cv.height;
  ctx.clearRect(0,0,W,H);

  // Background
  ctx.fillStyle='rgba(4,2,0,0.94)';
  roundRect(ctx,8,8,W-16,H-16,18); ctx.fill();
  const borderColor = score>=85?'#ffd700': score>=65?'#c0c0c0':'#cd7f32';
  ctx.strokeStyle=borderColor; ctx.lineWidth=3;
  roundRect(ctx,8,8,W-16,H-16,18); ctx.stroke();

  // Title rank
  const rank = getTitle(score);
  ctx.textAlign='center';
  ctx.fillStyle=borderColor;
  ctx.font='bold 20px serif';
  ctx.fillText(rank, W/2, 46);

  // Score number (large)
  ctx.font='bold 80px serif';
  ctx.fillStyle='#ffffff';
  ctx.fillText(score, W/2, 130);
  ctx.font='bold 22px sans-serif'; ctx.fillStyle='#aaa';
  ctx.fillText('点', W/2+52, 130);

  // Section divider
  ctx.strokeStyle='#333'; ctx.lineWidth=1;
  ctx.beginPath(); ctx.moveTo(30,150); ctx.lineTo(W-30,150); ctx.stroke();

  // Per-phase scores with bar
  const items = [
    { label:'🔨 鍛造', val:Math.round(100-bladeState.shapeDistortion) },
    { label:'⚒  成形', val:Math.round(100-bladeState.symmetryError) },
    { label:'🪨 研ぎ', val:Math.round(bladeState.sharpness) },
  ];
  items.forEach((d,i) => {
    const y=178+i*56;
    const pct=d.val/100;
    const hsl=`hsl(${pct*120},75%,55%)`;
    ctx.fillStyle='#777'; ctx.font='14px monospace'; ctx.textAlign='left';
    ctx.fillText(d.label, 30, y);
    ctx.fillStyle=hsl; ctx.font='bold 18px monospace'; ctx.textAlign='right';
    ctx.fillText(d.val+'/100', W-30, y);
    // bar bg
    ctx.fillStyle='#1a1a1a';
    ctx.fillRect(30, y+5, W-60, 12);
    // bar fill
    ctx.fillStyle=hsl;
    ctx.fillRect(30, y+5, (W-60)*pct, 12);
    ctx.textAlign='left';
  });

  // Divider 2
  ctx.strokeStyle='#333'; ctx.lineWidth=1;
  ctx.beginPath(); ctx.moveTo(30,352); ctx.lineTo(W-30,352); ctx.stroke();

  // Ranking
  ctx.fillStyle='#ffd080'; ctx.font='bold 14px sans-serif'; ctx.textAlign='center';
  ctx.fillText('🏆 TOP 5 ランキング', W/2, 374);
  const scores = loadScores();
  const rankColors=['#ffd700','#c0c0c0','#cd7f32','#999','#777'];
  if(scores.length===0) {
    ctx.fillStyle='#555'; ctx.font='13px sans-serif';
    ctx.fillText('まだ記録なし / No records yet', W/2, 408);
  } else {
    scores.forEach((s,i) => {
      const y=400+i*30;
      ctx.fillStyle=rankColors[i]||'#777';
      ctx.font=`${i===0?'bold ':''}13px monospace`;
      ctx.textAlign='left'; ctx.fillText(`${i+1}位`, 30, y);
      ctx.fillStyle='#fff'; ctx.font=`${i===0?'bold ':''}15px monospace`;
      ctx.textAlign='center'; ctx.fillText(s.score+'点', W/2-20, y);
      ctx.fillStyle='#666'; ctx.font='11px monospace';
      ctx.textAlign='right'; ctx.fillText(s.date, W-28, y);
    });
  }

  // Retry hint
  ctx.fillStyle='#444'; ctx.font='12px sans-serif'; ctx.textAlign='center';
  ctx.fillText('Aボタン / N でリトライ', W/2, 536);

  tex.needsUpdate=true;
}

function computeFinalScore() {
  return Math.round(
    (100-bladeState.shapeDistortion)*0.4 +
    (100-bladeState.symmetryError)*0.3 +
    bladeState.sharpness*0.3
  );
}

function getTitle(score) {
  if(score>=85) return '名人 ★ Master';
  if(score>=65) return '職人 ◆ Craftsman';
  return '見習い ◇ Apprentice';
}

function saveScore(score) {
  let arr = loadScores();
  const now = new Date();
  const pad = n=>String(n).padStart(2,'0');
  const date=`${now.getFullYear()}-${pad(now.getMonth()+1)}-${pad(now.getDate())} ${pad(now.getHours())}:${pad(now.getMinutes())}`;
  arr.push({score, date});
  arr.sort((a,b)=>b.score-a.score);
  arr=arr.slice(0,5);
  localStorage.setItem('echizen_scores', JSON.stringify(arr));
  return arr;
}

function loadScores() {
  try { return JSON.parse(localStorage.getItem('echizen_scores')||'[]'); }
  catch(e){ return []; }
}

const L_MAX = new THREE.Vector3( 1.5, 2.0,  0.0);

// Raycaster for mouse→world
const raycaster = new THREE.Raycaster();
const _hitPt = new THREE.Vector3();

// Camera orbit (non-VR)
let camYaw=0, camPitch=0;

// ════════════════════════════════════════════════════════════
//  GLOBAL INPUT HANDLER  (A/B buttons, called every frame)
// ════════════════════════════════════════════════════════════
function handleGlobalInput() {
  const isVR = renderer.xr.isPresenting;

  // ── A button ──
  let aBtn = false;
  if(isVR && rightController?.gamepad) aBtn = rightController.gamepad.buttons[4]?.pressed||false;
  else aBtn = inp.keys['n']||false;
  if(aBtn && !inp.aBtnPrev) nextState();
  inp.aBtnPrev = aBtn;

  // ── B button (restart current phase) ──
  let bBtn = false;
  if(isVR && rightController?.gamepad) bBtn = rightController.gamepad.buttons[5]?.pressed||false;
  else bBtn = inp.keys['p']||false;
  if(bBtn && !inp.bBtnPrev) restartCurrentPhase();
  inp.bBtnPrev = bBtn;

  // ── Right trigger ──
  let rTrig = false;
  if(isVR && rightController?.gamepad) rTrig = rightController.gamepad.buttons[0]?.pressed||false;
  else rTrig = inp.mouseDown;
  inp.rTrigPrev = inp.rTrig;
  inp.rTrig = rTrig;

  // ── Left trigger / grip ──
  if(isVR && leftController?.gamepad) {
    inp.lTrig = leftController.gamepad.buttons[0]?.pressed||false;
    inp.lGrip = leftController.gamepad.buttons[1]?.pressed||false;
  } else {
    inp.lTrig = inp.keys['q']||false;
    inp.lGrip = inp.keys['e']||false;
  }

  // ── X button (blade flip in shaping) ──
  let xBtn = false;
  if(isVR && leftController?.gamepad) xBtn = leftController.gamepad.buttons[4]?.pressed||false;
  else xBtn = inp.keys['x']||false;
  if(xBtn && !inp.xBtnPrev && currentState===State.SHAPING) flipBlade();
  inp.xBtnPrev = xBtn;
}

// ════════════════════════════════════════════════════════════
//  CONTROLLER / MOUSE POSITION UPDATE
// ════════════════════════════════════════════════════════════
function updatePositions(delta) {
  const isVR = renderer.xr.isPresenting;

  if(isVR) {
    if(rightController) inp.rPos.copy(rightController.position);
    if(leftController)  inp.lPos.copy(leftController.position);
  } else {
    // WASD → left hand
    const spd = 1.2*delta;
    if(inp.keys['a']) inp.lPos.x -= spd;
    if(inp.keys['d']) inp.lPos.x += spd;
    if(inp.keys['w']) inp.lPos.z -= spd;
    if(inp.keys['s']) inp.lPos.z += spd;
    inp.lPos.clamp(L_MIN, L_MAX);

    // Mouse → right hand (intersect a plane at z=-1.6)
    raycaster.setFromCamera(inp.mouse, camera);
    const plane = new THREE.Plane(new THREE.Vector3(0,0,1), 1.6);
    raycaster.ray.intersectPlane(plane, _hitPt);
    if(_hitPt) inp.rPos.copy(_hitPt);
    inp.rPos.y = Math.max(0.5, Math.min(1.9, inp.rPos.y));

    // Arrow keys → camera orbit
    if(inp.keys['arrowleft'])  camYaw  -= 1.2*delta;
    if(inp.keys['arrowright']) camYaw  += 1.2*delta;
    if(inp.keys['arrowup'])    camPitch = Math.max(-0.45, camPitch-1.2*delta);
    if(inp.keys['arrowdown'])  camPitch = Math.min( 0.45, camPitch+1.2*delta);
    camera.quaternion.setFromEuler(new THREE.Euler(camPitch, camYaw, 0, 'YXZ'));
  }

  // Velocity (rough units/sec)
  rVel = inp.rPos.distanceTo(_rPrevPos) / Math.max(delta, 0.001);
  lVel = inp.lPos.distanceTo(_lPrevPos) / Math.max(delta, 0.001);
  _rPrevPos.copy(inp.rPos);
  _lPrevPos.copy(inp.lPos);
}

// ════════════════════════════════════════════════════════════
//  STATE TRANSITIONS
// ════════════════════════════════════════════════════════════
function setGroup(name) {
  Object.entries(G).forEach(([k,g]) => { g.visible = k===name; });
}

function nextState() {
  if(transitioning) return;
  transitioning = true;
  playTransition();
  switch(currentState) {
    case State.INTRO:       enterForging();    break;
    case State.FORGING:
      bladeState.shapeDistortion = fState.distortion;
      enterShaping();   break;
    case State.SHAPING:
      bladeState.symmetryError = computeSymmetryError();
      enterSharpening(); break;
    case State.SHARPENING:
      finalizeSharpening();
      enterResult();    break;
    case State.RESULT:      enterIntro();      break;
  }
  setTimeout(()=>{ transitioning=false; }, 600);
}

function restartCurrentPhase() {
  if(transitioning) return;
  transitioning=true;
  playTransition();
  switch(currentState) {
    case State.FORGING:    enterForging();    break;
    case State.SHAPING:    enterShaping();    break;
    case State.SHARPENING: enterSharpening(); break;
    default: break;
  }
  setTimeout(()=>{ transitioning=false; }, 600);
}

function enterIntro() {
  currentState = State.INTRO;
  drawIntroPanel();
  setGroup('intro');
  setHUD('越前打刃物 — Aでスタート', 'N:スタート');
}

function enterForging() {
  currentState = State.FORGING;
  resetForging();
  setGroup('forging');
  setHUD('🔥 鍛造 | 炉で加熱してから叩け！', '');
}

function enterShaping() {
  currentState = State.SHAPING;
  resetShaping();
  setGroup('shaping');
  setHUD('⚒  成形 | 赤エリアを叩いて整形', 'X:反転 A:終了');
}

function enterSharpening() {
  currentState = State.SHARPENING;
  resetSharpening();
  setGroup('sharpening');
  setHUD('🪨 研ぎ | 前後に動かして刃を研ぐ', '');

function enterResult() {
  currentState = State.RESULT;
  const score = computeFinalScore();
  saveScore(score);
  drawResultPanel(score);
  playResult(score);
  // Blade color by score
  const h = 0.58 + (score/100)*0.12;
  resultBlade.material.color.setHSL(h, 0.6, 0.4+(score/100)*0.25);
  setGroup('result');
  setHUD(`結果: ${score}点 | ${getTitle(score)}`, 'A/N:リトライ');
}

function tempToHex(temp) {
  const t = Math.max(0, (temp-20)/1180);
  if(t<0.3) return `rgb(${Math.round(100+t*500)},${Math.round(50*t)},${Math.round(50*t)})`;
  if(t<0.7) return `rgb(255,${Math.round(((t-0.3)/0.4)*120)},0)`;
  return `rgb(255,${Math.round(120+((t-0.7)/0.3)*135)},${Math.round(((t-0.7)/0.3)*80)})`;
}

// ════════════════════════════════════════════════════════════
//  UPDATE: FORGING
// ════════════════════════════════════════════════════════════
let _heatSoundTimer = 0;
function updateForging(delta) {
  const f = fState;

  // ── Iron pick-up / drop ──
  const hold = inp.lTrig || inp.lGrip;
  if(hold && !f.ironHeld) {
    if(inp.lPos.distanceTo(ironMesh.position) < 0.35) f.ironHeld = true;
  }
  if(!hold && f.ironHeld) {
    f.ironHeld = false;
    const pos = ironMesh.position;
    if(FURNACE_BOX.containsPoint(pos)) {
      f.ironInFurnace=true; f.ironOnWorkbench=false;
    } else if(WORKBENCH_FORGE_BOX.containsPoint(pos)) {
      f.ironOnWorkbench=true; f.ironInFurnace=false;
      ironMesh.position.set(0, 0.645, -1.6); // snap
    } else {
      f.ironInFurnace=false; f.ironOnWorkbench=false;
    }
  }
  if(f.ironHeld) {
    ironMesh.position.copy(inp.lPos);
    f.ironInFurnace   = FURNACE_BOX.containsPoint(ironMesh.position);
    f.ironOnWorkbench = false;
  }

  // ── Temperature ──
  if(f.ironInFurnace) {
    f.temperature = Math.min(1200, f.temperature + CFG.FORGING.heatRate*delta);
    forgeGlow.intensity = 2.5 + Math.sin(Date.now()*0.008)*0.5;
    furnaceGlow.material.color.setHSL(0.06 - (f.temperature/1200)*0.06, 1, 0.55);
    _heatSoundTimer -= delta;
    if(_heatSoundTimer<=0){ playHeatCrackle(); _heatSoundTimer=0.6; }
  } else {
    f.temperature = Math.max(20, f.temperature - CFG.FORGING.coolRate*delta);
    forgeGlow.intensity = Math.max(0.3, forgeGlow.intensity - delta*2);
    _heatSoundTimer = 0;
  }

  // Iron color
  const t = Math.max(0,(f.temperature-20)/1180);
  ironMesh.material.color.setHSL(0.05-t*0.05, Math.min(1,t*2), 0.2+t*0.55);
  // Iron glow emission effect
  forgeGlow.position.copy(ironMesh.position);

  // Temp label tracks iron + billboard
  tempLabel.position.copy(ironMesh.position).y += 0.12;
  tempLabel.lookAt(camera.position);
  drawTempLabel(f.temperature);

  // ── Hammer hit (right trigger pressed) ──
  if(inp.rTrig && !inp.rTrigPrev) {
    HAMMER_SPHERE.center.copy(inp.rPos);
    IRON_BOX.setFromCenterAndSize(ironMesh.position, new THREE.Vector3(0.14,0.045,0.32));

    const isTiming  = f.ironOnWorkbench;
    const isVelocity= rVel > CFG.FORGING.velocityThreshold;
    const isHit     = IRON_BOX.intersectsSphere(HAMMER_SPHERE) || !renderer.xr.isPresenting;

    let result = 'Miss';
    if(f.temperature < CFG.FORGING.minHitTemp) result = 'Miss';
    else if(isTiming && isVelocity && isHit) result = 'Perfect';
    else if(isTiming && (isVelocity || isHit)) result = 'Good';

    // Distortion accumulation
    if(result==='Miss')    f.distortion = Math.min(100, f.distortion+2);
    else if(result==='Good')    f.distortion = Math.min(100, f.distortion+1);
    else if(result==='Perfect') f.distortion = Math.max(0,   f.distortion-0.5);

    // Sparks
    const sparkCt = CFG.FORGING.sparks[result.toLowerCase()]||0;
    emitSparks(ironMesh.position.clone(), sparkCt);
    // Sound
    playHit(result==='Perfect'?2: result==='Good'?1:0);
    // Haptic
    haptic(rightController, result==='Perfect'?1:result==='Good'?0.5:0.1);

    f.hitCount++;
    const tempStr = `${Math.round(f.temperature)}°C`;
    setHUD(`🔥 鍛造 ${f.hitCount}/${CFG.FORGING.totalHits} | ${result} | ${tempStr}`, '');
  }
}

// ════════════════════════════════════════════════════════════
//  UPDATE: SHAPING
// ════════════════════════════════════════════════════════════
let _bladeFlipping = false;
let _bladeFlipTarget = 0;

function updateShaping(delta) {
  const s = sState;

  // Zone pulsing animation
  zoneData.forEach((z,i) => {
    const pulse = 1 + Math.sin(Date.now()*0.004+i*1.3)*0.04;
    z.mesh.scale.set(pulse, 1, pulse);
  });

  // Blade flip animation
  if(_bladeFlipping) {
    const diff = _bladeFlipTarget - bladeMeshShaping.rotation.z;
    bladeMeshShaping.rotation.z += diff * 0.2;
    if(Math.abs(diff)<0.01){ bladeMeshShaping.rotation.z=_bladeFlipTarget; _bladeFlipping=false; }
  }

  // ── Hammer hit ──
  if(inp.rTrig && !inp.rTrigPrev) {
    HAMMER_SPHERE.center.copy(inp.rPos);

    // Find hit zone
    let hitIdx = -1;
    if(renderer.xr.isPresenting) {
      for(let i=0;i<ZONE_N;i++){
        if(ZONE_BOXES[i].intersectsSphere(HAMMER_SPHERE)){ hitIdx=i; break; }
      }
    } else {
      // Non-VR: map mouse X → zone index
      const nx = (inp.mouse.x + 1) / 2; // 0..1
      hitIdx = Math.max(0, Math.min(ZONE_N-1, Math.floor(nx*ZONE_N)));
    }

    if(hitIdx >= 0) {
      const power = Math.max(CFG.SHAPING.power.min,
        Math.min(CFG.SHAPING.power.max, rVel*CFG.SHAPING.velScale));
      zoneData[hitIdx].distortion = Math.max(0, zoneData[hitIdx].distortion - power);
      zoneData.forEach((z,i) => {
        if(i!==hitIdx) z.distortion = Math.min(100, z.distortion + power*CFG.SHAPING.penalty);
      });
      updateZoneColors();
      emitSparks(ZONE_BOXES[hitIdx].getCenter(new THREE.Vector3()), 18);
      playHit(1);
      haptic(rightController, 0.4);
    }

    s.hitCount++;
    const maxD = Math.max(...zoneData.map(z=>z.distortion));
    setHUD(`⚒  成形 ${s.hitCount}/${CFG.SHAPING.maxHits} | 最大歪み:${Math.round(maxD)}`, 'X:反転 A:終了');
  }
}

function flipBlade() {
  if(_bladeFlipping) return;
  _bladeFlipping = true;
  _bladeFlipTarget = bladeMeshShaping.rotation.z + Math.PI;
  playTransition();
}

// ════════════════════════════════════════════════════════════
//  UPDATE: SHARPENING
// ════════════════════════════════════════════════════════════
function updateSharpening(delta) {
  const sh = shState;

  // ── Blade position: midpoint of both controllers ──
  let axisVal;
  if(renderer.xr.isPresenting && rightController && leftController) {
    const mid = new THREE.Vector3()
      .addVectors(rightController.position, leftController.position)
      .multiplyScalar(0.5);
    axisVal = mid.z; // forward-back = Z
    // Move blade visual
    bladeMeshSharp.position.x = (mid.x) * 0.4;
  } else {
    // Non-VR: mouse X drives forward-back
    axisVal = inp.mouse.x * 0.3;
    bladeMeshSharp.position.x = inp.mouse.x * 0.06;
  }

  // ── Stroke detection ──
  const motion = axisVal - sh.prevAxis;
  if(Math.abs(motion) > CFG.SHARPENING.strokeThreshold) {
    const dir = Math.sign(motion);
    if(dir !== sh.lastDir && sh.lastDir !== 0) {
      // Direction reversal = completed stroke
      sh.strokeCount++;

      // Angle: VR uses controller tilt, non-VR uses mouse Y
      let angle;
      if(renderer.xr.isPresenting && rightController) {
        const fwd = new THREE.Vector3(0,0,-1).applyQuaternion(rightController.quaternion);
        const stoneN = new THREE.Vector3(0,1,0);
        angle = THREE.MathUtils.RAD2DEG * Math.acos(Math.min(1, Math.abs(fwd.dot(stoneN))));
        angle = Math.abs(90 - angle); // convert to tilt angle from horizontal
      } else {
        angle = 5 + (inp.mouse.y*0.5+0.5)*30; // mouse Y 0..1 → angle 5..35
      }

      const err = Math.abs(angle - CFG.SHARPENING.angleOptimal);
      const aScore = Math.max(0, Math.min(100, 100 - err*CFG.SHARPENING.angleWeight));
      sh.totalAngle += aScore;
      sh.angleN++;

      playSharpening(angle);
      haptic(rightController, 0.15 + aScore/400);
      if(leftController) haptic(leftController, 0.15 + aScore/400);

      const qual = aScore>70 ? 'Good ✓' : 'Miss ✗';
      setHUD(`🪨 研ぎ ${sh.strokeCount}/${CFG.SHARPENING.totalStrokes} | ${qual} | 角度:${Math.round(angle)}°`, '');
    }
    sh.lastDir = dir;
  }
  sh.prevAxis = axisVal;

  // Blade shimmer animation
  const shimmer = 0.5 + Math.sin(Date.now()*0.015)*0.12;
  bladeMeshSharp.material.color.setRGB(shimmer*0.6, shimmer*0.7, 1);
}

function finalizeSharpening() {
  const sh = shState;
  const avgAngle = sh.angleN>0 ? sh.totalAngle/sh.angleN : 50;
  const efficiency = Math.max(0.5, 1 - bladeState.symmetryError*0.01);
  bladeState.sharpness = Math.round(Math.min(100, avgAngle * efficiency));
}

// ════════════════════════════════════════════════════════════
//  UPDATE: RESULT
// ════════════════════════════════════════════════════════════
function updateResult(delta) {
  resultBlade.rotation.y += delta * 0.9;
  resultBlade.rotation.x = Math.sin(Date.now()*0.0008)*0.15;
  resultP.mesh.lookAt(camera.position);
  // Pulsing result light
  resultLight.intensity = 2.5 + Math.sin(Date.now()*0.003)*0.8;
}

// ════════════════════════════════════════════════════════════
//  AUTO TRANSITION  (hit/stroke count limits)
// ════════════════════════════════════════════════════════════
function updateAutoTransition() {
  if(transitioning) return;
  if(currentState===State.FORGING && fState.hitCount >= CFG.FORGING.totalHits) {
    bladeState.shapeDistortion = fState.distortion;
    transitioning=true;
    setTimeout(()=>{enterShaping(); setTimeout(()=>transitioning=false,600);},300);
  }
  if(currentState===State.SHAPING && sState.hitCount >= CFG.SHAPING.maxHits) {
    bladeState.symmetryError = computeSymmetryError();
    transitioning=true;
    setTimeout(()=>{enterSharpening(); setTimeout(()=>transitioning=false,600);},300);
  }
  if(currentState===State.SHARPENING && shState.strokeCount >= CFG.SHARPENING.totalStrokes) {
    finalizeSharpening();
    transitioning=true;
    setTimeout(()=>{enterResult(); setTimeout(()=>transitioning=false,600);},300);
  }
}

// ════════════════════════════════════════════════════════════
//  HAPTIC HELPER
// ════════════════════════════════════════════════════════════
function haptic(ctrl, intensity=0.5, dur=80) {
  ctrl?.gamepad?.hapticActuators?.[0]?.pulse(intensity, dur);
}

// ════════════════════════════════════════════════════════════
//  XR SESSION MANAGEMENT
// ════════════════════════════════════════════════════════════
async function startXR(mode) {
  ensureAudio();
  if(!navigator.xr) { alert('WebXR未対応 / WebXR not supported'); return; }
  const ok = await navigator.xr.isSessionSupported(mode).catch(()=>false);
  if(!ok) { alert(`${mode} not supported on this device`); return; }
  try {
    if(renderer.xr.isPresenting) await renderer.xr.getSession()?.end();
    const init = mode==='immersive-ar'
      ? { optionalFeatures:['dom-overlay'], domOverlay:{root:document.body} }
      : { optionalFeatures:['hand-tracking','local-floor'] };
    const session = await navigator.xr.requestSession(mode, init);
    renderer.xr.setReferenceSpaceType('local-floor');
    await renderer.xr.setSession(session);
    scene.background = mode==='immersive-ar' ? null : new THREE.Color(0x100502);
    scene.fog = mode==='immersive-ar' ? null : new THREE.FogExp2(0x100502, 0.1);
    setHUD(hudL.textContent, 'A:次へ B:やり直し');
  } catch(e) {
    console.warn('XR error:', e);
    alert('XRセッション開始失敗: '+e.message);
  }
}

document.getElementById('btn-vr').addEventListener('click', ()=>startXR('immersive-vr'));
document.getElementById('btn-ar').addEventListener('click', ()=>startXR('immersive-ar'));
document.getElementById('btn-reset').addEventListener('click', ()=>{
  if(confirm('スコアをリセットしますか？\nReset all score records?')) {
    localStorage.removeItem('echizen_scores');
    alert('リセットしました / Scores cleared.');
  }
});

// ════════════════════════════════════════════════════════════
//  RESIZE
// ════════════════════════════════════════════════════════════
window.addEventListener('resize', ()=>{
  camera.aspect = innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});

// ════════════════════════════════════════════════════════════
//  ANIMATION LOOP
// ════════════════════════════════════════════════════════════
let lastT = 0;

renderer.setAnimationLoop((t) => {
  if(lastT===0) lastT=t;
  const delta = Math.min((t-lastT)/1000, 0.033);
  lastT=t;

  // 1. Input
  handleGlobalInput();
  updatePositions(delta);

  // 2. Phase update
  switch(currentState) {
    case State.INTRO:       updateIntro(delta);       break;
    case State.FORGING:     updateForging(delta);     break;
    case State.SHAPING:     updateShaping(delta);     break;
    case State.SHARPENING:  updateSharpening(delta);  break;
    case State.RESULT:      updateResult(delta);      break;
  }

  // 3. Auto-transition check
  updateAutoTransition();

  // 4. Sparks (single draw call)
  updateSparks(delta);

  // 5. Render
  renderer.render(scene, camera);
});

// ════════════════════════════════════════════════════════════
//  INIT
// ════════════════════════════════════════════════════════════
enterIntro();

</script>
