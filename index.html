<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<title>越前打刃物 - WebXR Demo</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<style>
  body {
    margin: 0;
    overflow: hidden;
    background: #000;
    font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    color: #fff;
  }
  #overlayUI {
    position: fixed;
    top: 8px;
    left: 8px;
    z-index: 10;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  #overlayUI button {
    padding: 4px 8px;
    font-size: 12px;
    cursor: pointer;
  }
  #modeLabel {
    font-size: 11px;
    opacity: 0.8;
  }
</style>
</head>
<body>
<div id="overlayUI">
  <div id="modeLabel">Mode: Desktop (Fallback)</div>
  <button id="btnEnterVR">Enter VR</button>
  <button id="btnEnterAR">Enter AR</button>
  <button id="btnResetScores">スコアリセット / Reset Scores</button>
</div>

<script type="module">
/* =========================
   基本セットアップ
   ========================= */
import * as THREE from "https://unpkg.com/three@0.161.0/build/three.module.js";
import { VRButton } from "https://unpkg.com/three@0.161.0/examples/jsm/webxr/VRButton.js";
import { XRControllerModelFactory } from "https://unpkg.com/three@0.161.0/examples/jsm/webxr/XRControllerModelFactory.js";

/* ===== ステート定義 ===== */
const State = {
  INTRO: "INTRO",
  FORGING: "FORGING",
  SHAPING: "SHAPING",
  SHARPENING: "SHARPENING",
  RESULT: "RESULT",
};
let currentState = State.INTRO;

/* ===== 刃物状態 ===== */
let bladeState = {
  shapeDistortion: 0,
  symmetryError: 0,
  sharpness: 0,
};

/* ===== Three.js 基本 ===== */
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x101010);

const camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.1, 100);
camera.position.set(0, 1.6, 2);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.xr.enabled = true;
document.body.appendChild(renderer.domElement);

/* 環境光・ライト */
const hemiLight = new THREE.HemisphereLight(0xffffff, 0x444444, 0.8);
scene.add(hemiLight);
const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
dirLight.position.set(3, 5, 2);
scene.add(dirLight);

/* XR Rig（カメラの親） */
const xrRig = new THREE.Group();
xrRig.add(camera);
scene.add(xrRig);

/* ===== コントローラ ===== */
const controllerModelFactory = new XRControllerModelFactory();

const grip0 = renderer.xr.getControllerGrip(0);
const grip1 = renderer.xr.getControllerGrip(1);
grip0.add(controllerModelFactory.createControllerModel(grip0));
grip1.add(controllerModelFactory.createControllerModel(grip1));

const ctrl0 = renderer.xr.getController(0);
const ctrl1 = renderer.xr.getController(1);

let rightController = null;
let leftController = null;

renderer.xr.addEventListener("sessionstart", () => {
  [ctrl0, ctrl1, grip0, grip1].forEach(obj => {
    if (obj.parent !== xrRig) {
      if (obj.parent) obj.parent.remove(obj);
      xrRig.add(obj);
    }
  });
});

function onControllerConnected(event) {
  const ctrl = event.target;
  const hand = event.data.handedness;
  if (hand === "right") {
    rightController = ctrl;
  } else if (hand === "left") {
    leftController = ctrl;
  }
}
function onControllerDisconnected(event) {
  const ctrl = event.target;
  if (ctrl === rightController) rightController = null;
  if (ctrl === leftController) leftController = null;
}
ctrl0.addEventListener("connected", onControllerConnected);
ctrl0.addEventListener("disconnected", onControllerDisconnected);
ctrl1.addEventListener("connected", onControllerConnected);
ctrl1.addEventListener("disconnected", onControllerDisconnected);

/* ===== デスクトップ簡易モード用入力 ===== */
let isXRSession = false;
let desktopHammerPos = new THREE.Vector3(0.3, 1.2, 0);
let desktopLeftPos = new THREE.Vector3(-0.3, 1.2, 0);
let mouseDown = false;
let keyState = {};
window.addEventListener("keydown", (e) => { keyState[e.key.toLowerCase()] = true; });
window.addEventListener("keyup", (e) => { keyState[e.key.toLowerCase()] = false; });
renderer.domElement.addEventListener("mousedown", () => { mouseDown = true; });
renderer.domElement.addEventListener("mouseup", () => { mouseDown = false; });
renderer.domElement.addEventListener("mousemove", (e) => {
  if (!isXRSession) {
    const nx = (e.clientX / window.innerWidth) * 2 - 1;
    const ny = -(e.clientY / window.innerHeight) * 2 + 1;
    desktopHammerPos.set(nx * 0.5, 1.2 + ny * 0.3, 0);
  }
});

/* ===== UIボタン ===== */
const btnEnterVR = document.getElementById("btnEnterVR");
const btnEnterAR = document.getElementById("btnEnterAR");
const btnResetScores = document.getElementById("btnResetScores");
const modeLabel = document.getElementById("modeLabel");

/* VRボタンは three.js の VRButton を利用（immersive-vr） */
btnEnterVR.addEventListener("click", async () => {
  try {
    const sessionInit = { optionalFeatures: ["local-floor", "bounded-floor", "hand-tracking"] };
    const session = await navigator.xr.requestSession("immersive-vr", sessionInit);
    renderer.xr.setSession(session);
    isXRSession = true;
    modeLabel.textContent = "Mode: VR (immersive-vr)";
  } catch (e) {
    console.warn("VR session failed", e);
  }
});

/* ARセッション（immersive-ar） */
btnEnterAR.addEventListener("click", async () => {
  try {
    const sessionInit = { requiredFeatures: ["local-floor"], optionalFeatures: ["hit-test"] };
    const session = await navigator.xr.requestSession("immersive-ar", sessionInit);
    renderer.xr.setSession(session);
    isXRSession = true;
    modeLabel.textContent = "Mode: AR (immersive-ar)";
  } catch (e) {
    console.warn("AR session failed", e);
  }
});

/* スコアリセット */
btnResetScores.addEventListener("click", () => {
  if (confirm("リセットしますか？ / Reset scores?")) {
    localStorage.removeItem("scores");
  }
});

/* =========================
   オブジェクト・コリジョン
   ========================= */
const objects = {
  floor: null,
  forge: null,
  workbench: null,
  whetstone: null,
  iron: null,
  blade: null,
  hammer: null,
  resultPanel: null,
};

const colliders = {
  forgeArea: new THREE.Box3(),
  workbenchArea: new THREE.Box3(),
  iron: new THREE.Box3(),
  hammer: new THREE.Box3(),
  whetstoneArea: new THREE.Box3(),
};

/* ゾーン（成形用） */
let shapingZones = []; // { collider: Box3, distortion: number, mesh: Mesh }

/* 結果パネル用 */
let resultPanelGroup;
let resultTextMesh; // 簡易的に SpriteText 的な代わりに Plane + texture でもよいが、ここでは簡略化して複数Planeにテキスト風マテリアル
// ここでは MeshBasicMaterial + canvasTexture を使う簡易版
let resultCanvas, resultCtx, resultTexture;

/* 刃物モデルのバリエーション（結果用） */
let bladeVariants = [];
let currentBladeVariantIndex = 0;

/* =========================
   初期化
   ========================= */
initScene();
initObjects();
initResultPanel();
initBladeVariants();
loadScoresFromStorage();

window.addEventListener("resize", onWindowResize);

/* =========================
   シーン構築
   ========================= */
function initScene() {
  // 床
  const floorGeo = new THREE.PlaneGeometry(10, 10);
  const floorMat = new THREE.MeshStandardMaterial({ color: 0x222222, roughness: 1.0 });
  const floor = new THREE.Mesh(floorGeo, floorMat);
  floor.rotation.x = -Math.PI / 2;
  floor.position.y = 0;
  floor.receiveShadow = true;
  scene.add(floor);
  objects.floor = floor;
}

/* 鍛造・成形・研ぎ用の簡易オブジェクト */
function initObjects() {
  // 炉（Box）
  const forgeGeo = new THREE.BoxGeometry(0.6, 0.6, 0.6);
  const forgeMat = new THREE.MeshStandardMaterial({ color: 0x552222, emissive: 0x220000 });
  const forge = new THREE.Mesh(forgeGeo, forgeMat);
  forge.position.set(-0.8, 0.3, -0.5);
  scene.add(forge);
  objects.forge = forge;
  colliders.forgeArea.setFromObject(forge);

  // 作業台
  const benchGeo = new THREE.BoxGeometry(1.2, 0.2, 0.8);
  const benchMat = new THREE.MeshStandardMaterial({ color: 0x444444 });
  const bench = new THREE.Mesh(benchGeo, benchMat);
  bench.position.set(0, 0.5, -0.8);
  scene.add(bench);
  objects.workbench = bench;
  colliders.workbenchArea.setFromObject(bench);

  // 砥石（作業台の上）
  const stoneGeo = new THREE.BoxGeometry(0.8, 0.1, 0.4);
  const stoneMat = new THREE.MeshStandardMaterial({ color: 0x666666 });
  const stone = new THREE.Mesh(stoneGeo, stoneMat);
  stone.position.set(0, 0.6, -0.8);
  scene.add(stone);
  objects.whetstone = stone;
  colliders.whetstoneArea.setFromObject(stone);

  // 鉄（鍛造用）
  const ironGeo = new THREE.BoxGeometry(0.3, 0.1, 0.2);
  const ironMat = new THREE.MeshStandardMaterial({ color: 0x888888 });
  const iron = new THREE.Mesh(ironGeo, ironMat);
  iron.position.set(-0.8, 0.7, -0.5);
  scene.add(iron);
  objects.iron = iron;
  colliders.iron.setFromObject(iron);

  // 刃物（成形・研ぎ用） - シンプルなBox
  const bladeGeo = new THREE.BoxGeometry(0.6, 0.05, 0.1);
  const bladeMat = new THREE.MeshStandardMaterial({ color: 0xaaaaaa });
  const blade = new THREE.Mesh(bladeGeo, bladeMat);
  blade.position.set(0, 0.8, -0.8);
  scene.add(blade);
  objects.blade = blade;

  // ハンマー（右手に追従）
  const hammerGeo = new THREE.BoxGeometry(0.15, 0.3, 0.15);
  const hammerMat = new THREE.MeshStandardMaterial({ color: 0x333333 });
  const hammer = new THREE.Mesh(hammerGeo, hammerMat);
  hammer.position.set(0.3, 1.2, -0.5);
  scene.add(hammer);
  objects.hammer = hammer;
  colliders.hammer.setFromObject(hammer);

  // 成形用ゾーン（刃物上に複数Box3）
  initShapingZones();
}

/* 成形ゾーンの初期化 */
function initShapingZones() {
  shapingZones = [];
  const blade = objects.blade;
  const zoneCount = 5;
  const width = 0.6;
  const zoneWidth = width / zoneCount;
  for (let i = 0; i < zoneCount; i++) {
    const zoneMeshGeo = new THREE.BoxGeometry(zoneWidth * 0.9, 0.06, 0.12);
    const zoneMeshMat = new THREE.MeshBasicMaterial({ color: 0x0000ff, transparent: true, opacity: 0.4 });
    const zoneMesh = new THREE.Mesh(zoneMeshGeo, zoneMeshMat);
    const xOffset = -width / 2 + zoneWidth * (i + 0.5);
    zoneMesh.position.set(blade.position.x + xOffset, blade.position.y + 0.03, blade.position.z);
    scene.add(zoneMesh);

    const box = new THREE.Box3().setFromObject(zoneMesh);
    shapingZones.push({
      collider: box,
      distortion: 10,
      mesh: zoneMesh,
    });
  }
}

/* 結果パネル */
function initResultPanel() {
  resultPanelGroup = new THREE.Group();
  scene.add(resultPanelGroup);

  // キャンバスでテキスト描画
  resultCanvas = document.createElement("canvas");
  resultCanvas.width = 512;
  resultCanvas.height = 512;
  resultCtx = resultCanvas.getContext("2d");
  resultTexture = new THREE.CanvasTexture(resultCanvas);

  const panelGeo = new THREE.PlaneGeometry(1.2, 1.2);
  const panelMat = new THREE.MeshBasicMaterial({ map: resultTexture, transparent: true });
  const panelMesh = new THREE.Mesh(panelGeo, panelMat);
  resultPanelGroup.add(panelMesh);

  resultPanelGroup.position.set(0, 1.6, -1.8);
  resultPanelGroup.visible = false;
}

/* 結果用刃物バリエーション */
function initBladeVariants() {
  bladeVariants = [];
  const basePos = new THREE.Vector3(0.6, 1.4, -1.8);
  const scores = [0, 60, 80, 95]; // スコア閾値イメージ

  for (let i = 0; i < 4; i++) {
    const geo = new THREE.BoxGeometry(0.4 + i * 0.1, 0.05, 0.08);
    const mat = new THREE.MeshStandardMaterial({
      color: new THREE.Color().setHSL(0.6 + i * 0.1, 0.4, 0.6),
      metalness: 0.8,
      roughness: 0.2,
    });
    const mesh = new THREE.Mesh(geo, mat);
    mesh.position.copy(basePos);
    mesh.visible = false;
    scene.add(mesh);
    bladeVariants.push({ mesh, threshold: scores[i] });
  }
}

/* =========================
   スコア保存・ロード
   ========================= */
let scoreHistory = [];

function loadScoresFromStorage() {
  const raw = localStorage.getItem("scores");
  if (!raw) {
    scoreHistory = [];
    return;
  }
  try {
    scoreHistory = JSON.parse(raw);
  } catch {
    scoreHistory = [];
  }
}

function saveScoreToStorage(score) {
  const now = new Date();
  const dateStr = now.toISOString().slice(0, 16); // YYYY-MM-DDTHH:mm
  scoreHistory.push({ score, date: dateStr });
  scoreHistory.sort((a, b) => b.score - a.score);
  scoreHistory = scoreHistory.slice(0, 5);
  localStorage.setItem("scores", JSON.stringify(scoreHistory));
}

/* =========================
   フェーズ共通・状態管理
   ========================= */
let forgingData = {
  temperature: 20,
  maxHits: 30,
  hitCount: 0,
  lastTempUpdate: 0,
};
let shapingData = {
  maxHits: 100,
  hitCount: 0,
};
let sharpeningData = {
  strokeCount: 0,
  maxStrokes: 30,
  lastDir: 0,
  lastPosOnStone: null,
  angleScore: 0,
};

let lastTime = 0;

/* A/Bボタンのエッジ検出用 */
let prevAButton = false;
let prevBButton = false;

/* =========================
   入力処理
   ========================= */
function getGamepadButton(controller, index) {
  if (!controller || !controller.gamepad || !controller.gamepad.buttons[index]) return false;
  return controller.gamepad.buttons[index].pressed;
}

function handleInput(delta) {
  let aPressed = false;
  let bPressed = false;

  if (isXRSession) {
    if (rightController && rightController.gamepad) {
      aPressed = getGamepadButton(rightController, 4); // A
      bPressed = getGamepadButton(rightController, 5); // B
    }
  } else {
    // デスクトップ簡易モード
    aPressed = !!keyState["n"]; // N -> A
    bPressed = !!keyState["p"]; // P -> B

    // 左手移動 WASD
    const moveSpeed = 0.8 * delta;
    if (keyState["w"]) desktopLeftPos.z -= moveSpeed;
    if (keyState["s"]) desktopLeftPos.z += moveSpeed;
    if (keyState["a"]) desktopLeftPos.x -= moveSpeed;
    if (keyState["d"]) desktopLeftPos.x += moveSpeed;

    // 視点移動 矢印キー
    const rotSpeed = 0.6 * delta;
    if (keyState["arrowleft"]) camera.rotation.y += rotSpeed;
    if (keyState["arrowright"]) camera.rotation.y -= rotSpeed;
    if (keyState["arrowup"]) camera.rotation.x += rotSpeed * 0.5;
    if (keyState["arrowdown"]) camera.rotation.x -= rotSpeed * 0.5;
  }

  // Aボタンの立ち上がりで次ステートへ
  if (aPressed && !prevAButton) {
    nextState();
  }
  prevAButton = aPressed;

  // Bボタンで現在フェーズやり直し
  if (bPressed && !prevBButton) {
    resetCurrentPhase();
  }
  prevBButton = bPressed;
}

/* =========================
   ステート遷移
   ========================= */
function nextState() {
  switch (currentState) {
    case State.INTRO:
      enterForging();
      break;
    case State.FORGING:
      enterShaping();
      break;
    case State.SHAPING:
      enterSharpening();
      break;
    case State.SHARPENING:
      enterResult();
      break;
    case State.RESULT:
      enterIntro();
      break;
  }
}

function resetCurrentPhase() {
  switch (currentState) {
    case State.FORGING:
      enterForging();
      break;
    case State.SHAPING:
      enterShaping();
      break;
    case State.SHARPENING:
      enterSharpening();
      break;
    case State.RESULT:
      enterResult();
      break;
  }
}

/* ===== 各ステートへの入り口 ===== */
function enterIntro() {
  currentState = State.INTRO;
  bladeState.shapeDistortion = 0;
  bladeState.symmetryError = 0;
  bladeState.sharpness = 0;
  forgingData.hitCount = 0;
  forgingData.temperature = 20;
  shapingData.hitCount = 0;
  sharpeningData.strokeCount = 0;
  sharpeningData.angleScore = 0;
  resultPanelGroup.visible = false;
  bladeVariants.forEach(v => v.mesh.visible = false);
}

function enterForging() {
  currentState = State.FORGING;
  forgingData.hitCount = 0;
  forgingData.temperature = 20;
}

function enterShaping() {
  currentState = State.SHAPING;
  shapingData.hitCount = 0;
  // ゾーン歪みリセット
  shapingZones.forEach(z => {
    z.distortion = 10;
  });
}

function enterSharpening() {
  currentState = State.SHARPENING;
  sharpeningData.strokeCount = 0;
  sharpeningData.angleScore = 0;
  sharpeningData.lastDir = 0;
  sharpeningData.lastPosOnStone = null;
}

function enterResult() {
  currentState = State.RESULT;
  const finalScore =
    (100 - bladeState.shapeDistortion) * 0.4 +
    (100 - bladeState.symmetryError) * 0.3 +
    bladeState.sharpness * 0.3;

  saveScoreToStorage(finalScore);
  updateResultPanel(finalScore);
}

/* =========================
   フェーズ更新処理
   ========================= */

/* --- 鍛造 --- */
function updateForging(delta) {
  const iron = objects.iron;
  const hammer = objects.hammer;

  // デスクトップ or XR でハンマー位置更新
  updateHammerPose(delta);

  // 温度の自然冷却
  forgingData.temperature = Math.max(20, forgingData.temperature - delta * 5);

  // 左手で鉄を掴む（簡略：左手位置にスナップ）
  let leftTrigger = false;
  if (isXRSession && leftController && leftController.gamepad) {
    leftTrigger = getGamepadButton(leftController, 0) || getGamepadButton(leftController, 1);
  } else {
    leftTrigger = !!keyState["x"]; // Xキーで左手ボタンX/トリガー代用
  }

  if (leftTrigger) {
    // 左手位置へ鉄を追従
    const leftPos = getLeftHandPosition();
    iron.position.copy(leftPos);
    colliders.iron.setFromObject(iron);

    // 炉エリアに入っていたら温度上昇
    if (colliders.forgeArea.intersectsBox(colliders.iron)) {
      forgingData.temperature = Math.min(1000, forgingData.temperature + delta * 200);
    }
  }

  // 作業台上にあるか
  const isOnWorkbench = colliders.workbenchArea.intersectsBox(colliders.iron);

  // 右手トリガーで打撃
  let rightTrigger = false;
  if (isXRSession && rightController && rightController.gamepad) {
    rightTrigger = getGamepadButton(rightController, 0);
  } else {
    rightTrigger = mouseDown; // クリックで打撃
  }

  // 打撃回数制限
  if (rightTrigger && forgingData.hitCount < forgingData.maxHits) {
    // 1打撃ごとに1回だけ判定するための簡易クールダウン
    // （ここでは delta が小さいので hitCount を増やすことで多重判定を防ぐ）
    forgingData.hitCount++;

    // 温度が低すぎると必ずMiss
    let result = "Miss";
    if (forgingData.temperature > 400) {
      const isTiming = isOnWorkbench;
      const controllerSpeed = estimateHammerSpeed(delta);
      const isVelocity = controllerSpeed > 0.5;
      const isHit = colliders.hammer.intersectsBox(colliders.iron);

      if (isTiming && isVelocity && isHit) result = "Perfect";
      else if (isTiming && (isVelocity || isHit)) result = "Good";
      else result = "Miss";
    }

    // 歪み蓄積
    if (result === "Miss") bladeState.shapeDistortion += 2;
    if (result === "Good") bladeState.shapeDistortion += 1;
    if (result === "Perfect") bladeState.shapeDistortion -= 0.5;
    bladeState.shapeDistortion = THREE.MathUtils.clamp(bladeState.shapeDistortion, 0, 100);

    // 火花エフェクト・音はここでトリガー（簡略化：コンソールログ）
    // 実際はパーティクル・Audio再生など
    // console.log("Forging hit:", result);

    // 鉄の色を温度で変化
    const t = THREE.MathUtils.clamp((forgingData.temperature - 200) / 800, 0, 1);
    iron.material.color.setRGB(0.5 + t * 0.5, 0.5 * (1 - t), 0.5 * (1 - t));
  }

  // 出力
  // bladeState.shapeDistortion はすでに更新済み
}

/* --- 成形 --- */
function updateShaping(delta) {
  const hammer = objects.hammer;
  updateHammerPose(delta);

  // 右手トリガーで打撃
  let rightTrigger = false;
  if (isXRSession && rightController && rightController.gamepad) {
    rightTrigger = getGamepadButton(rightController, 0);
  } else {
    rightTrigger = mouseDown;
  }

  if (rightTrigger && shapingData.hitCount < shapingData.maxHits) {
    shapingData.hitCount++;

    // どのゾーンに当たったか
    const hammerPos = hammer.position.clone();
    let hitZone = null;
    for (const z of shapingZones) {
      z.collider.setFromObject(z.mesh);
      if (z.collider.containsPoint(hammerPos)) {
        hitZone = z;
        break;
      }
    }

    const controllerSpeed = estimateHammerSpeed(delta);
    const power = THREE.MathUtils.clamp(controllerSpeed * 2.0, 0.2, 2.0);
    const smallPenalty = 0.1;

    if (hitZone) {
      hitZone.distortion -= power;
    }

    shapingZones.forEach(z => {
      if (z !== hitZone) {
        z.distortion += smallPenalty;
      }
      z.distortion = THREE.MathUtils.clamp(z.distortion, 0, 100);
    });

    // 視覚誘導：歪みが大きいほど赤く
    shapingZones.forEach(z => {
      const d = THREE.MathUtils.clamp(z.distortion / 20, 0, 1);
      const color = new THREE.Color().lerpColors(
        new THREE.Color(0x0000ff),
        new THREE.Color(0xff0000),
        d
      );
      z.mesh.material.color.copy(color);
    });

    // symmetryError = average(distortion)
    const distortionMap = shapingZones.map(z => z.distortion);
    const avg = distortionMap.reduce((a, b) => a + b, 0) / distortionMap.length;
    bladeState.symmetryError = THREE.MathUtils.clamp(avg, 0, 100);
  }
}

/* --- 研ぎ --- */
function updateSharpening(delta) {
  const blade = objects.blade;
  const stone = objects.whetstone;

  // 両手グリップで刃物を持つ（ここでは左手位置と右手位置の中点）
  const leftPos = getLeftHandPosition();
  const rightPos = getRightHandPosition();
  const mid = leftPos.clone().add(rightPos).multiplyScalar(0.5);
  blade.position.lerp(mid, 0.3); // 少し追従

  // 砥石上で前後運動しているとみなす
  const velocity = new THREE.Vector3(0, 0, 0); // 簡略：前フレームとの差分を取るのが理想
  // ここでは mid.z の変化を使う簡易版
  if (!sharpeningData.lastPosOnStone) {
    sharpeningData.lastPosOnStone = mid.clone();
  } else {
    velocity.copy(mid).sub(sharpeningData.lastPosOnStone);
  }

  const forward = new THREE.Vector3(0, 0, -1); // 砥石の前後方向
  const dir = Math.sign(velocity.dot(forward));
  const dist = velocity.length();

  if (dir !== 0 && dir !== sharpeningData.lastDir && dist > 0.02) {
    sharpeningData.strokeCount++;
    sharpeningData.lastDir = dir;
  }
  sharpeningData.lastPosOnStone.copy(mid);

  // 角度計算（刃物法線と砥石法線）
  const bladeNormal = new THREE.Vector3(0, 1, 0).applyQuaternion(blade.quaternion);
  const stoneNormal = new THREE.Vector3(0, 1, 0).applyQuaternion(stone.quaternion);
  const dot = THREE.MathUtils.clamp(bladeNormal.dot(stoneNormal), -1, 1);
  const angle = Math.acos(dot) * THREE.MathUtils.RAD2DEG;
  const idealAngle = 15; // 理想角度
  const error = Math.abs(angle - idealAngle);
  const angleScore = THREE.MathUtils.clamp(100 - error * 10, 0, 100);
  sharpeningData.angleScore = angleScore;

  // 効率
  const efficiency = THREE.MathUtils.clamp(1 - bladeState.symmetryError * 0.01, 0.5, 1);
  bladeState.sharpness = angleScore * efficiency;

  // ストローク数が上限に達したら自動で RESULT へ
  if (sharpeningData.strokeCount >= sharpeningData.maxStrokes) {
    enterResult();
  }
}

/* --- RESULT --- */
function updateResult(delta) {
  // 結果パネルをカメラ正面にビルボード表示
  const dist = 1.8;
  const dir = new THREE.Vector3(0, 0, -1).applyQuaternion(camera.quaternion);
  resultPanelGroup.position.copy(camera.position).add(dir.multiplyScalar(dist));
  resultPanelGroup.lookAt(camera.position);

  // 刃物モデルをゆっくり回転
  bladeVariants.forEach(v => {
    if (v.mesh.visible) {
      v.mesh.rotation.y += delta * 0.8;
    }
  });
}

/* 結果パネル更新 */
function updateResultPanel(finalScore) {
  resultPanelGroup.visible = true;

  // 称号
  let title = "見習い / Apprentice";
  if (finalScore >= 95) title = "名人 / Master";
  else if (finalScore >= 80) title = "職人 / Artisan";

  // 刃物バリエーション切替
  bladeVariants.forEach(v => (v.mesh.visible = false));
  let chosen = bladeVariants[0];
  for (const v of bladeVariants) {
    if (finalScore >= v.threshold) chosen = v;
  }
  chosen.mesh.visible = true;

  // Canvas に描画
  resultCtx.clearRect(0, 0, resultCanvas.width, resultCanvas.height);
  resultCtx.fillStyle = "rgba(0,0,0,0.7)";
  resultCtx.fillRect(0, 0, resultCanvas.width, resultCanvas.height);

  resultCtx.fillStyle = "#ffffff";
  resultCtx.font = "bold 32px system-ui";
  resultCtx.textAlign = "center";

  resultCtx.fillText("越前打刃物 / Echizen Blade", 256, 60);
  resultCtx.font = "28px system-ui";
  resultCtx.fillText(`総合スコア / Score: ${finalScore.toFixed(1)}`, 256, 120);
  resultCtx.fillText(`称号 / Title: ${title}`, 256, 160);

  resultCtx.font = "22px system-ui";
  resultCtx.fillText(`鍛造 / Forging Distortion: ${bladeState.shapeDistortion.toFixed(1)}`, 256, 220);
  resultCtx.fillText(`成形 / Shaping Symmetry: ${bladeState.symmetryError.toFixed(1)}`, 256, 260);
  resultCtx.fillText(`研ぎ / Sharpening: ${bladeState.sharpness.toFixed(1)}`, 256, 300);

  // ランキング
  resultCtx.font = "20px system-ui";
  resultCtx.fillText("ランキング / Ranking (Top 5)", 256, 360);
  resultCtx.textAlign = "left";
  let y = 390;
  scoreHistory.forEach((s, i) => {
    const line = `${i + 1}位: ${s.score.toFixed(1)}点 (${s.date.replace("T", " ")})`;
    resultCtx.fillText(line, 60, y);
    y += 28;
  });

  resultTexture.needsUpdate = true;
}

/* =========================
   補助関数
   ========================= */
function updateHammerPose(delta) {
  const hammer = objects.hammer;
  if (isXRSession && rightController) {
    rightController.getWorldPosition(hammer.position);
  } else {
    hammer.position.copy(desktopHammerPos);
  }
  colliders.hammer.setFromObject(hammer);
}

function getLeftHandPosition() {
  const v = new THREE.Vector3();
  if (isXRSession && leftController) {
    leftController.getWorldPosition(v);
  } else {
    v.copy(desktopLeftPos);
  }
  return v;
}

function getRightHandPosition() {
  const v = new THREE.Vector3();
  if (isXRSession && rightController) {
    rightController.getWorldPosition(v);
  } else {
    v.copy(desktopHammerPos);
  }
  return v;
}

/* 簡易的な速度推定（実際は前フレーム位置との差分を保持するのが望ましい） */
let lastHammerPos = new THREE.Vector3();
let hammerSpeed = 0;
function estimateHammerSpeed(delta) {
  const hammer = objects.hammer;
  const currentPos = hammer.position.clone();
  const dist = currentPos.distanceTo(lastHammerPos);
  hammerSpeed = dist / Math.max(delta, 0.0001);
  lastHammerPos.copy(currentPos);
  return hammerSpeed;
}

/* =========================
   メインループ
   ========================= */
renderer.setAnimationLoop((t) => {
  if (lastTime === 0) {
    lastTime = t;
    return;
  }
  const delta = Math.min((t - lastTime) / 1000, 0.033);
  lastTime = t;

  handleInput(delta);

  switch (currentState) {
    case State.FORGING:
      updateForging(delta);
      break;
    case State.SHAPING:
      updateShaping(delta);
      break;
    case State.SHARPENING:
      updateSharpening(delta);
      break;
    case State.RESULT:
      updateResult(delta);
      break;
    case State.INTRO:
    default:
      // INTROは軽く待機。必要なら簡易ロゴ表示など
      break;
  }

  renderer.render(scene, camera);
});

/* =========================
   リサイズ
   ========================= */
function onWindowResize() {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
}

/* 初期ステート */
enterIntro();

</script>
