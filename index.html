<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<title>越前打刃物 - WebXR Demo</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<style>
  body {
    margin: 0;
    overflow: hidden;
    background: #000;
    font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    color: #fff;
  }
  #overlayUI {
    position: fixed;
    top: 8px;
    left: 8px;
    z-index: 10;
    display: flex;
    flex-direction: column;
    gap: 4px;
    font-size: 12px;
  }
  #overlayUI button {
    padding: 4px 8px;
    font-size: 12px;
    cursor: pointer;
  }
  #modeLabel {
    padding: 2px 6px;
    background: rgba(0,0,0,0.6);
    border-radius: 4px;
  }
  #scoreResetBtn {
    background: #b33;
    color: #fff;
    border: none;
    border-radius: 4px;
  }
  #sessionButtons button {
    border-radius: 4px;
    border: none;
  }
</style>
</head>
<body>
<div id="overlayUI">
  <div id="modeLabel">Mode: Desktop (Fallback)</div>
  <div id="sessionButtons">
    <button id="enterVRBtn">Enter VR</button>
    <button id="enterARBtn">Enter AR</button>
  </div>
  <button id="scoreResetBtn">スコアリセット / Reset Scores</button>
</div>
<script type="module">
/* ==========================
   Imports
   ========================== */
import * as THREE from "https://unpkg.com/three@0.161.0/build/three.module.js";
import { XRButton } from "https://unpkg.com/three@0.161.0/examples/jsm/webxr/XRButton.js";
import { VRButton } from "https://unpkg.com/three@0.161.0/examples/jsm/webxr/VRButton.js";
import { ARButton } from "https://unpkg.com/three@0.161.0/examples/jsm/webxr/ARButton.js";
import { XRControllerModelFactory } from "https://unpkg.com/three@0.161.0/examples/jsm/webxr/XRControllerModelFactory.js";

/* ==========================
   State Machine
   ========================== */
const State = {
  INTRO: "INTRO",
  FORGING: "FORGING",
  SHAPING: "SHAPING",
  SHARPENING: "SHARPENING",
  RESULT: "RESULT",
};
let currentState = State.INTRO;

// 刃物状態
let bladeState = {
  shapeDistortion: 0,
  symmetryError: 0,
  sharpness: 0,
};

// スコア履歴
let scores = [];

/* ==========================
   Three.js 基本セットアップ
   ========================== */
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x101018);

const camera = new THREE.PerspectiveCamera(
  70,
  window.innerWidth / window.innerHeight,
  0.1,
  100
);
camera.position.set(0, 1.6, 2);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.xr.enabled = true;
document.body.appendChild(renderer.domElement);

/* ==========================
   XR Rig & Controllers
   ========================== */
const xrRig = new THREE.Group();
scene.add(xrRig);

const controllerModelFactory = new XRControllerModelFactory();

const grip0 = renderer.xr.getControllerGrip(0);
const grip1 = renderer.xr.getControllerGrip(1);
grip0.add(controllerModelFactory.createControllerModel(grip0));
grip1.add(controllerModelFactory.createControllerModel(grip1));

const ctrl0 = renderer.xr.getController(0);
const ctrl1 = renderer.xr.getController(1);

xrRig.add(grip0, grip1, ctrl0, ctrl1);

let rightController = null;
let leftController = null;

function onControllerConnected(event) {
  const ctrl = event.target;
  const hand = event.data.handedness;
  if (hand === "right") {
    rightController = ctrl;
  } else if (hand === "left") {
    leftController = ctrl;
  }
}
function onControllerDisconnected(event) {
  const ctrl = event.target;
  if (ctrl === rightController) rightController = null;
  if (ctrl === leftController) leftController = null;
}

ctrl0.addEventListener("connected", onControllerConnected);
ctrl0.addEventListener("disconnected", onControllerDisconnected);
ctrl1.addEventListener("connected", onControllerConnected);
ctrl1.addEventListener("disconnected", onControllerDisconnected);

/* ==========================
   AR / VR セッション切替
   ========================== */
const modeLabel = document.getElementById("modeLabel");
let currentSessionMode = "desktop"; // "desktop" | "immersive-vr" | "immersive-ar"

let vrButtonDom = VRButton.createButton(renderer);
let arButtonDom = ARButton.createButton(renderer, { requiredFeatures: ["hit-test"] });
vrButtonDom.style.display = "none";
arButtonDom.style.display = "none";
document.body.appendChild(vrButtonDom);
document.body.appendChild(arButtonDom);

document.getElementById("enterVRBtn").addEventListener("click", () => {
  vrButtonDom.click();
});
document.getElementById("enterARBtn").addEventListener("click", () => {
  arButtonDom.click();
});

renderer.xr.addEventListener("sessionstart", () => {
  const session = renderer.xr.getSession();
  if (!session) return;
  if (session.mode === "immersive-vr") {
    currentSessionMode = "immersive-vr";
    modeLabel.textContent = "Mode: VR (immersive-vr)";
  } else if (session.mode === "immersive-ar") {
    currentSessionMode = "immersive-ar";
    modeLabel.textContent = "Mode: AR (immersive-ar)";
    scene.background = null; // パススルー想定
  }
});

renderer.xr.addEventListener("sessionend", () => {
  currentSessionMode = "desktop";
  modeLabel.textContent = "Mode: Desktop (Fallback)";
  scene.background = new THREE.Color(0x101018);
});

/* ==========================
   共通オブジェクト
   ========================== */
const rootGroup = new THREE.Group();
scene.add(rootGroup);

// 環境光 & 方向光
const hemiLight = new THREE.HemisphereLight(0xffffff, 0x444444, 0.6);
hemiLight.position.set(0, 1, 0);
scene.add(hemiLight);

const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
dirLight.position.set(3, 5, 2);
scene.add(dirLight);

// 床
const floorGeo = new THREE.PlaneGeometry(10, 10);
const floorMat = new THREE.MeshStandardMaterial({ color: 0x222222 });
const floor = new THREE.Mesh(floorGeo, floorMat);
floor.rotation.x = -Math.PI / 2;
floor.position.y = 0;
floor.receiveShadow = true;
scene.add(floor);

/* ==========================
   フェーズ別オブジェクト
   ========================== */
const forgingGroup = new THREE.Group();
const shapingGroup = new THREE.Group();
const sharpeningGroup = new THREE.Group();
const resultGroup = new THREE.Group();
rootGroup.add(forgingGroup, shapingGroup, sharpeningGroup, resultGroup);

// 共通位置（プレイヤー前方）
const PHASE_Z = -1.5;
const PHASE_Y = 1.0;

// ---------- 鍛造オブジェクト ----------
let forgeAreaBox, workbenchAreaBox;
let ironMesh, hammerMesh;
let ironBox = new THREE.Box3();
let hammerBox = new THREE.Box3();
let isIronOnWorkbench = false;
let ironTemperature = 20;
let forgingHits = 0;
const FORGING_MAX_HITS = 30;

(function initForging() {
  // 炉
  const furnaceGeo = new THREE.BoxGeometry(0.6, 0.4, 0.6);
  const furnaceMat = new THREE.MeshStandardMaterial({ color: 0x552222, emissive: 0x220000 });
  const furnace = new THREE.Mesh(furnaceGeo, furnaceMat);
  furnace.position.set(-0.7, PHASE_Y - 0.2, PHASE_Z);
  forgingGroup.add(furnace);

  // 炉エリアコライダ
  forgeAreaBox = new THREE.Box3().setFromCenterAndSize(
    new THREE.Vector3(-0.7, PHASE_Y - 0.2, PHASE_Z),
    new THREE.Vector3(0.7, 0.7, 0.7)
  );

  // 作業台
  const benchGeo = new THREE.BoxGeometry(1.0, 0.2, 0.8);
  const benchMat = new THREE.MeshStandardMaterial({ color: 0x444444 });
  const bench = new THREE.Mesh(benchGeo, benchMat);
  bench.position.set(0.7, PHASE_Y - 0.3, PHASE_Z);
  forgingGroup.add(bench);

  // 作業台エリアコライダ
  workbenchAreaBox = new THREE.Box3().setFromCenterAndSize(
    new THREE.Vector3(0.7, PHASE_Y - 0.2, PHASE_Z),
    new THREE.Vector3(1.2, 0.7, 0.9)
  );

  // 鉄（鍛造前の塊）
  const ironGeo = new THREE.BoxGeometry(0.3, 0.1, 0.1);
  const ironMat = new THREE.MeshStandardMaterial({ color: 0x555555 });
  ironMesh = new THREE.Mesh(ironGeo, ironMat);
  ironMesh.position.set(-0.7, PHASE_Y, PHASE_Z);
  forgingGroup.add(ironMesh);

  // ハンマー
  const hammerHeadGeo = new THREE.BoxGeometry(0.15, 0.08, 0.08);
  const hammerHeadMat = new THREE.MeshStandardMaterial({ color: 0x333333 });
  const hammerHead = new THREE.Mesh(hammerHeadGeo, hammerHeadMat);

  const hammerHandleGeo = new THREE.CylinderGeometry(0.02, 0.02, 0.4, 8);
  const hammerHandleMat = new THREE.MeshStandardMaterial({ color: 0x885522 });
  const hammerHandle = new THREE.Mesh(hammerHandleGeo, hammerHandleMat);
  hammerHandle.position.y = -0.25;

  hammerMesh = new THREE.Group();
  hammerMesh.add(hammerHead, hammerHandle);
  hammerMesh.position.set(0.2, PHASE_Y + 0.3, PHASE_Z);
  forgingGroup.add(hammerMesh);

  forgingGroup.visible = false;
})();

// ---------- 成形オブジェクト ----------
let shapingBladeMesh;
let shapingZones = [];
let shapingHits = 0;
const SHAPING_MAX_HITS = 100;

(function initShaping() {
  // 作業台
  const benchGeo = new THREE.BoxGeometry(1.0, 0.2, 0.8);
  const benchMat = new THREE.MeshStandardMaterial({ color: 0x444444 });
  const bench = new THREE.Mesh(benchGeo, benchMat);
  bench.position.set(0, PHASE_Y - 0.3, PHASE_Z);
  shapingGroup.add(bench);

  // 刃物っぽいモデル（細長い箱）
  const bladeGeo = new THREE.BoxGeometry(0.8, 0.05, 0.12);
  const bladeMat = new THREE.MeshStandardMaterial({ color: 0x3366aa });
  shapingBladeMesh = new THREE.Mesh(bladeGeo, bladeMat);
  shapingBladeMesh.position.set(0, PHASE_Y, PHASE_Z);
  shapingGroup.add(shapingBladeMesh);

  // ゾーン分割（5分割）
  const zoneCount = 5;
  const zoneWidth = 0.8 / zoneCount;
  const baseDistortion = 20;
  for (let i = 0; i < zoneCount; i++) {
    const zoneCenterX = -0.4 + zoneWidth * (i + 0.5);
    const box = new THREE.Box3().setFromCenterAndSize(
      new THREE.Vector3(zoneCenterX, PHASE_Y, PHASE_Z),
      new THREE.Vector3(zoneWidth, 0.1, 0.2)
    );
    shapingZones.push({
      collider: box,
      distortion: baseDistortion + Math.random() * 10,
    });
  }

  shapingGroup.visible = false;
})();

// ---------- 研ぎオブジェクト ----------
let sharpeningBladeMesh;
let stoneMesh;
let sharpeningStrokes = 0;
const SHARPENING_MAX_STROKES = 30;
let lastStrokeDir = 0;
let strokeAccumDist = 0;
let lastBladePos = new THREE.Vector3();

(function initSharpening() {
  // 砥石
  const stoneGeo = new THREE.BoxGeometry(0.8, 0.08, 0.3);
  const stoneMat = new THREE.MeshStandardMaterial({ color: 0x777777 });
  stoneMesh = new THREE.Mesh(stoneGeo, stoneMat);
  stoneMesh.position.set(0, PHASE_Y - 0.2, PHASE_Z);
  sharpeningGroup.add(stoneMesh);

  // 刃物（成形後を想定）
  const bladeGeo = new THREE.BoxGeometry(0.8, 0.05, 0.12);
  const bladeMat = new THREE.MeshStandardMaterial({ color: 0x88aacc });
  sharpeningBladeMesh = new THREE.Mesh(bladeGeo, bladeMat);
  sharpeningBladeMesh.position.set(0, PHASE_Y, PHASE_Z);
  sharpeningGroup.add(sharpeningBladeMesh);

  sharpeningGroup.visible = false;
})();

/* ==========================
   結果画面オブジェクト
   ========================== */
let resultPanel;
let resultTextMesh;
let rankingTextMesh;
let resultBladeMesh;
let resultBladeRotationSpeed = 0;
let resultAnimationTime = 0;

const resultCanvas = document.createElement("canvas");
resultCanvas.width = 512;
resultCanvas.height = 512;
const resultCtx = resultCanvas.getContext("2d");
const resultTexture = new THREE.CanvasTexture(resultCanvas);

(function initResult() {
  const panelGeo = new THREE.PlaneGeometry(1.2, 1.2);
  const panelMat = new THREE.MeshBasicMaterial({
    map: resultTexture,
    transparent: true,
  });
  resultPanel = new THREE.Mesh(panelGeo, panelMat);
  resultPanel.position.set(0, PHASE_Y + 0.2, PHASE_Z);
  resultGroup.add(resultPanel);

  // 刃物モデル（スコアに応じてマテリアル変更）
  const bladeGeo = new THREE.BoxGeometry(0.8, 0.05, 0.12);
  const bladeMat = new THREE.MeshStandardMaterial({ color: 0xcccccc, metalness: 0.8, roughness: 0.2 });
  resultBladeMesh = new THREE.Mesh(bladeGeo, bladeMat);
  resultBladeMesh.position.set(0, PHASE_Y - 0.4, PHASE_Z);
  resultGroup.add(resultBladeMesh);

  resultGroup.visible = false;
})();

/* ==========================
   スコア保存 / ロード
   ========================== */
function loadScores() {
  try {
    const raw = localStorage.getItem("scores");
    if (!raw) {
      scores = [];
      return;
    }
    scores = JSON.parse(raw);
  } catch (e) {
    scores = [];
  }
}
function saveScores() {
  try {
    localStorage.setItem("scores", JSON.stringify(scores));
  } catch (e) {
    // ignore
  }
}
loadScores();

document.getElementById("scoreResetBtn").addEventListener("click", () => {
  if (confirm("リセットしますか？ / Reset all scores?")) {
    localStorage.removeItem("scores");
    scores = [];
  }
});

/* ==========================
   入力管理（VR & Desktop）
   ========================== */
let desktopMode = true;
let mouseDown = false;
let mousePos = new THREE.Vector2(0, 0);
let hammerVelocity = new THREE.Vector3();
let lastHammerPos = new THREE.Vector3();
let desktopCameraYaw = 0;
let desktopCameraPitch = 0;
let keyState = {};

window.addEventListener("keydown", (e) => {
  keyState[e.key.toLowerCase()] = true;
});
window.addEventListener("keyup", (e) => {
  keyState[e.key.toLowerCase()] = false;
});

renderer.domElement.addEventListener("mousedown", () => {
  mouseDown = true;
});
renderer.domElement.addEventListener("mouseup", () => {
  mouseDown = false;
});
renderer.domElement.addEventListener("mousemove", (e) => {
  const rect = renderer.domElement.getBoundingClientRect();
  mousePos.x = ((e.clientX - rect.left) / rect.width) * 2 - 1;
  mousePos.y = -((e.clientY - rect.top) / rect.height) * 2 + 1;
});

// XRセッション開始時に desktopMode を false に
renderer.xr.addEventListener("sessionstart", () => {
  desktopMode = false;
});
renderer.xr.addEventListener("sessionend", () => {
  desktopMode = true;
});

/* ==========================
   ステート遷移
   ========================== */
let aButtonPressedPrev = false;
let bButtonPressedPrev = false;

function nextState() {
  switch (currentState) {
    case State.INTRO:
      enterForging();
      break;
    case State.FORGING:
      enterShaping();
      break;
    case State.SHAPING:
      enterSharpening();
      break;
    case State.SHARPENING:
      enterResult();
      break;
    case State.RESULT:
      enterIntro();
      break;
  }
}

function resetCurrentPhase() {
  switch (currentState) {
    case State.FORGING:
      resetForging();
      break;
    case State.SHAPING:
      resetShaping();
      break;
    case State.SHARPENING:
      resetSharpening();
      break;
    case State.RESULT:
      // 結果画面はリセットしても INTRO に戻す方が自然
      enterIntro();
      break;
  }
}

/* ==========================
   フェーズ遷移処理
   ========================== */
function enterIntro() {
  currentState = State.INTRO;
  forgingGroup.visible = false;
  shapingGroup.visible = false;
  sharpeningGroup.visible = false;
  resultGroup.visible = false;

  // 初期値リセット
  bladeState.shapeDistortion = 0;
  bladeState.symmetryError = 0;
  bladeState.sharpness = 0;

  resetForging();
  resetShaping();
  resetSharpening();
}

function enterForging() {
  currentState = State.FORGING;
  forgingGroup.visible = true;
  shapingGroup.visible = false;
  sharpeningGroup.visible = false;
  resultGroup.visible = false;
}

function enterShaping() {
  currentState = State.SHAPING;
  forgingGroup.visible = false;
  shapingGroup.visible = true;
  sharpeningGroup.visible = false;
  resultGroup.visible = false;
}

function enterSharpening() {
  currentState = State.SHARPENING;
  forgingGroup.visible = false;
  shapingGroup.visible = false;
  sharpeningGroup.visible = true;
  resultGroup.visible = false;
}

function enterResult() {
  currentState = State.RESULT;
  forgingGroup.visible = false;
  shapingGroup.visible = false;
  sharpeningGroup.visible = false;
  resultGroup.visible = true;

  const finalScore =
    (100 - bladeState.shapeDistortion) * 0.4 +
    (100 - bladeState.symmetryError) * 0.3 +
    bladeState.sharpness * 0.3;

  const now = new Date();
  scores.push({
    score: Math.round(finalScore),
    date: now.toISOString().slice(0, 16),
  });
  scores.sort((a, b) => b.score - a.score);
  scores = scores.slice(0, 5);
  saveScores();

  updateResultPanel(finalScore);
}

/* ==========================
   フェーズリセット
   ========================== */
function resetForging() {
  forgingHits = 0;
  ironTemperature = 20;
  ironMesh.position.set(-0.7, PHASE_Y, PHASE_Z);
  isIronOnWorkbench = false;
  bladeState.shapeDistortion = 0;
}

function resetShaping() {
  shapingHits = 0;
  shapingBladeMesh.rotation.set(0, 0, 0);
  shapingBladeMesh.position.set(0, PHASE_Y, PHASE_Z);
  shapingZones.forEach((z) => {
    z.distortion = 20 + Math.random() * 10;
  });
  bladeState.symmetryError = 0;
}

function resetSharpening() {
  sharpeningStrokes = 0;
  lastStrokeDir = 0;
  strokeAccumDist = 0;
  sharpeningBladeMesh.position.set(0, PHASE_Y, PHASE_Z);
  sharpeningBladeMesh.rotation.set(0, 0, 0);
  bladeState.sharpness = 0;
}

/* ==========================
   入力処理
   ========================== */
function handleInput(delta) {
  // VRコントローラーのA/Bボタン
  let aPressed = false;
  let bPressed = false;

  if (rightController && rightController.gamepad) {
    const gp = rightController.gamepad;
    aPressed = gp.buttons[4]?.pressed || false;
    bPressed = gp.buttons[5]?.pressed || false;
  } else if (desktopMode) {
    // Desktop fallback:
    // N -> Aボタン, P -> Bボタン
    aPressed = !!keyState["n"];
    bPressed = !!keyState["p"];
  }

  if (aPressed && !aButtonPressedPrev) {
    nextState();
  }
  if (bPressed && !bButtonPressedPrev) {
    resetCurrentPhase();
  }
  aButtonPressedPrev = aPressed;
  bButtonPressedPrev = bPressed;

  // Desktop カメラ操作（簡易）
  if (desktopMode) {
    const rotSpeed = 1.5 * delta;
    if (keyState["arrowleft"]) desktopCameraYaw += rotSpeed;
    if (keyState["arrowright"]) desktopCameraYaw -= rotSpeed;
    if (keyState["arrowup"]) desktopCameraPitch += rotSpeed;
    if (keyState["arrowdown"]) desktopCameraPitch -= rotSpeed;
    desktopCameraPitch = THREE.MathUtils.clamp(desktopCameraPitch, -Math.PI / 4, Math.PI / 4);

    const euler = new THREE.Euler(desktopCameraPitch, desktopCameraYaw, 0, "YXZ");
    camera.quaternion.setFromEuler(euler);
  }

  // ハンマー位置更新（VR or Desktop）
  if (currentState === State.FORGING || currentState === State.SHAPING) {
    if (!desktopMode && rightController) {
      hammerMesh.position.setFromMatrixPosition(rightController.matrixWorld);
    } else if (desktopMode) {
      // マウス位置をレイキャストして、プレイヤー前方の平面に投影
      const raycaster = new THREE.Raycaster();
      raycaster.setFromCamera(mousePos, camera);
      const plane = new THREE.Plane(new THREE.Vector3(0, 0, -1).applyQuaternion(camera.quaternion), PHASE_Z);
      const hit = new THREE.Vector3();
      raycaster.ray.intersectPlane(plane, hit);
      hammerMesh.position.lerp(hit, 0.4);
    }

    hammerVelocity.copy(hammerMesh.position).sub(lastHammerPos).divideScalar(Math.max(delta, 0.0001));
    lastHammerPos.copy(hammerMesh.position);
  }

  // 左手で鉄/刃物を掴む（簡易：VRなら左コントローラ位置、Desktopなら WASD）
  if (desktopMode) {
    // 左手の代わりに ironMesh / shapingBladeMesh / sharpeningBladeMesh を WASD で動かす
    const moveSpeed = 0.8 * delta;
    const moveTarget =
      currentState === State.FORGING
        ? ironMesh
        : currentState === State.SHAPING
        ? shapingBladeMesh
        : currentState === State.SHARPENING
        ? sharpeningBladeMesh
        : null;
    if (moveTarget) {
      if (keyState["w"]) moveTarget.position.z -= moveSpeed;
      if (keyState["s"]) moveTarget.position.z += moveSpeed;
      if (keyState["a"]) moveTarget.position.x -= moveSpeed;
      if (keyState["d"]) moveTarget.position.x += moveSpeed;
    }
  } else {
    // VR: 左手トリガーで掴む/離す（ここでは「掴む」概念を簡略化して、鉄/刃物を左手位置にスナップ）
    if (leftController && leftController.gamepad) {
      const gp = leftController.gamepad;
      const grabPressed = gp.buttons[0]?.pressed || gp.buttons[1]?.pressed || false;
      if (grabPressed) {
        const leftPos = new THREE.Vector3().setFromMatrixPosition(leftController.matrixWorld);
        if (currentState === State.FORGING) {
          ironMesh.position.copy(leftPos);
        } else if (currentState === State.SHAPING) {
          shapingBladeMesh.position.copy(leftPos);
        } else if (currentState === State.SHARPENING) {
          sharpeningBladeMesh.position.copy(leftPos);
        }
      }
    }
  }
}

/* ==========================
   鍛造フェーズ更新
   ========================== */
function updateForging(delta) {
  // 温度の自然減衰
  ironTemperature = Math.max(20, ironTemperature - 5 * delta);

  // 鉄の色を温度で変化
  const t = THREE.MathUtils.clamp((ironTemperature - 20) / 800, 0, 1);
  const hotColor = new THREE.Color().setHSL(0.02, 1.0, 0.5);
  const coldColor = new THREE.Color(0x555555);
  ironMesh.material.color.copy(coldColor).lerp(hotColor, t);
  ironMesh.material.emissive.copy(hotColor).multiplyScalar(t * 0.8);

  // 鉄の位置から炉/作業台判定
  ironBox.setFromObject(ironMesh);
  isIronOnWorkbench = workbenchAreaBox.intersectsBox(ironBox);
  const isInFurnace = forgeAreaBox.intersectsBox(ironBox);
  if (isInFurnace) {
    ironTemperature = Math.min(1000, ironTemperature + 200 * delta);
  }

  // 右手トリガー or Desktop クリックで打撃
  let hitPressed = false;
  if (!desktopMode && rightController && rightController.gamepad) {
    hitPressed = rightController.gamepad.buttons[0]?.pressed || false;
  } else if (desktopMode) {
    hitPressed = mouseDown;
  }

  if (hitPressed && forgingHits < FORGING_MAX_HITS) {
    forgingHits++;

    // 判定
    hammerBox.setFromObject(hammerMesh);
    const isTiming = isIronOnWorkbench;
    const isVelocity = hammerVelocity.length() > 1.5;
    const isHit = hammerBox.intersectsBox(ironBox);
    const tempTooLow = ironTemperature < 400;

    let result = "Miss";
    if (!tempTooLow) {
      if (isTiming && isVelocity && isHit) result = "Perfect";
      else if (isTiming && (isVelocity || isHit)) result = "Good";
    }

    if (tempTooLow) result = "Miss";

    // 歪み蓄積
    if (result === "Miss") bladeState.shapeDistortion += 2;
    if (result === "Good") bladeState.shapeDistortion += 1;
    if (result === "Perfect") bladeState.shapeDistortion -= 0.5;
    bladeState.shapeDistortion = THREE.MathUtils.clamp(bladeState.shapeDistortion, 0, 100);

    // 火花エフェクト（簡易：小さなパーティクルを一瞬表示）
    spawnSparks(hammerMesh.position, result);

    // 簡易サウンド（ここでは実装省略：実際は AudioContext などで再生）

    // 30回打撃したら自動で次フェーズへ
    if (forgingHits >= FORGING_MAX_HITS) {
      enterShaping();
    }
  }
}

/* ==========================
   成形フェーズ更新
   ========================== */
function updateShaping(delta) {
  // 刃物の裏表反転（左手Xボタン or Desktop: Xキー）
  let xPressed = false;
  if (!desktopMode && leftController && leftController.gamepad) {
    xPressed = leftController.gamepad.buttons[4]?.pressed || false;
  } else if (desktopMode) {
    xPressed = !!keyState["x"];
  }
  if (xPressed) {
    shapingBladeMesh.rotation.y += Math.PI * 2 * delta * 4; // くるんと回る
  }

  // ゾーンの色更新（歪みが大きいほど赤）
  const bladeMat = shapingBladeMesh.material;
  const maxDistortion = 50;
  const avgDistortion =
    shapingZones.reduce((sum, z) => sum + z.distortion, 0) / shapingZones.length;
  const colorT = THREE.MathUtils.clamp(avgDistortion / maxDistortion, 0, 1);
  const baseColor = new THREE.Color(0x3366aa);
  const hotColor = new THREE.Color(0xaa3333);
  bladeMat.color.copy(baseColor).lerp(hotColor, colorT);

  // 右手トリガー or Desktop クリックで打撃
  let hitPressed = false;
  if (!desktopMode && rightController && rightController.gamepad) {
    hitPressed = rightController.gamepad.buttons[0]?.pressed || false;
  } else if (desktopMode) {
    hitPressed = mouseDown;
  }

  if (hitPressed && shapingHits < SHAPING_MAX_HITS) {
    shapingHits++;

    // ハンマー位置からどのゾーンか判定
    const hammerPos = hammerMesh.position;
    let hitZone = null;
    for (const z of shapingZones) {
      if (z.collider.containsPoint(hammerPos)) {
        hitZone = z;
        break;
      }
    }

    const speed = hammerVelocity.length();
    const power = THREE.MathUtils.clamp(speed * 0.5, 0.2, 2.0);
    const smallPenalty = 0.1;

    if (hitZone) {
      hitZone.distortion = Math.max(0, hitZone.distortion - power);
      shapingZones.forEach((z) => {
        if (z !== hitZone) z.distortion += smallPenalty;
      });
    } else {
      // 外した場合は全体にペナルティ
      shapingZones.forEach((z) => {
        z.distortion += smallPenalty * 2;
      });
    }

    // 対称性評価
    const distortionMap = shapingZones.map((z) => z.distortion);
    const avg = distortionMap.reduce((s, v) => s + v, 0) / distortionMap.length;
    bladeState.symmetryError = THREE.MathUtils.clamp(avg, 0, 100);

    // Aボタンで任意終了（すでに handleInput で nextState 可能）
    if (shapingHits >= SHAPING_MAX_HITS) {
      enterSharpening();
    }
  }
}

/* ==========================
   研ぎフェーズ更新
   ========================== */
function updateSharpening(delta) {
  // 両手グリップで刃物を持つ（簡易：左手位置と右手位置の中点）
  if (!desktopMode && leftController && rightController) {
    const lp = new THREE.Vector3().setFromMatrixPosition(leftController.matrixWorld);
    const rp = new THREE.Vector3().setFromMatrixPosition(rightController.matrixWorld);
    const mid = lp.add(rp).multiplyScalar(0.5);
    sharpeningBladeMesh.position.copy(mid);
  }

  // ストローク検出
  const currentPos = sharpeningBladeMesh.position.clone();
  if (lastBladePos.lengthSq() === 0) {
    lastBladePos.copy(currentPos);
  }
  const deltaVec = currentPos.clone().sub(lastBladePos);
  const forward = new THREE.Vector3(0, 0, -1); // 砥石に沿った前後方向（簡易）
  const velocity = deltaVec.clone().divideScalar(Math.max(delta, 0.0001));
  const dir = Math.sign(velocity.dot(forward));
  const dist = deltaVec.length();
  const threshold = 0.05;

  if (dir !== 0) {
    if (lastStrokeDir === 0) {
      lastStrokeDir = dir;
      strokeAccumDist = 0;
    }
    if (dir === lastStrokeDir) {
      strokeAccumDist += dist;
    } else {
      if (strokeAccumDist > threshold && sharpeningStrokes < SHARPENING_MAX_STROKES) {
        sharpeningStrokes++;
      }
      lastStrokeDir = dir;
      strokeAccumDist = 0;
    }
  }
  lastBladePos.copy(currentPos);

  // 角度評価
  const bladeNormal = new THREE.Vector3(0, 1, 0).applyQuaternion(sharpeningBladeMesh.quaternion);
  const stoneNormal = new THREE.Vector3(0, 1, 0);
  const dot = THREE.MathUtils.clamp(bladeNormal.dot(stoneNormal), -1, 1);
  const angle = Math.acos(dot) * THREE.MathUtils.RAD2DEG;
  const error = Math.abs(angle - 15); // 理想角度 15度くらい
  let angleScore = THREE.MathUtils.clamp(100 - error * 10, 0, 100);

  // 効率
  const efficiency = THREE.MathUtils.clamp(1 - bladeState.symmetryError * 0.01, 0.5, 1);
  const sharpness = angleScore * efficiency;
  bladeState.sharpness = sharpness;

  // ストローク数が上限に達したら自動で結果へ
  if (sharpeningStrokes >= SHARPENING_MAX_STROKES) {
    enterResult();
  }
}

/* ==========================
   結果画面更新
   ========================== */
function updateResultPanel(finalScore) {
  resultAnimationTime = 0;
  resultBladeRotationSpeed = 1.5;

  // 称号
  let title = "見習い / Apprentice";
  if (finalScore >= 90) title = "名人 / Master";
  else if (finalScore >= 70) title = "職人 / Artisan";

  // 刃物モデルの見た目をスコアで変える
  if (finalScore >= 90) {
    resultBladeMesh.material.color.set(0xe0e0ff);
    resultBladeMesh.material.metalness = 1.0;
    resultBladeMesh.material.roughness = 0.1;
  } else if (finalScore >= 70) {
    resultBladeMesh.material.color.set(0xc0c0ff);
    resultBladeMesh.material.metalness = 0.8;
    resultBladeMesh.material.roughness = 0.2;
  } else {
    resultBladeMesh.material.color.set(0xaaaaaa);
    resultBladeMesh.material.metalness = 0.5;
    resultBladeMesh.material.roughness = 0.4;
  }

  // Canvas に描画
  const ctx = resultCtx;
  const w = resultCanvas.width;
  const h = resultCanvas.height;
  ctx.clearRect(0, 0, w, h);

  // 背景
  const grad = ctx.createLinearGradient(0, 0, 0, h);
  grad.addColorStop(0, "#111122");
  grad.addColorStop(1, "#222244");
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, w, h);

  ctx.fillStyle = "#ffffff";
  ctx.textAlign = "center";

  // タイトル
  ctx.font = "bold 32px system-ui";
  ctx.fillText("越前打刃物 / Echizen Blade", w / 2, 40);

  // 上部：今回スコア
  ctx.font = "bold 28px system-ui";
  ctx.fillText(`Score: ${Math.round(finalScore)} pt`, w / 2, 100);
  ctx.font = "20px system-ui";
  ctx.fillText(`Title: ${title}`, w / 2, 130);

  ctx.font = "16px system-ui";
  ctx.fillText(
    `Shape Distortion: ${bladeState.shapeDistortion.toFixed(1)}`,
    w / 2,
    170
  );
  ctx.fillText(
    `Symmetry Error: ${bladeState.symmetryError.toFixed(1)}`,
    w / 2,
    195
  );
  ctx.fillText(`Sharpness: ${bladeState.sharpness.toFixed(1)}`, w / 2, 220);

  // 下部：ランキング
  ctx.font = "bold 20px system-ui";
  ctx.fillText("Ranking (Top 5)", w / 2, 270);

  ctx.font = "16px system-ui";
  scores.forEach((s, i) => {
    const y = 300 + i * 30;
    const label = `${i + 1}位: ${s.score}点 (${s.date})`;
    if (i === 0 && s.score === Math.round(finalScore)) {
      // 今回が1位更新なら強調
      ctx.fillStyle = "#ffdd55";
      ctx.fillText(label, w / 2, y);
      ctx.fillStyle = "#ffffff";
    } else {
      ctx.fillText(label, w / 2, y);
    }
  });

  resultTexture.needsUpdate = true;
}

/* ==========================
   火花エフェクト（簡易）
   ========================== */
const sparkGroup = new THREE.Group();
scene.add(sparkGroup);

function spawnSparks(position, result) {
  const count = result === "Perfect" ? 20 : result === "Good" ? 10 : 3;
  const color =
    result === "Perfect"
      ? new THREE.Color(0xffee88)
      : result === "Good"
      ? new THREE.Color(0xffcc66)
      : new THREE.Color(0x888888);

  for (let i = 0; i < count; i++) {
    const geo = new THREE.SphereGeometry(0.01, 4, 4);
    const mat = new THREE.MeshBasicMaterial({ color });
    const m = new THREE.Mesh(geo, mat);
    m.position.copy(position);
    m.userData.life = 0.2 + Math.random() * 0.2;
    m.userData.vel = new THREE.Vector3(
      (Math.random() - 0.5) * 2,
      Math.random() * 2,
      (Math.random() - 0.5) * 2
    );
    sparkGroup.add(m);
  }
}

function updateSparks(delta) {
  for (let i = sparkGroup.children.length - 1; i >= 0; i--) {
    const s = sparkGroup.children[i];
    s.userData.life -= delta;
    if (s.userData.life <= 0) {
      sparkGroup.remove(s);
      continue;
    }
    s.position.addScaledVector(s.userData.vel, delta);
    s.userData.vel.y -= 9.8 * delta * 0.5;
    const alpha = s.userData.life * 3;
    s.material.opacity = THREE.MathUtils.clamp(alpha, 0, 1);
    s.material.transparent = true;
  }
}

/* ==========================
   状態共通更新
   ========================== */
function updateState(delta) {
  // 結果画面のアニメーション（パネルのスケール & 刃物回転）
  if (currentState === State.RESULT) {
    resultAnimationTime += delta;
    const t = Math.min(resultAnimationTime / 0.6, 1.0);
    const scale = 0.5 + 0.5 * t + 0.05 * Math.sin(resultAnimationTime * 6);
    resultPanel.scale.set(scale, scale, 1);

    resultBladeMesh.rotation.y += resultBladeRotationSpeed * delta;
    resultBladeRotationSpeed = THREE.MathUtils.lerp(
      resultBladeRotationSpeed,
      0.5,
      0.02
    );

    // パネルを常にカメラの正面に向ける（Billboard）
    resultPanel.lookAt(camera.position);
  }

  updateSparks(delta);
}

/* ==========================
   初期化 & メインループ
   ========================== */
enterIntro();

window.addEventListener("resize", () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

let lastTime = 0;
renderer.setAnimationLoop((t) => {
  if (lastTime === 0) {
    lastTime = t;
    return;
  }
  const delta = Math.min((t - lastTime) / 1000, 0.033);
  lastTime = t;

  handleInput(delta);

  switch (currentState) {
    case State.FORGING:
      updateForging(delta);
      break;
    case State.SHAPING:
      updateShaping(delta);
      break;
    case State.SHARPENING:
      updateSharpening(delta);
      break;
    case State.INTRO:
    case State.RESULT:
    default:
      break;
  }

  updateState(delta);
  renderer.render(scene, camera);
});
</script>
